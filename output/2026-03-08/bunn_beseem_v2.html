        // ========================================================
        // MATCHING LOGIC — uses tag overlap, not numbers
        // ========================================================
        function doesBeseem(bun, occasion) {
            const bunTags = new Set(bun.tags);
            const bunVibe = bun.vibe;

            // Count how many of the bun's tags the occasion welcomes
            let welcomed = 0;
            for (const tag of bun.tags) {
                if (occasion.welcomes.includes(tag)) welcomed++;
            }

            // Count how many of the bun's tags the occasion rejects
            let rejected = 0;
            for (const tag of bun.tags) {
                if (occasion.rejects.includes(tag)) rejected++;
            }

            // If more tags rejected than welcomed, it's unseemly
            if (rejected > welcomed) return false;

            // If at least 2 tags are welcomed and none rejected, it beseems
            if (welcomed >= 2 && rejected === 0) return true;

            // If any tags are welcomed and none rejected, it beseems
            if (welcomed >= 1 && rejected === 0) return true;

            // If equal, lean toward beseeming only if at least 2 welcomed
            if (welcomed === rejected && welcomed >= 2) return true;

            // Otherwise unseemly
            return false;
        }

        function getExplanation(bun, occasion, correct, playerSaidBeseem) {
            const actuallyBeseems = doesBeseem(bun, occasion);

            // Build a short "why" from tags
            const matchedTags = bun.tags.filter(t => occasion.welcomes.includes(t));
            const clashedTags = bun.tags.filter(t => occasion.rejects.includes(t));

            let reason = "";
            if (actuallyBeseems) {
                reason = occasion.reason_yes;
                if (matchedTags.length > 0) {
                    reason += " (Fits: " + matchedTags.join(", ") + ")";
                }
            } else {
                reason = occasion.reason_no;
                if (clashedTags.length > 0) {
                    reason += " (Clashes: " + clashedTags.join(", ") + ")";
                }
            }

            return reason;
        }

        // ========================================================
        // GAME STATE
        // ========================================================
        let rounds = [];
        let currentRound = 0;
        let score = 0;
        let streakCount = 0;
        let canAnswer = true;

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function pick(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateRounds() {
            rounds = [];
            const shuffledOccasions = shuffle(OCCASIONS).slice(0, 10);
            const shuffledBuns = shuffle(BUNS);
            for (let i = 0; i < 10; i++) {
                const occasion = shuffledOccasions[i];
                const bun = shuffledBuns[i % shuffledBuns.length];
                const beseems = doesBeseem(bun, occasion);
                rounds.push({ bun, occasion, beseems });
            }

            // Ensure a mix: at least 3 beseeming and 3 unseemly
            let yesCount = rounds.filter(r => r.beseems).length;
            let attempts = 0;
            while ((yesCount < 3 || yesCount > 7) && attempts < 50) {
                attempts++;
                const idx = Math.floor(Math.random() * 10);
                const occasion = rounds[idx].occasion;
                const newBun = pick(BUNS);
                const beseems = doesBeseem(newBun, occasion);
                const newYes = yesCount + (beseems ? 1 : 0) - (rounds[idx].beseems ? 1 : 0);
                if (newYes >= 3 && newYes <= 7) {
                    rounds[idx] = { bun: newBun, occasion, beseems };
                    yesCount = newYes;
                }
            }
        }

        function showRound() {
            const card = document.getElementById('scenarioCard');
            card.classList.remove('exit-left', 'exit-right');
            card.classList.add('enter');

            const r = rounds[currentRound];
            document.getElementById('roundNum').textContent = currentRound + 1;
            document.getElementById('progressFill').style.width = `${(currentRound / 10) * 100}%`;
            document.getElementById('occasionName').textContent = r.occasion.name;
            document.getElementById('bunEmoji').textContent = r.bun.emoji;
            document.getElementById('bunName').textContent = r.bun.name;
            document.getElementById('bunDesc').textContent = r.bun.desc;
            document.getElementById('feedbackVerdict').textContent = '';
            document.getElementById('feedbackVerdict').className = 'feedback-verdict';
            document.getElementById('feedbackReason').textContent = '';
            canAnswer = true;

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    card.classList.remove('enter');
                });
            });
        }

        function answer(playerSaidBeseem) {
            if (!canAnswer) return;
            canAnswer = false;

            const r = rounds[currentRound];
            const correct = (playerSaidBeseem === r.beseems);

            const card = document.getElementById('scenarioCard');
            const verdict = document.getElementById('feedbackVerdict');
            const reason = document.getElementById('feedbackReason');

            if (correct) {
                score++;
                streakCount++;
                document.getElementById('scoreNum').textContent = score;
                verdict.className = 'feedback-verdict correct';
                verdict.textContent = correct && playerSaidBeseem
                    ? "Correct! It beseems!"
                    : "Correct! Unseemly indeed!";
            } else {
                streakCount = 0;
                verdict.className = 'feedback-verdict wrong';
                verdict.textContent = !playerSaidBeseem
                    ? "Wrong! It actually beseems."
                    : "Wrong! That was unseemly.";
            }

            reason.textContent = getExplanation(r.bun, r.occasion, correct, playerSaidBeseem);

            document.getElementById('streak').textContent = streakCount >= 2
                ? "\u2B50 Streak: " + streakCount
                : '';

            card.classList.add(playerSaidBeseem ? 'exit-right' : 'exit-left');

            setTimeout(() => {
                currentRound++;
                if (currentRound >= 10) {
                    showFinal();
                } else {
                    showRound();
                }
            }, 2200);
        }

        function showFinal() {
            document.getElementById('gameArea').style.display = 'none';
            const final = document.getElementById('finalScreen');
            final.style.display = 'block';

            let emoji, title;
            if (score <= 3) { emoji = "\uD83D\uDE2C"; title = "Bun Barbarian"; }
            else if (score <= 5) { emoji = "\uD83E\uDD14"; title = "Apprentice of Bread Etiquette"; }
            else if (score <= 7) { emoji = "\uD83E\uDDD0"; title = "Bun Bourgeois"; }
            else if (score <= 9) { emoji = "\uD83C\uDFA9"; title = "Grand Arbiter of Bun Propriety"; }
            else { emoji = "\uD83D\uDC51"; title = "Supreme Chancellor of Beseeming Buns"; }

            document.getElementById('gradeEmoji').textContent = emoji;
            document.getElementById('finalScore').textContent = score + " out of 10 correct";
            document.getElementById('titleEarned').textContent = "Title earned: " + title;
        }

        function startGame() {
            currentRound = 0;
            score = 0;
            streakCount = 0;
            document.getElementById('scoreNum').textContent = '0';
            document.getElementById('streak').textContent = '';
            document.getElementById('finalScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            generateRounds();
            showRound();
        }

        // Event listeners (not inline onclick)
        document.getElementById('btnUnseemly').addEventListener('click', () => answer(false));
        document.getElementById('btnBeseeming').addEventListener('click', () => answer(true));
        document.getElementById('btnRestart').addEventListener('click', startGame);

        startGame();
    </script>
</body>
</html>
