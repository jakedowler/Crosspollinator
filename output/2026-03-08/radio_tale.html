<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Frequency</title>
<style>
  :root {
    --amber: #F4A942;
    --coral: #E8734A;
    --cream: #FFF8E7;
    --green: #5B8C5A;
    --brown: #3D2C1E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--brown);
    font-family: 'Georgia', 'Times New Roman', serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  header {
    text-align: center;
    padding: 6px 0 2px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.3rem;
    letter-spacing: 0.15em;
    color: var(--coral);
    text-transform: uppercase;
  }

  header p {
    font-size: 0.65rem;
    opacity: 0.5;
    font-style: italic;
  }

  #game {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 480px;
    padding: 0 12px;
    min-height: 0;
    gap: 4px;
  }

  /* --- Radio display --- */
  #radio-panel {
    background: linear-gradient(180deg, #F5E6C8 0%, #E8D5AA 100%);
    border-radius: 16px;
    border: 2px solid #D4B88C;
    padding: 10px 14px;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.1);
    flex-shrink: 0;
  }

  #freq-display {
    background: #2C2418;
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--amber);
    font-family: 'Courier New', monospace;
    font-size: 0.75rem;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.4;
    position: relative;
    overflow: hidden;
  }

  #freq-display .static-overlay {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(244,169,66,0.03) 2px,
      rgba(244,169,66,0.03) 4px
    );
    animation: scanline 0.1s steps(3) infinite;
    pointer-events: none;
  }

  @keyframes scanline {
    0% { transform: translateY(0); }
    100% { transform: translateY(4px); }
  }

  #freq-label {
    font-family: 'Courier New', monospace;
    font-size: 0.7rem;
    color: var(--amber);
    text-align: center;
    margin-top: 4px;
    opacity: 0.7;
  }

  /* --- Dial --- */
  #dial-area {
    padding: 4px 0;
    flex-shrink: 0;
  }

  #dial-track {
    width: 100%;
    height: 36px;
    background: linear-gradient(180deg, #D4B88C 0%, #C4A878 100%);
    border-radius: 18px;
    position: relative;
    border: 2px solid #B89860;
    cursor: pointer;
    touch-action: none;
  }

  #dial-knob {
    width: 28px;
    height: 28px;
    background: radial-gradient(circle at 40% 35%, #FFD080, var(--amber), #D48A20);
    border-radius: 50%;
    position: absolute;
    top: 2px;
    left: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.4);
    transition: left 0.05s ease-out;
    pointer-events: none;
  }

  #dial-ticks {
    display: flex;
    justify-content: space-between;
    padding: 2px 14px 0;
    font-size: 0.5rem;
    color: #B89860;
    font-family: 'Courier New', monospace;
  }

  /* --- Signal strength meter --- */
  #signal-bar {
    height: 4px;
    background: #E0D0B0;
    border-radius: 2px;
    overflow: hidden;
    flex-shrink: 0;
  }

  #signal-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--coral), var(--amber), var(--green));
    border-radius: 2px;
    transition: width 0.15s;
  }

  /* --- Buttons row --- */
  #btn-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    min-height: 36px;
  }

  #found-count {
    font-size: 0.7rem;
    color: var(--green);
    flex-shrink: 0;
  }

  .action-btn {
    background: linear-gradient(180deg, var(--amber), #D48A20);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 7px 18px;
    font-size: 0.78rem;
    font-family: inherit;
    font-weight: bold;
    letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(212,138,32,0.3);
    transition: all 0.2s;
    touch-action: manipulation;
    opacity: 0.3;
    pointer-events: none;
  }

  .action-btn.ready {
    opacity: 1;
    pointer-events: auto;
  }

  .action-btn:active {
    transform: scale(0.96);
  }

  #check-btn {
    background: linear-gradient(180deg, var(--green), #4A7A49);
    box-shadow: 0 2px 8px rgba(91,140,90,0.3);
    display: none;
  }

  #check-btn.show {
    display: inline-block;
  }

  /* --- Story timeline --- */
  #story-area {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  #story-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--coral);
    opacity: 0.7;
    flex-shrink: 0;
  }

  #story-slots {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
  }

  .story-slot {
    background: rgba(244,169,66,0.08);
    border: 1.5px dashed #D4B88C;
    border-radius: 8px;
    padding: 5px 8px;
    font-size: 0.68rem;
    line-height: 1.3;
    min-height: 28px;
    display: flex;
    align-items: center;
    color: #B89860;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .story-slot.filled {
    background: rgba(91,140,90,0.1);
    border: 1.5px solid var(--green);
    color: var(--brown);
    cursor: pointer;
  }

  .story-slot.filled.wrong {
    background: rgba(232,115,74,0.1);
    border-color: var(--coral);
  }

  .story-slot.filled.correct {
    background: rgba(91,140,90,0.18);
    border-color: var(--green);
    cursor: default;
  }

  .story-slot.active {
    border-color: var(--amber);
    background: rgba(244,169,66,0.18);
    box-shadow: 0 0 8px rgba(244,169,66,0.25);
  }

  .slot-num {
    font-weight: bold;
    margin-right: 6px;
    opacity: 0.5;
    font-size: 0.6rem;
    flex-shrink: 0;
  }

  /* --- Info --- */
  #info {
    font-size: 0.58rem;
    text-align: center;
    opacity: 0.45;
    padding: 3px 0;
    flex-shrink: 0;
  }

  /* --- End screen --- */
  #end-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,248,231,0.96);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
    padding: 24px;
  }

  #end-screen.show {
    display: flex;
  }

  #end-screen h2 {
    font-size: 1.4rem;
    color: var(--coral);
    text-align: center;
  }

  #end-screen .tale-text {
    max-width: 360px;
    font-size: 0.82rem;
    line-height: 1.7;
    color: var(--brown);
    text-align: center;
    font-style: italic;
    max-height: 50vh;
    overflow-y: auto;
  }

  #end-screen .score {
    font-size: 0.8rem;
    color: var(--green);
    font-weight: bold;
  }

  #play-again {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 10px 28px;
    font-size: 0.9rem;
    font-family: inherit;
    cursor: pointer;
    touch-action: manipulation;
  }

  #play-again:active {
    transform: scale(0.96);
  }

  @keyframes glow {
    0%, 100% { box-shadow: 0 0 4px rgba(244,169,66,0.2); }
    50% { box-shadow: 0 0 14px rgba(244,169,66,0.5); }
  }

  .glow {
    animation: glow 0.5s ease-in-out 3;
  }

  @keyframes celebrate {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<header>
  <h1>Frequency</h1>
  <p>radio &times; tale &mdash; tune the dial, find the story</p>
</header>

<div id="game">
  <div id="radio-panel">
    <div id="freq-display">
      <div class="static-overlay"></div>
      <span id="display-text">Sweep the dial to find story fragments...</span>
    </div>
    <div id="freq-label">88.0 MHz</div>
  </div>

  <div id="dial-area">
    <div id="dial-track">
      <div id="dial-knob"></div>
    </div>
    <div id="dial-ticks">
      <span>88</span><span>92</span><span>96</span><span>100</span><span>104</span><span>108</span>
    </div>
  </div>

  <div id="signal-bar"><div id="signal-fill"></div></div>

  <div id="btn-row">
    <span id="found-count"></span>
    <button class="action-btn" id="lock-btn">LOCK IN</button>
    <button class="action-btn" id="check-btn">CHECK ORDER</button>
  </div>

  <div id="story-area">
    <div id="story-label">The Tale &mdash; tap two fragments to swap their order</div>
    <div id="story-slots"></div>
  </div>

  <div id="info">Drag the dial to discover fragments hidden in the static</div>
</div>

<div id="end-screen">
  <h2 id="end-title">Tale Complete!</h2>
  <div class="tale-text" id="end-tale"></div>
  <div class="score" id="end-score"></div>
  <button id="play-again">Play Again</button>
</div>

<script>
(function() {
  'use strict';

  const TALES = [
    {
      title: "The Signal in the Stars",
      fragments: [
        "Long ago, a lonely lighthouse keeper heard whispers in the static of her radio.",
        "Each night, the whispers grew clearer, telling of a star that sang to those who listened.",
        "She learned to tune her dial with patience, filtering noise from meaning.",
        "One evening, the static parted like curtains, and a voice said: 'You found me.'",
        "It was the voice of another keeper, across the sea, who had been searching too.",
        "Together, their signals intertwined, and the story they shared lit up the dark.",
        "From that night on, no keeper was ever truly alone on the airwaves."
      ]
    },
    {
      title: "The Fox and the Frequency",
      fragments: [
        "A clever fox discovered an old radio buried beneath an oak tree.",
        "When she turned the dial, she heard tales from distant lands and forgotten times.",
        "Each frequency held a different chapter: one of bravery, one of kindness, one of wit.",
        "The fox shared these stories with the forest creatures each evening at dusk.",
        "But one frequency was nothing but static, no matter how carefully she tuned.",
        "An old owl told her: 'That frequency is yours to fill. Tell your own tale.'",
        "So the fox spoke into the static, and her story joined the chorus of all the rest."
      ]
    },
    {
      title: "The Wandering Broadcast",
      fragments: [
        "Once, a traveling storyteller carried a tiny radio transmitter in her pack.",
        "In every village she visited, she broadcast one tale and listened for one in return.",
        "The tales she collected changed with each retelling, growing stranger and more wonderful.",
        "A tale of a fish became a tale of a flying whale; a lost shoe became a golden compass.",
        "She realized the stories weren't hers to keep \u2014 they belonged to the air itself.",
        "On her last night, she set the transmitter to broadcast forever on a single frequency.",
        "Even now, if you tune to just the right spot, you can hear her tales still traveling."
      ]
    }
  ];

  // --- Game state ---
  let currentTale;
  let fragmentFreqs = [];
  let dialPos = 0;
  let currentlyTuned = null;
  let foundFragments = [];
  let storyOrder = [];
  let activeSlot = null;
  let sweepCount = 0;
  let isDragging = false;
  let allFound = false;
  let gameOver = false;

  const displayText = document.getElementById('display-text');
  const freqLabel = document.getElementById('freq-label');
  const dialTrack = document.getElementById('dial-track');
  const dialKnob = document.getElementById('dial-knob');
  const signalFill = document.getElementById('signal-fill');
  const foundCountEl = document.getElementById('found-count');
  const lockBtn = document.getElementById('lock-btn');
  const checkBtn = document.getElementById('check-btn');
  const storySlotsEl = document.getElementById('story-slots');
  const endScreen = document.getElementById('end-screen');
  const endTitle = document.getElementById('end-title');
  const endTale = document.getElementById('end-tale');
  const endScore = document.getElementById('end-score');
  const playAgain = document.getElementById('play-again');

  function init() {
    currentTale = TALES[Math.floor(Math.random() * TALES.length)];
    const n = currentTale.fragments.length;

    // Assign each fragment a random frequency position, well-spaced
    fragmentFreqs = [];
    const spacing = 1 / (n + 1);
    for (let i = 0; i < n; i++) {
      const base = spacing * (i + 1);
      const jitter = (Math.random() - 0.5) * spacing * 0.5;
      fragmentFreqs.push({
        freq: Math.max(0.04, Math.min(0.96, base + jitter)),
        index: i,
        found: false
      });
    }
    // Shuffle frequency positions so they don't map to story order
    const freqValues = fragmentFreqs.map(f => f.freq);
    for (let i = freqValues.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [freqValues[i], freqValues[j]] = [freqValues[j], freqValues[i]];
    }
    fragmentFreqs.forEach((f, i) => f.freq = freqValues[i]);

    foundFragments = [];
    storyOrder = new Array(n).fill(null);
    activeSlot = null;
    currentlyTuned = null;
    sweepCount = 0;
    dialPos = 0;
    allFound = false;
    gameOver = false;

    // Build story slots
    storySlotsEl.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const slot = document.createElement('div');
      slot.className = 'story-slot';
      slot.innerHTML = '<span class="slot-num">' + (i + 1) + '.</span><span class="slot-text">\u2022 \u2022 \u2022</span>';
      slot.addEventListener('click', function() { onSlotClick(i); });
      storySlotsEl.appendChild(slot);
    }

    updateDisplay();
    updateFoundCount();
    lockBtn.classList.remove('ready');
    checkBtn.classList.remove('show', 'ready');
    endScreen.classList.remove('show');
    displayText.textContent = 'Sweep the dial to find story fragments...';
  }

  function freqToMHz(pos) {
    return (88 + pos * 20).toFixed(1);
  }

  function getSignalStrength(pos) {
    let best = 0;
    let bestIdx = -1;
    var tuneWidth = 0.028;

    for (var i = 0; i < fragmentFreqs.length; i++) {
      var frag = fragmentFreqs[i];
      if (frag.found) continue;
      var dist = Math.abs(pos - frag.freq);
      var strength = Math.max(0, 1 - dist / tuneWidth);
      if (strength > best) {
        best = strength;
        bestIdx = frag.index;
      }
    }

    return { strength: best, fragmentIndex: bestIdx };
  }

  function garbleText(text, clarity) {
    if (clarity < 0.05) return '~~ static ~~';
    var chars = text.split('');
    var result = [];
    var staticChars = '~*\u2022\u00b7\u2591\u2592:;';
    for (var i = 0; i < chars.length; i++) {
      var ch = chars[i];
      if (ch === ' ') {
        result.push(' ');
      } else if (Math.random() > clarity) {
        result.push(staticChars[Math.floor(Math.random() * staticChars.length)]);
      } else {
        result.push(ch);
      }
    }
    return result.join('');
  }

  function updateDisplay() {
    if (gameOver) return;

    var mhz = freqToMHz(dialPos);
    freqLabel.textContent = mhz + ' MHz';

    if (allFound) {
      signalFill.style.width = '100%';
      signalFill.style.background = 'var(--green)';
      return;
    }

    var info = getSignalStrength(dialPos);
    var strength = info.strength;
    var fragmentIndex = info.fragmentIndex;
    signalFill.style.width = (strength * 100) + '%';

    if (strength > 0.1 && fragmentIndex >= 0) {
      currentlyTuned = fragmentIndex;
      var text = currentTale.fragments[fragmentIndex];

      if (strength > 0.85) {
        displayText.textContent = text;
        lockBtn.classList.add('ready');
      } else {
        displayText.textContent = garbleText(text, strength);
        lockBtn.classList.remove('ready');
      }
    } else {
      currentlyTuned = null;
      if (strength > 0.02) {
        displayText.textContent = garbleText('searching the airwaves...', 0.25);
      } else {
        displayText.textContent = '~~ static ~~';
      }
      lockBtn.classList.remove('ready');
    }

    // Update knob position
    var trackWidth = dialTrack.offsetWidth;
    var knobWidth = 28;
    var maxLeft = trackWidth - knobWidth - 4;
    dialKnob.style.left = (2 + dialPos * maxLeft) + 'px';

    // Signal color
    if (strength > 0.85) {
      signalFill.style.background = 'var(--green)';
    } else if (strength > 0.3) {
      signalFill.style.background = 'var(--amber)';
    } else {
      signalFill.style.background = 'var(--coral)';
    }
  }

  function updateFoundCount() {
    var n = currentTale.fragments.length;
    var found = foundFragments.length;
    if (found === 0) {
      foundCountEl.textContent = '';
    } else if (found < n) {
      foundCountEl.textContent = found + ' / ' + n + ' found';
    } else {
      foundCountEl.textContent = 'All ' + n + ' found!';
    }
  }

  // --- Dial interaction ---
  function getDialPosFromX(clientX) {
    var rect = dialTrack.getBoundingClientRect();
    var x = clientX - rect.left;
    return Math.max(0, Math.min(1, x / rect.width));
  }

  dialTrack.addEventListener('pointerdown', function(e) {
    if (allFound) return;
    isDragging = true;
    dialPos = getDialPosFromX(e.clientX);
    sweepCount++;
    updateDisplay();
    dialTrack.setPointerCapture(e.pointerId);
  });

  dialTrack.addEventListener('pointermove', function(e) {
    if (!isDragging) return;
    dialPos = getDialPosFromX(e.clientX);
    updateDisplay();
  });

  dialTrack.addEventListener('pointerup', function() {
    isDragging = false;
  });

  dialTrack.addEventListener('pointercancel', function() {
    isDragging = false;
  });

  // --- Lock in fragment ---
  lockBtn.addEventListener('click', function() {
    if (currentlyTuned === null || allFound) return;
    var fragIdx = currentlyTuned;

    var frag = null;
    for (var i = 0; i < fragmentFreqs.length; i++) {
      if (fragmentFreqs[i].index === fragIdx) { frag = fragmentFreqs[i]; break; }
    }
    if (!frag || frag.found) return;
    frag.found = true;
    foundFragments.push(fragIdx);

    updateFoundCount();
    lockBtn.classList.remove('ready');

    // Place in first empty slot
    var emptySlot = storyOrder.indexOf(null);
    if (emptySlot >= 0) {
      placeFragment(emptySlot, fragIdx);
    }

    currentlyTuned = null;

    // Check if all found
    if (foundFragments.length === currentTale.fragments.length) {
      allFound = true;
      displayText.textContent = 'All fragments found! Now arrange them in the right order.';
      checkBtn.classList.add('show', 'ready');
      lockBtn.classList.remove('ready');
    }

    updateDisplay();
  });

  function placeFragment(slotIdx, fragIdx) {
    storyOrder[slotIdx] = fragIdx;
    var slot = storySlotsEl.children[slotIdx];
    slot.classList.add('filled');
    slot.classList.add('glow');
    slot.querySelector('.slot-text').textContent = currentTale.fragments[fragIdx];
    setTimeout(function() { slot.classList.remove('glow'); }, 1800);
  }

  // --- Slot reordering ---
  function onSlotClick(slotIdx) {
    if (gameOver) return;
    if (storyOrder[slotIdx] === null) return;

    var slot = storySlotsEl.children[slotIdx];
    if (slot.classList.contains('correct')) return; // locked in place

    if (activeSlot === null) {
      activeSlot = slotIdx;
      slot.classList.add('active');
    } else if (activeSlot === slotIdx) {
      slot.classList.remove('active');
      activeSlot = null;
    } else {
      // Swap
      var slotA = storySlotsEl.children[activeSlot];
      var slotB = slot;

      slotA.classList.remove('active');

      var temp = storyOrder[activeSlot];
      storyOrder[activeSlot] = storyOrder[slotIdx];
      storyOrder[slotIdx] = temp;

      // Update text
      updateSlotDisplay(activeSlot);
      updateSlotDisplay(slotIdx);

      // Clear any wrong/correct highlights from previous check
      slotA.classList.remove('wrong', 'correct');
      slotB.classList.remove('wrong', 'correct');

      activeSlot = null;
    }
  }

  function updateSlotDisplay(idx) {
    var slot = storySlotsEl.children[idx];
    var fragIdx = storyOrder[idx];
    if (fragIdx !== null) {
      slot.querySelector('.slot-text').textContent = currentTale.fragments[fragIdx];
      slot.classList.add('filled');
    } else {
      slot.querySelector('.slot-text').textContent = '\u2022 \u2022 \u2022';
      slot.classList.remove('filled');
    }
  }

  // --- Check order ---
  checkBtn.addEventListener('click', function() {
    if (!allFound || gameOver) return;

    var correct = 0;
    var n = storyOrder.length;

    for (var i = 0; i < n; i++) {
      var slot = storySlotsEl.children[i];
      slot.classList.remove('wrong', 'correct');

      if (storyOrder[i] === i) {
        slot.classList.add('correct');
        correct++;
      } else {
        slot.classList.add('wrong');
      }
    }

    if (correct === n) {
      gameOver = true;
      displayText.textContent = 'The tale is complete!';
      setTimeout(showEnd, 800);
    } else {
      displayText.textContent = correct + ' of ' + n + ' fragments in the right place. Keep rearranging!';
    }
  });

  function showEnd() {
    endTitle.textContent = currentTale.title;
    endTale.textContent = currentTale.fragments.join(' ');

    var n = currentTale.fragments.length;
    var rating;
    if (sweepCount <= n + 2) rating = 'Perfect Tuning!';
    else if (sweepCount <= n + 5) rating = 'Sharp Ears!';
    else if (sweepCount <= n + 10) rating = 'Good Reception';
    else rating = 'Signal Found';

    endScore.textContent = rating + ' \u2014 ' + sweepCount + ' dial sweeps';
    endScreen.classList.add('show');
  }

  playAgain.addEventListener('click', init);

  // --- Start ---
  init();

  // Animate static when not tuned to a fragment
  setInterval(function() {
    if (gameOver || isDragging) return;
    if (!allFound && currentlyTuned === null) {
      var info = getSignalStrength(dialPos);
      if (info.strength < 0.85) {
        // Re-garble for visual effect
        if (info.strength > 0.1 && info.fragmentIndex >= 0) {
          displayText.textContent = garbleText(currentTale.fragments[info.fragmentIndex], info.strength);
        } else if (info.strength > 0.02) {
          displayText.textContent = garbleText('searching the airwaves...', 0.25);
        } else {
          var staticTexts = ['~~ static ~~', '~ ~ static ~ ~', '~~~ static ~~~'];
          displayText.textContent = staticTexts[Math.floor(Math.random() * staticTexts.length)];
        }
      }
    }
  }, 250);

})();
</script>
