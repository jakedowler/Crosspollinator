<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tube Tones</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#FFF5E6;}

:root{
  --coral:#FF6B6B;--teal:#4ECDC4;--gold:#FFE66D;--purple:#A06CD5;
  --sky:#74B9FF;--pink:#FD79A8;--cream:#FFF5E6;--dark:#2D3436;
  --tube-outer:#4ECDC4;--tube-inner:#2D9B94;--success:#00B894;
}

#app{width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;overflow:hidden;background:linear-gradient(135deg,#FFF5E6 0%,#E8F8F5 50%,#F3E5F5 100%);}

header{width:100%;padding:6px 12px;display:flex;justify-content:space-between;align-items:center;z-index:10;}
header h1{font-size:clamp(15px,3.6vw,22px);color:var(--dark);font-weight:800;}
header h1 .t1{color:var(--teal);}
header h1 .t2{color:var(--purple);}
#hint{font-size:clamp(9px,2vw,12px);color:var(--dark);opacity:0.6;text-align:right;max-width:55%;}

#hud{display:flex;gap:clamp(12px,4vw,24px);padding:2px 12px 4px;z-index:10;align-items:center;}
.hud-item{display:flex;align-items:center;gap:4px;font-size:clamp(12px,2.8vw,15px);font-weight:700;color:var(--dark);}
.hud-label{font-weight:400;opacity:0.6;font-size:clamp(10px,2.2vw,12px);}

#stage{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(4px,1.2vh,10px);padding:0 clamp(8px,2vw,20px);overflow:hidden;}

#mic-area{display:flex;flex-direction:column;align-items:center;gap:2px;}
#mic-icon{font-size:clamp(24px,6vw,40px);filter:drop-shadow(0 2px 6px rgba(160,108,213,0.4));transition:transform 0.2s;}
#mic-icon.listening{animation:micPulse 0.5s ease infinite alternate;}
@keyframes micPulse{0%{transform:scale(1)}100%{transform:scale(1.15);filter:drop-shadow(0 2px 14px rgba(160,108,213,0.8));}}
#mic-label{font-size:clamp(8px,1.8vw,11px);color:var(--purple);opacity:0.7;font-weight:600;}

#target-wave{width:90%;max-width:400px;height:clamp(40px,7vh,65px);background:rgba(255,255,255,0.7);border-radius:12px;border:2px solid var(--purple);position:relative;overflow:hidden;}
#target-label{position:absolute;top:2px;left:8px;font-size:clamp(8px,1.8vw,11px);color:var(--purple);font-weight:600;opacity:0.8;z-index:2;}
#target-canvas{width:100%;height:100%;display:block;}

#player-wave{width:90%;max-width:400px;height:clamp(40px,7vh,65px);background:rgba(255,255,255,0.7);border-radius:12px;border:2px solid var(--teal);position:relative;overflow:hidden;}
#player-label{position:absolute;top:2px;left:8px;font-size:clamp(8px,1.8vw,11px);color:var(--teal);font-weight:600;opacity:0.8;z-index:2;}
#player-canvas{width:100%;height:100%;display:block;}

#match-meter{width:90%;max-width:400px;height:clamp(14px,2.5vh,20px);background:rgba(255,255,255,0.6);border-radius:20px;border:2px solid #ddd;overflow:hidden;position:relative;}
#match-fill{height:100%;width:0%;border-radius:20px;transition:width 0.3s ease,background 0.3s;background:linear-gradient(90deg,var(--coral),var(--gold),var(--success));}
#match-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(8px,1.8vw,11px);font-weight:700;color:var(--dark);}

#tubes-container{width:90%;max-width:400px;display:flex;justify-content:center;gap:clamp(4px,1.8vw,12px);padding:clamp(2px,0.8vh,8px) 0;}

.tube-col{display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:none;}
.tube-wrapper{width:clamp(34px,9vw,52px);height:clamp(80px,18vh,160px);background:rgba(255,255,255,0.4);border-radius:10px;border:2px dashed rgba(78,205,196,0.3);position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;touch-action:none;cursor:ns-resize;}
.tube-fill{width:100%;background:linear-gradient(180deg,var(--tube-outer),var(--tube-inner));border-radius:0 0 8px 8px;position:relative;transition:height 0.05s;min-height:8%;pointer-events:none;}
.tube-fill::before{content:'';position:absolute;top:0;left:15%;width:70%;height:3px;background:rgba(255,255,255,0.5);border-radius:2px;}
.tube-fill::after{content:'';position:absolute;left:0;right:0;top:4px;bottom:4px;background:repeating-linear-gradient(0deg,transparent,transparent 6px,rgba(255,255,255,0.15) 6px,rgba(255,255,255,0.15) 8px);}
.tube-note{font-size:clamp(9px,2.2vw,13px);font-weight:700;color:var(--teal);text-align:center;}

.tube-glow{box-shadow:0 0 12px rgba(78,205,196,0.6);}

#submit-btn{padding:clamp(8px,1.8vh,12px) clamp(24px,6vw,40px);background:var(--purple);color:#fff;border:none;border-radius:16px;font-size:clamp(13px,3.2vw,18px);font-weight:800;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 15px rgba(160,108,213,0.4);margin-top:2px;}
#submit-btn:active{transform:scale(0.95);background:#8B5CF6;}
#submit-btn:disabled{opacity:0.5;pointer-events:none;}

#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;flex-direction:column;align-items:center;justify-content:center;}
#overlay.show{display:flex;}
#overlay-box{background:var(--cream);border-radius:20px;padding:clamp(20px,5vw,36px);text-align:center;max-width:88%;box-shadow:0 8px 30px rgba(0,0,0,0.3);}
#overlay-box h2{font-size:clamp(18px,4.5vw,28px);margin-bottom:8px;color:var(--dark);}
#overlay-box p{font-size:clamp(11px,2.8vw,15px);color:var(--dark);opacity:0.8;margin-bottom:4px;}
.score-line{font-size:clamp(16px,4vw,24px);font-weight:800;margin:10px 0;}
.stars{font-size:clamp(24px,6vw,40px);margin:6px 0;}
.play-btn{margin-top:14px;padding:clamp(10px,2.5vh,16px) clamp(28px,7vw,48px);background:var(--teal);color:#fff;border:none;border-radius:16px;font-size:clamp(14px,3.5vw,20px);font-weight:800;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 15px rgba(78,205,196,0.4);}
.play-btn:active{transform:scale(0.95);}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1><span class="t1">Tube</span> <span class="t2">Tones</span></h1>
    <span id="hint">Drag tubes to match the wave</span>
  </header>
  <div id="hud">
    <div class="hud-item"><span class="hud-label">Round</span> <span id="round-num">1</span>/5</div>
    <div class="hud-item"><span class="hud-label">Score</span> <span id="score">0</span></div>
    <div class="hud-item"><span class="hud-label">Best</span> <span id="best">0</span></div>
  </div>
  <div id="stage">
    <div id="mic-area">
      <div id="mic-icon">🎙️</div>
      <div id="mic-label">listening...</div>
    </div>
    <div id="target-wave"><span id="target-label">TARGET</span><canvas id="target-canvas"></canvas></div>
    <div id="player-wave"><span id="player-label">YOUR MIX</span><canvas id="player-canvas"></canvas></div>
    <div id="match-meter"><div id="match-fill"></div><div id="match-text">0% match</div></div>
    <div id="tubes-container"></div>
    <button id="submit-btn">Lock In 🔒</button>
  </div>
</div>
<div id="overlay"><div id="overlay-box"></div></div>

<script>
(function(){
'use strict';

const NUM_TUBES = 5;
const NUM_ROUNDS = 5;
const NOTE_NAMES = ['C','D','E','F','G','A','B'];
const BASE_FREQS = [261.6, 293.7, 329.6, 349.2, 392.0, 440.0, 493.9]; // Hz for audio

let round = 0;
let score = 0;
let best = +(localStorage.getItem('tubetones-best')||0);
let targetHeights = [];
let tubeHeights = [];
let dragging = -1;
let dragStartY = 0;
let dragStartH = 0;
let animFrame = 0;
let gameActive = false;
let audioCtx = null;

const $ = s => document.querySelector(s);

$('#best').textContent = best;

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

function heightToNoteIdx(h){ return clamp(Math.round(h * (NOTE_NAMES.length-1)), 0, NOTE_NAMES.length-1); }
function heightToNote(h){ return NOTE_NAMES[heightToNoteIdx(h)]; }
function heightToAudioFreq(h){ return BASE_FREQS[heightToNoteIdx(h)]; }

// Wave frequency for visual display
function heightToWaveFreq(h){ return 0.5 + h * 3.5; }

// --- Audio ---
function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, duration){
  if(!audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }catch(e){}
}

function playChord(heights, duration){
  if(!audioCtx) return;
  heights.forEach((h,i) => {
    setTimeout(()=> playTone(heightToAudioFreq(h), duration), i * 80);
  });
}

function playSuccessChime(){
  if(!audioCtx) return;
  [523.25, 659.25, 783.99].forEach((f,i)=>{
    setTimeout(()=> playTone(f, 0.3), i*120);
  });
}

// --- Target generation ---
function generateTarget(){
  targetHeights = [];
  for(let i=0; i<NUM_TUBES; i++){
    targetHeights.push(0.08 + Math.random()*0.88);
  }
}

// --- Wave rendering ---
function buildWave(heights, canvas){
  if(!canvas.clientWidth || !canvas.clientHeight) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width = canvas.clientWidth * dpr;
  const H = canvas.height = canvas.clientHeight * dpr;
  ctx.clearRect(0,0,W,H);

  const isTarget = canvas.id === 'target-canvas';
  const baseColor = isTarget ? [160,108,213] : [78,205,196];

  ctx.lineWidth = 2 * dpr;
  const mid = H/2;
  const amp = H*0.35;

  ctx.beginPath();
  for(let x=0; x<W; x++){
    let y = 0;
    for(let i=0; i<heights.length; i++){
      const freq = heightToWaveFreq(heights[i]);
      const phase = i * 1.3;
      y += Math.sin((x/W)*Math.PI*2*freq + phase + animFrame*0.025) / heights.length;
    }
    const py = mid + y * amp;
    if(x===0) ctx.moveTo(x,py);
    else ctx.lineTo(x,py);
  }
  ctx.strokeStyle = `rgba(${baseColor.join(',')},0.85)`;
  ctx.stroke();

  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fillStyle = `rgba(${baseColor.join(',')},0.1)`;
  ctx.fill();
}

// --- Match calculation ---
function calcMatch(){
  let totalDiff = 0;
  for(let i=0; i<NUM_TUBES; i++){
    totalDiff += Math.abs(tubeHeights[i] - targetHeights[i]);
  }
  // Max possible diff is ~NUM_TUBES (each tube can differ by ~1.0)
  // Scale so that getting all tubes within ~0.1 = 100%
  const avgDiff = totalDiff / NUM_TUBES;
  const match = Math.max(0, 1 - avgDiff / 0.5);
  return Math.round(clamp(match, 0, 1) * 100);
}

function updateUI(){
  if(!gameActive) return;
  const match = calcMatch();
  $('#match-fill').style.width = match+'%';
  $('#match-text').textContent = match+'% match';

  if(match >= 85) $('#match-fill').style.background = 'var(--success)';
  else if(match >= 50) $('#match-fill').style.background = 'linear-gradient(90deg,var(--gold),var(--success))';
  else $('#match-fill').style.background = 'linear-gradient(90deg,var(--coral),var(--gold))';

  if(match >= 70){
    $('#mic-icon').classList.add('listening');
    $('#mic-label').textContent = match >= 90 ? 'perfect signal!' : 'getting closer...';
  } else {
    $('#mic-icon').classList.remove('listening');
    $('#mic-label').textContent = 'listening...';
  }

  document.querySelectorAll('.tube-note').forEach((el,i)=>{
    if(i < tubeHeights.length) el.textContent = heightToNote(tubeHeights[i]);
  });
}

// --- Tube rendering ---
function renderTubes(){
  const container = $('#tubes-container');
  container.innerHTML = '';
  for(let i=0; i<NUM_TUBES; i++){
    const col = document.createElement('div');
    col.className = 'tube-col';

    const wrapper = document.createElement('div');
    wrapper.className = 'tube-wrapper';
    wrapper.dataset.idx = i;

    const fill = document.createElement('div');
    fill.className = 'tube-fill';
    fill.style.height = (tubeHeights[i]*100)+'%';

    wrapper.appendChild(fill);

    const note = document.createElement('div');
    note.className = 'tube-note';
    note.textContent = heightToNote(tubeHeights[i]);

    col.appendChild(wrapper);
    col.appendChild(note);
    container.appendChild(col);

    // Drag events on wrapper
    const startDrag = (e) => {
      e.preventDefault();
      e.stopPropagation();
      initAudio();
      dragging = i;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      dragStartY = clientY;
      dragStartH = tubeHeights[i];
      wrapper.classList.add('tube-glow');
    };
    wrapper.addEventListener('mousedown', startDrag);
    wrapper.addEventListener('touchstart', startDrag, {passive:false});
  }
}

function onMove(e){
  if(dragging < 0 || !gameActive) return;
  e.preventDefault();
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const wrappers = document.querySelectorAll('.tube-wrapper');
  if(!wrappers.length) return;
  const wrapperH = wrappers[0].clientHeight;
  const delta = (dragStartY - clientY) / wrapperH;
  const oldNote = heightToNote(tubeHeights[dragging]);
  tubeHeights[dragging] = clamp(dragStartH + delta, 0.05, 1.0);
  const newNote = heightToNote(tubeHeights[dragging]);

  // Play tone when note changes
  if(oldNote !== newNote){
    playTone(heightToAudioFreq(tubeHeights[dragging]), 0.15);
  }

  const fills = document.querySelectorAll('.tube-fill');
  if(fills[dragging]) fills[dragging].style.height = (tubeHeights[dragging]*100)+'%';

  updateUI();
}

function onEnd(){
  if(dragging >= 0){
    const wrappers = document.querySelectorAll('.tube-wrapper');
    if(wrappers[dragging]) wrappers[dragging].classList.remove('tube-glow');
  }
  dragging = -1;
}

document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, {passive:false});
document.addEventListener('mouseup', onEnd);
document.addEventListener('touchend', onEnd);

// --- Animation loop ---
function animate(){
  animFrame++;
  if(gameActive){
    buildWave(targetHeights, $('#target-canvas'));
    buildWave(tubeHeights, $('#player-canvas'));
  }
  requestAnimationFrame(animate);
}

// --- Round management ---
function startRound(){
  round++;
  $('#round-num').textContent = round;
  generateTarget();

  tubeHeights = [];
  for(let i=0; i<NUM_TUBES; i++){
    let h;
    do { h = 0.08 + Math.random()*0.84; }
    while(Math.abs(h - targetHeights[i]) < 0.18);
    tubeHeights.push(h);
  }

  gameActive = true;
  $('#submit-btn').disabled = false;
  renderTubes();
  updateUI();

  // Play target chord so player hears what to match
  setTimeout(()=> playChord(targetHeights, 0.4), 300);
}

function roundScore(match){
  if(match >= 95) return 100;
  if(match >= 85) return 75;
  if(match >= 70) return 50;
  if(match >= 50) return 25;
  return 10;
}

function starsFor(match){
  if(match >= 95) return '⭐⭐⭐';
  if(match >= 80) return '⭐⭐';
  if(match >= 60) return '⭐';
  return '';
}

// --- Submit ---
$('#submit-btn').addEventListener('click', ()=>{
  if(!gameActive) return;
  gameActive = false;
  $('#submit-btn').disabled = true;

  initAudio();
  // Play the player's chord
  playChord(tubeHeights, 0.5);

  const match = calcMatch();
  const pts = roundScore(match);
  score += pts;
  $('#score').textContent = score;

  if(match >= 85) setTimeout(playSuccessChime, 500);

  setTimeout(()=>{
    if(round >= NUM_ROUNDS){
      if(score > best){
        best = score;
        localStorage.setItem('tubetones-best', best);
        $('#best').textContent = best;
      }
      showOverlay('game-over', match, pts);
    } else {
      showOverlay('round-end', match, pts);
    }
  }, 600);
});

// --- Overlays ---
function showOverlay(type, match, pts){
  const box = $('#overlay-box');
  if(type === 'round-end'){
    box.innerHTML = `
      <h2>Round ${round} Complete!</h2>
      <div class="stars">${starsFor(match)}</div>
      <p>${match}% match &mdash; <strong>+${pts} pts</strong></p>
      <p class="score-line">Score: ${score}</p>
      <button class="play-btn" id="next-btn">Next Round &rarr;</button>
    `;
    setTimeout(()=>{
      const btn = document.getElementById('next-btn');
      if(btn) btn.addEventListener('click', ()=>{
        $('#overlay').classList.remove('show');
        startRound();
      });
    }, 0);
  } else {
    const totalStars = score >= 400 ? '⭐⭐⭐' : score >= 250 ? '⭐⭐' : score >= 100 ? '⭐' : '';
    box.innerHTML = `
      <h2>🎙️ Session Complete!</h2>
      <div class="stars">${totalStars}</div>
      <p class="score-line">Final Score: ${score} / 500</p>
      <p>Best: ${best}</p>
      <button class="play-btn" id="restart-btn">Play Again</button>
    `;
    setTimeout(()=>{
      const btn = document.getElementById('restart-btn');
      if(btn) btn.addEventListener('click', ()=>{
        $('#overlay').classList.remove('show');
        round = 0;
        score = 0;
        $('#score').textContent = 0;
        startRound();
      });
    }, 0);
  }
  $('#overlay').classList.add('show');
}

// --- Listen button (replay target) ---
function addListenButton(){
  // The mic icon acts as a replay button
  $('#mic-icon').style.cursor = 'pointer';
  $('#mic-icon').addEventListener('click', ()=>{
    if(!gameActive) return;
    initAudio();
    playChord(targetHeights, 0.4);
    $('#mic-icon').classList.add('listening');
    setTimeout(()=>{ if(calcMatch()<70) $('#mic-icon').classList.remove('listening'); }, 800);
  });
  $('#mic-icon').addEventListener('touchend', (e)=>{
    e.preventDefault();
    if(!gameActive) return;
    initAudio();
    playChord(targetHeights, 0.4);
  });
}

// --- Intro ---
function showIntro(){
  const box = $('#overlay-box');
  box.innerHTML = `
    <h2><span style="color:var(--teal)">Tube</span> <span style="color:var(--purple)">Tones</span></h2>
    <p style="font-size:clamp(11px,2.8vw,15px);margin:10px 0;">A microphone picks up a mystery sound wave.<br>
    Adjust the <strong style="color:var(--teal)">resonance tubes</strong> to recreate it!</p>
    <p style="font-size:clamp(10px,2.4vw,13px);opacity:0.7;">Drag each tube up or down to change its pitch.<br>
    Match the <strong style="color:var(--purple)">purple target</strong> with your <strong style="color:var(--teal)">teal wave</strong>.</p>
    <p style="margin-top:6px;font-size:clamp(10px,2.4vw,13px);opacity:0.7;">Tap 🎙️ to hear the target again. 5 rounds!</p>
    <button class="play-btn" id="start-btn">Start Listening 🎙️</button>
  `;
  $('#overlay').classList.add('show');
  setTimeout(()=>{
    const btn = document.getElementById('start-btn');
    if(btn) btn.addEventListener('click', ()=>{
      initAudio();
      $('#overlay').classList.remove('show');
      startRound();
    });
  }, 0);
}

addListenButton();
animate();
showIntro();

})();
</script>
</body>
</html>
