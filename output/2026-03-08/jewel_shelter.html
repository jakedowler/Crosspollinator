<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gem Vault</title>
<style>
  :root {
    --bg: #F5F0FF;
    --ruby: #E63946;
    --sapphire: #2E86C1;
    --emerald: #27AE60;
    --amber: #F39C12;
    --amethyst: #8E44AD;
    --light: #2C3E50;
    --bronze: #8B6914;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #F5F0FF, #E8F4FD, #FFF5F5);
    color: var(--light);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  header {
    text-align: center;
    padding: 6px 0 2px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.3rem;
    letter-spacing: 0.12em;
    background: linear-gradient(90deg, var(--ruby), var(--amber), var(--emerald), var(--sapphire), var(--amethyst));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-size: 0.7rem;
    opacity: 0.55;
    margin-top: 1px;
  }

  #status {
    font-size: 0.72rem;
    opacity: 0.7;
    padding: 3px 10px;
    text-align: center;
    flex-shrink: 0;
    min-height: 1.4em;
  }

  #game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 500px;
    min-height: 0;
  }

  #board-wrap {
    position: relative;
    width: min(78vw, 52vh, 420px);
    height: min(78vw, 52vh, 420px);
    flex-shrink: 0;
  }

  #board {
    position: absolute;
    inset: 0;
  }

  canvas#beamCanvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  .cell {
    position: absolute;
    border: 1.5px solid rgba(100, 80, 160, 0.15);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, box-shadow 0.3s;
    cursor: pointer;
    font-size: 1rem;
    background: rgba(255,255,255,0.5);
  }

  .cell.interactive:hover,
  .cell.interactive:active {
    border-color: var(--amethyst);
    box-shadow: inset 0 0 8px rgba(142,68,173,0.15);
    background: rgba(255,255,255,0.8);
  }

  .cell.center-gem {
    border: 2.5px solid var(--amber);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(243,156,18,0.2), rgba(255,255,255,0.6));
    cursor: default;
    box-shadow: 0 0 15px rgba(243,156,18,0.25);
  }

  .cell.center-gem.lit {
    box-shadow: 0 0 30px rgba(243,156,18,0.7), 0 0 60px rgba(243,156,18,0.3);
    animation: gemPulse 1.5s ease-in-out infinite;
  }

  @keyframes gemPulse {
    0%, 100% { box-shadow: 0 0 30px rgba(243,156,18,0.7), 0 0 60px rgba(243,156,18,0.3); }
    50% { box-shadow: 0 0 45px rgba(243,156,18,0.9), 0 0 90px rgba(243,156,18,0.4); }
  }

  .cell.wall {
    background: rgba(100, 80, 160, 0.08);
    border-color: rgba(100, 80, 160, 0.15);
    cursor: default;
    opacity: 0.4;
  }

  .cell.emitter {
    border-color: rgba(243,156,18,0.6);
    background: rgba(243,156,18,0.08);
    cursor: default;
  }

  .cell.occupied {
    cursor: pointer;
  }

  .panel-ruby { background: rgba(230, 57, 70, 0.25); border-color: var(--ruby) !important; }
  .panel-sapphire { background: rgba(46, 134, 193, 0.25); border-color: var(--sapphire) !important; }
  .panel-emerald { background: rgba(39, 174, 96, 0.25); border-color: var(--emerald) !important; }
  .panel-amber { background: rgba(243, 156, 18, 0.25); border-color: var(--amber) !important; }
  .panel-amethyst { background: rgba(142, 68, 173, 0.25); border-color: var(--amethyst) !important; }

  .cell.highlight-target {
    box-shadow: inset 0 0 12px rgba(241, 250, 238, 0.15);
    border-color: rgba(241, 250, 238, 0.4) !important;
  }

  /* Tray */
  #tray {
    display: flex;
    gap: 8px;
    padding: 8px 14px;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(100, 80, 160, 0.2);
    border-radius: 10px;
    margin: 6px 10px;
    flex-wrap: wrap;
    justify-content: center;
    flex-shrink: 0;
  }

  .tray-panel {
    width: clamp(40px, 12vw, 56px);
    height: clamp(40px, 12vw, 56px);
    border: 2.5px solid;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(18px, 5vw, 28px);
    transition: transform 0.15s, box-shadow 0.2s;
    position: relative;
  }

  .tray-panel:hover {
    transform: scale(1.08);
  }

  .tray-panel.selected {
    transform: scale(1.12);
    box-shadow: 0 0 18px currentColor;
    outline: 2px solid var(--light);
    outline-offset: 2px;
  }

  .tray-panel .hint {
    position: absolute;
    bottom: 1px;
    right: 3px;
    font-size: 0.55rem;
    opacity: 0.6;
  }

  #controls {
    display: flex;
    gap: 10px;
    padding-bottom: 10px;
    flex-shrink: 0;
  }

  button {
    background: rgba(142, 68, 173, 0.1);
    border: 1px solid rgba(142, 68, 173, 0.4);
    color: var(--light);
    padding: 7px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    transition: background 0.2s;
  }

  button:hover, button:active { background: rgba(142, 68, 173, 0.25); }

  /* Win overlay */
  #win-overlay {
    position: fixed;
    inset: 0;
    background: rgba(245, 240, 255, 0.95);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  #win-overlay.show { display: flex; }

  #win-overlay h2 {
    font-size: 2rem;
    margin-bottom: 8px;
    background: linear-gradient(90deg, var(--ruby), var(--amber), var(--emerald), var(--sapphire), var(--amethyst));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2s linear infinite;
    background-size: 200%;
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  #win-overlay p { font-size: 1rem; opacity: 0.8; margin-bottom: 16px; }
  #win-overlay .stats { font-size: 0.9rem; opacity: 0.65; margin-bottom: 14px; }

  .sparkle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 101;
    animation: sparkleAnim 1s ease-out forwards;
  }

  @keyframes sparkleAnim {
    0% { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0) translateY(-80px); }
  }
</style>
</head>
<body>

<header>
  <h1>GEM VAULT</h1>
  <p>Place mirror panels to guide light beams to the central jewel</p>
</header>

<div id="status">Select a panel below, then tap an empty cell to place it</div>

<div id="game-area">
  <div id="board-wrap">
    <div id="board"></div>
    <canvas id="beamCanvas"></canvas>
  </div>
</div>

<div id="tray"></div>

<div id="controls">
  <button id="btnNew">New Puzzle</button>
  <button id="btnClear">Clear Board</button>
</div>

<div id="win-overlay">
  <h2>BRILLIANT!</h2>
  <p>All beams reached the gem!</p>
  <div class="stats" id="win-stats"></div>
  <button id="btnAgain">Play Again</button>
</div>

<script>
(function() {
  'use strict';

  const GRID = 7;
  const CENTER = 3;
  const DIRS = {
    right: { dr: 0, dc: 1 },
    left:  { dr: 0, dc: -1 },
    down:  { dr: 1, dc: 0 },
    up:    { dr: -1, dc: 0 }
  };
  const DIR_ARROWS = { right: '\u2192', left: '\u2190', down: '\u2193', up: '\u2191' };
  const SLASH = 0;   // / mirror: right->up, down->left, left->down, up->right
  const BACK = 1;    // \ mirror: right->down, down->right, left->up, up->left
  const MIRROR_CHARS = ['\u2571', '\u2572']; // ╱ ╲

  const PANEL_TYPES = [
    { name: 'ruby',     color: '#E63946', css: 'panel-ruby' },
    { name: 'sapphire', color: '#457B9D', css: 'panel-sapphire' },
    { name: 'emerald',  color: '#2A9D8F', css: 'panel-emerald' },
    { name: 'amber',    color: '#E9C46A', css: 'panel-amber' },
    { name: 'amethyst', color: '#7B2D8E', css: 'panel-amethyst' }
  ];

  const BEAM_COLORS = ['#E63946', '#2E86C1', '#27AE60', '#F39C12', '#8E44AD'];

  function reflect(dir, mirror) {
    if (mirror === SLASH) {
      return { right: 'up', down: 'left', left: 'down', up: 'right' }[dir];
    }
    return { right: 'down', down: 'right', left: 'up', up: 'left' }[dir];
  }

  function isEdge(r, c) {
    return r === 0 || r === GRID - 1 || c === 0 || c === GRID - 1;
  }

  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── State ──
  let grid = [];          // grid[r][c] = null | {wall:true} | {panelIdx, orientation}
  let emitters = [];      // [{r, c, dir}]
  let panels = [];        // [{typeIdx, orientation}]
  let selected = null;    // panel index in tray, or null
  let moveCount = 0;
  let startTime = 0;
  let won = false;

  const boardEl = document.getElementById('board');
  const canvas = document.getElementById('beamCanvas');
  const ctx = canvas.getContext('2d');
  const trayEl = document.getElementById('tray');
  const statusEl = document.getElementById('status');
  const winOverlay = document.getElementById('win-overlay');

  // ── Puzzle Generation ──
  function canReach(fromR, fromC, dir, toR, toC, blocked) {
    const d = DIRS[dir];
    let r = fromR + d.dr, c = fromC + d.dc;
    while (r >= 0 && r < GRID && c >= 0 && c < GRID) {
      if (r === toR && c === toC) return true;
      if (blocked.some(b => b.r === r && b.c === c)) return false;
      r += d.dr;
      c += d.dc;
    }
    return false;
  }

  function findPath(sr, sc, sdir, tr, tc, existing) {
    // Try 0 reflections (direct line)
    if (canReach(sr, sc, sdir, tr, tc, existing)) {
      return [];
    }
    // Try 1 reflection
    for (let r = 1; r < GRID - 1; r++) {
      for (let c = 1; c < GRID - 1; c++) {
        if (r === tr && c === tc) continue;
        if (existing.some(e => e.r === r && e.c === c)) continue;
        if (!canReach(sr, sc, sdir, r, c, existing)) continue;
        for (const ori of [SLASH, BACK]) {
          const nd = reflect(sdir, ori);
          if (canReach(r, c, nd, tr, tc, existing)) {
            return [{ r, c, orientation: ori }];
          }
        }
      }
    }
    // Try 2 reflections
    for (let r1 = 1; r1 < GRID - 1; r1++) {
      for (let c1 = 1; c1 < GRID - 1; c1++) {
        if (r1 === tr && c1 === tc) continue;
        if (existing.some(e => e.r === r1 && e.c === c1)) continue;
        if (!canReach(sr, sc, sdir, r1, c1, existing)) continue;
        for (const o1 of [SLASH, BACK]) {
          const d1 = reflect(sdir, o1);
          for (let r2 = 1; r2 < GRID - 1; r2++) {
            for (let c2 = 1; c2 < GRID - 1; c2++) {
              if (r2 === tr && c2 === tc) continue;
              if (r2 === r1 && c2 === c1) continue;
              if (existing.some(e => e.r === r2 && e.c === c2)) continue;
              if (!canReach(r1, c1, d1, r2, c2, [...existing, {r:r1,c:c1}])) continue;
              for (const o2 of [SLASH, BACK]) {
                const d2 = reflect(d1, o2);
                if (canReach(r2, c2, d2, tr, tc, [...existing, {r:r1,c:c1}, {r:r2,c:c2}])) {
                  return [
                    { r: r1, c: c1, orientation: o1 },
                    { r: r2, c: c2, orientation: o2 }
                  ];
                }
              }
            }
          }
        }
      }
    }
    return null;
  }

  function generatePuzzle() {
    // Init grid
    grid = [];
    for (let r = 0; r < GRID; r++) {
      grid[r] = new Array(GRID).fill(null);
    }
    emitters = [];
    panels = [];
    won = false;
    moveCount = 0;
    selected = null;
    startTime = Date.now();

    // Candidate emitter positions (edges, not corners)
    const edges = [];
    for (let i = 1; i < GRID - 1; i++) {
      edges.push({ r: 0, c: i, dir: 'down' });
      edges.push({ r: GRID - 1, c: i, dir: 'up' });
      edges.push({ r: i, c: 0, dir: 'right' });
      edges.push({ r: i, c: GRID - 1, dir: 'left' });
    }
    shuffle(edges);

    const solution = [];
    const targetEmitters = 4;

    for (let e = 0; e < edges.length && emitters.length < targetEmitters; e++) {
      const em = edges[e];
      const path = findPath(em.r, em.c, em.dir, CENTER, CENTER, solution);
      if (path !== null) {
        emitters.push(em);
        solution.push(...path);
      }
    }

    if (emitters.length < 2) {
      generatePuzzle();
      return;
    }

    // Build solution beam paths to know which cells beams pass through
    const beamCells = new Set();
    emitters.forEach(em => {
      const cells = traceBeamPath(em.r, em.c, em.dir, solution);
      cells.forEach(k => beamCells.add(k));
    });

    // Create tray panels from solution mirrors
    const typeIndices = solution.map((_, i) => i % PANEL_TYPES.length);
    shuffle(typeIndices);
    solution.forEach((s, i) => {
      panels.push({
        typeIdx: typeIndices[i],
        orientation: Math.random() < 0.5 ? SLASH : BACK // randomize starting orientation
      });
    });

    // Add 1-2 distractor panels
    const extra = Math.min(2, 6 - panels.length);
    for (let i = 0; i < extra; i++) {
      panels.push({
        typeIdx: (panels.length) % PANEL_TYPES.length,
        orientation: Math.random() < 0.5 ? SLASH : BACK
      });
    }
    shuffle(panels);

    // Place walls avoiding solution cells and beam paths
    const wallCandidates = [];
    for (let r = 1; r < GRID - 1; r++) {
      for (let c = 1; c < GRID - 1; c++) {
        if (r === CENTER && c === CENTER) continue;
        if (solution.some(s => s.r === r && s.c === c)) continue;
        if (beamCells.has(r + ',' + c)) continue;
        wallCandidates.push({ r, c });
      }
    }
    shuffle(wallCandidates);
    for (let i = 0; i < Math.min(5, wallCandidates.length); i++) {
      grid[wallCandidates[i].r][wallCandidates[i].c] = { wall: true };
    }
  }

  // Trace beam path given known mirror placements (for puzzle gen)
  function traceBeamPath(startR, startC, startDir, mirrors) {
    const cells = new Set();
    let r = startR, c = startC, dir = startDir;
    for (let step = 0; step < 30; step++) {
      const d = DIRS[dir];
      let nr = r + d.dr, nc = c + d.dc;
      while (nr >= 0 && nr < GRID && nc >= 0 && nc < GRID) {
        cells.add(nr + ',' + nc);
        if (nr === CENTER && nc === CENTER) return cells;
        const mirror = mirrors.find(m => m.r === nr && m.c === nc);
        if (mirror) {
          dir = reflect(dir, mirror.orientation);
          r = nr; c = nc;
          break;
        }
        nr += d.dr; nc += d.dc;
      }
      if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) break;
    }
    return cells;
  }

  // ── Beam Tracing (live, uses grid state) ──
  function traceAllSegments(startR, startC, startDir) {
    const segments = [];
    let r = startR, c = startC, dir = startDir;
    const visited = new Set();

    for (let step = 0; step < 20; step++) {
      const d = DIRS[dir];
      let nr = r + d.dr, nc = c + d.dc;
      let endR = r, endC = c;
      let hitPanel = false;

      while (nr >= 0 && nr < GRID && nc >= 0 && nc < GRID) {
        const key = nr + ',' + nc + ',' + dir;
        if (visited.has(key)) {
          segments.push({ fromR: r, fromC: c, toR: endR, toC: endC });
          return segments;
        }

        if (nr === CENTER && nc === CENTER) {
          segments.push({ fromR: r, fromC: c, toR: nr, toC: nc, hitGem: true });
          return segments;
        }

        const cell = grid[nr][nc];
        if (cell && cell.wall) {
          // Beam stops at the edge of the cell before the wall
          segments.push({ fromR: r, fromC: c, toR: endR, toC: endC, hitWall: true });
          return segments;
        }

        if (cell && cell.panelIdx !== undefined) {
          visited.add(key);
          segments.push({ fromR: r, fromC: c, toR: nr, toC: nc });
          dir = reflect(dir, cell.orientation);
          r = nr; c = nc;
          hitPanel = true;
          break;
        }

        endR = nr; endC = nc;
        nr += d.dr; nc += d.dc;
      }

      if (!hitPanel) {
        segments.push({ fromR: r, fromC: c, toR: endR, toC: endC, hitEdge: true });
        break;
      }
    }
    return segments;
  }

  // ── Rendering ──
  function render() {
    renderBoard();
    renderTray();
    renderBeams();
  }

  function renderBoard() {
    boardEl.innerHTML = '';
    const wrap = document.getElementById('board-wrap');
    const size = wrap.clientWidth;
    const cellSize = size / GRID;

    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        const el = document.createElement('div');
        el.className = 'cell';
        el.style.left = (c * cellSize) + 'px';
        el.style.top = (r * cellSize) + 'px';
        el.style.width = cellSize + 'px';
        el.style.height = cellSize + 'px';
        el.style.fontSize = (cellSize * 0.45) + 'px';

        const isCenter = r === CENTER && c === CENTER;
        const emitter = emitters.find(e => e.r === r && e.c === c);
        const cell = grid[r][c];

        if (isCenter) {
          el.classList.add('center-gem');
          el.style.fontSize = (cellSize * 0.55) + 'px';
          el.textContent = '\uD83D\uDC8E'; // 💎
        } else if (emitter) {
          el.classList.add('emitter');
          el.style.fontSize = (cellSize * 0.32) + 'px';
          el.textContent = '\u2600' + DIR_ARROWS[emitter.dir]; // ☀ + arrow
        } else if (cell && cell.wall) {
          el.classList.add('wall');
          el.textContent = '\u2588'; // █
        } else if (cell && cell.panelIdx !== undefined) {
          const pt = PANEL_TYPES[panels[cell.panelIdx].typeIdx];
          el.classList.add(pt.css, 'occupied');
          el.style.fontSize = (cellSize * 0.55) + 'px';
          el.textContent = MIRROR_CHARS[cell.orientation];
          el.addEventListener('click', () => onCellClick(r, c));
        } else if (!isEdge(r, c)) {
          el.classList.add('interactive');
          if (selected !== null) el.classList.add('highlight-target');
          el.addEventListener('click', () => onCellClick(r, c));
        } else {
          el.classList.add('wall');
        }

        boardEl.appendChild(el);
      }
    }
  }

  function renderTray() {
    trayEl.innerHTML = '';
    panels.forEach((p, i) => {
      if (panelOnBoard(i)) return;

      const el = document.createElement('div');
      const pt = PANEL_TYPES[p.typeIdx];
      el.className = 'tray-panel ' + pt.css;
      el.style.borderColor = pt.color;
      el.style.color = pt.color;
      el.textContent = MIRROR_CHARS[p.orientation];

      const hint = document.createElement('span');
      hint.className = 'hint';
      hint.textContent = '\u21BB'; // ↻
      el.appendChild(hint);

      if (selected === i) el.classList.add('selected');

      el.addEventListener('click', (e) => {
        e.stopPropagation();
        if (won) return;
        if (selected === i) {
          // Double-tap to rotate in tray
          p.orientation = p.orientation === SLASH ? BACK : SLASH;
          render();
        } else {
          selected = i;
          setStatus('Tap an empty cell to place this panel');
          render();
        }
      });

      trayEl.appendChild(el);
    });
  }

  function renderBeams() {
    const wrap = document.getElementById('board-wrap');
    const size = wrap.clientWidth;
    canvas.width = size;
    canvas.height = size;
    ctx.clearRect(0, 0, size, size);
    const cellSize = size / GRID;

    let allHitGem = emitters.length > 0;

    emitters.forEach((em, ei) => {
      const color = BEAM_COLORS[ei % BEAM_COLORS.length];
      const segs = traceAllSegments(em.r, em.c, em.dir);
      let hitGem = false;

      segs.forEach(seg => {
        const x1 = (seg.fromC + 0.5) * cellSize;
        const y1 = (seg.fromR + 0.5) * cellSize;
        const x2 = (seg.toC + 0.5) * cellSize;
        const y2 = (seg.toR + 0.5) * cellSize;

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = seg.hitGem ? '#F1FAEE' : color;
        ctx.lineWidth = seg.hitGem ? 4 : 2.5;
        ctx.shadowColor = color;
        ctx.shadowBlur = seg.hitGem ? 18 : 8;
        ctx.globalAlpha = 0.85;
        ctx.stroke();
        ctx.restore();

        if (seg.hitGem) hitGem = true;
      });

      if (!hitGem) allHitGem = false;
    });

    // Gem glow
    const gemEl = boardEl.querySelector('.center-gem');
    if (gemEl) {
      gemEl.classList.toggle('lit', allHitGem);
    }
  }

  function panelOnBoard(idx) {
    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        if (grid[r][c] && grid[r][c].panelIdx === idx) return true;
      }
    }
    return false;
  }

  // ── Interaction ──
  function onCellClick(r, c) {
    if (won) return;
    const cell = grid[r][c];

    if (cell && cell.panelIdx !== undefined) {
      // Clicking a placed panel
      if (selected !== null && !panelOnBoard(selected)) {
        // Swap tray panel with board panel
        const oldIdx = cell.panelIdx;
        const p = panels[selected];
        grid[r][c] = { panelIdx: selected, orientation: p.orientation };
        selected = oldIdx;
        moveCount++;
        setStatus('Swapped! Place this panel or tap another.');
      } else {
        // Rotate placed panel
        cell.orientation = cell.orientation === SLASH ? BACK : SLASH;
        moveCount++;
        setStatus('Rotated! Keep adjusting or place more panels.');
      }
      render();
      checkWin();
      return;
    }

    // Empty interior cell
    if (isEdge(r, c)) return;
    if (r === CENTER && c === CENTER) return;
    if (cell !== null) return; // wall

    if (selected !== null && !panelOnBoard(selected)) {
      const p = panels[selected];
      grid[r][c] = { panelIdx: selected, orientation: p.orientation };
      moveCount++;
      selected = null;
      setStatus('Panel placed! Tap panels on board to rotate them.');
      render();
      checkWin();
    } else {
      setStatus('Select a panel from the tray first');
    }
  }

  function checkWin() {
    if (emitters.length === 0) return;
    const allHit = emitters.every(em => {
      const segs = traceAllSegments(em.r, em.c, em.dir);
      return segs.some(s => s.hitGem);
    });
    if (allHit) {
      won = true;
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      document.getElementById('win-stats').textContent =
        'Moves: ' + moveCount + ' \u00B7 Time: ' + mins + ':' + String(secs).padStart(2, '0');
      setTimeout(() => {
        winOverlay.classList.add('show');
        spawnSparkles();
      }, 500);
    }
  }

  function spawnSparkles() {
    const colors = ['#E63946', '#457B9D', '#2A9D8F', '#E9C46A', '#7B2D8E', '#F1FAEE'];
    for (let i = 0; i < 35; i++) {
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'sparkle';
        const sz = 4 + Math.random() * 8;
        s.style.width = sz + 'px';
        s.style.height = sz + 'px';
        s.style.left = (15 + Math.random() * 70) + 'vw';
        s.style.top = (15 + Math.random() * 70) + 'vh';
        s.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1000);
      }, i * 60);
    }
  }

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  function clearBoard() {
    if (won) return;
    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        if (grid[r][c] && grid[r][c].panelIdx !== undefined) {
          grid[r][c] = null;
        }
      }
    }
    selected = null;
    setStatus('Board cleared. Select a panel from the tray.');
    render();
  }

  function newGame() {
    winOverlay.classList.remove('show');
    generatePuzzle();
    setStatus('Select a panel below, then tap an empty cell to place it');
    render();
  }

  // ── Events ──
  document.getElementById('btnNew').addEventListener('click', newGame);
  document.getElementById('btnClear').addEventListener('click', clearBoard);
  document.getElementById('btnAgain').addEventListener('click', newGame);
  window.addEventListener('resize', () => render());

  // Deselect when clicking background
  document.body.addEventListener('click', (e) => {
    if (e.target === document.body || e.target.id === 'game-area') {
      if (selected !== null) {
        selected = null;
        setStatus('Selection cleared. Tap a panel to select it.');
        render();
      }
    }
  });

  // ── Init ──
  newGame();
})();
</script>
</body>
</html>
