<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Firebreak</title>
<style>
  :root {
    --flame1: #FF6B35;
    --flame2: #FF3E00;
    --ember: #FFD166;
    --sky: #90E0EF;
    --rock: #577590;
    --green: #06D6A0;
    --snow: #F8F9FA;
    --dark: #1D3557;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(180deg, #CAF0F8 0%, #ADE8F4 25%, #FFD166 65%, #FF6B35 100%);
    color: var(--dark);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  header {
    text-align: center;
    padding: 6px 0 2px;
    flex-shrink: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 1.3rem;
    letter-spacing: 0.12em;
    background: linear-gradient(90deg, #CAF0F8, #FFFFFF, #FFD166, #FF6B35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-size: 0.62rem;
    color: rgba(255,255,255,0.75);
    margin-top: 1px;
  }

  #status-bar {
    display: flex;
    justify-content: space-around;
    align-items: center;
    width: 100%;
    max-width: 400px;
    padding: 3px 10px;
    font-size: 0.75rem;
    font-weight: 600;
    color: rgba(255,255,255,0.95);
    flex-shrink: 0;
    z-index: 10;
  }

  #game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 400px;
    min-height: 0;
    padding: 4px 0;
  }

  #grid {
    display: grid;
    width: min(82vw, 340px);
    height: min(62vh, 480px);
    gap: 2px;
    background: rgba(29, 53, 87, 0.12);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    flex-shrink: 0;
  }

  .cell {
    position: relative;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.25s, box-shadow 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    overflow: hidden;
    touch-action: manipulation;
  }

  .cell.rock {
    background: linear-gradient(145deg, #8D99AE, #577590);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.15), inset 0 -1px 2px rgba(0,0,0,0.15);
  }

  .cell.vegetation {
    background: linear-gradient(145deg, #2DC98D, #058C6B);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.15);
  }

  .cell.hold {
    background: linear-gradient(145deg, #FFD166, #EFB810);
    box-shadow: 0 0 6px rgba(255, 209, 102, 0.5), inset 0 1px 2px rgba(255,255,255,0.3);
  }

  .cell.fire {
    background: linear-gradient(145deg, var(--flame1), var(--flame2));
    animation: burn 0.5s ease-in-out infinite alternate;
    box-shadow: 0 0 8px rgba(255, 62, 0, 0.5);
  }

  .cell.scorched {
    background: linear-gradient(145deg, #3A3A3A, #1A1A1A);
  }

  .cell.climber {
    z-index: 5;
    background: linear-gradient(145deg, #FFD166, #EFB810) !important;
  }

  .cell.climber::after {
    content: '';
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, #FFFFFF, #CAF0F8);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(202, 240, 248, 0.9), 0 0 16px rgba(144, 224, 239, 0.4);
    animation: pulse 1s ease-in-out infinite;
  }

  .cell.summit {
    background: linear-gradient(145deg, #E0F7FA, #FFFFFF);
    box-shadow: 0 0 10px rgba(202, 240, 248, 0.5);
  }

  .cell.reachable {
    outline: 2px solid rgba(255, 255, 255, 0.8);
    outline-offset: -2px;
    animation: glow 1.2s ease-in-out infinite alternate;
  }

  .cell.firebreak {
    background: linear-gradient(145deg, #ADB5BD, #6C757D);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  }

  @keyframes burn {
    from { filter: brightness(1); }
    to { filter: brightness(1.25); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(0.85); opacity: 0.85; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  @keyframes glow {
    from { outline-color: rgba(255, 255, 255, 0.4); }
    to { outline-color: rgba(255, 255, 255, 0.9); }
  }

  #controls {
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    padding: 6px 8px;
    z-index: 10;
  }

  .btn {
    padding: 9px 18px;
    border: none;
    border-radius: 22px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    touch-action: manipulation;
  }

  .btn:active { transform: scale(0.94); }

  .btn-climb {
    background: linear-gradient(135deg, var(--ember), var(--flame1));
    color: white;
    box-shadow: 0 3px 10px rgba(255, 107, 53, 0.4);
  }

  .btn-firebreak {
    background: linear-gradient(135deg, var(--rock), var(--dark));
    color: white;
    box-shadow: 0 3px 10px rgba(87, 117, 144, 0.4);
  }

  .btn-firebreak.active {
    outline: 3px solid var(--ember);
    outline-offset: 2px;
  }

  .btn:disabled { opacity: 0.35; cursor: default; }

  #hint {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 2px 10px 6px;
    flex-shrink: 0;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  #overlay.show { display: flex; }

  .modal {
    background: white;
    border-radius: 18px;
    padding: 28px 24px;
    text-align: center;
    max-width: 300px;
    width: 85vw;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }

  .modal h2 { font-size: 1.4rem; margin-bottom: 6px; }
  .modal p { font-size: 0.85rem; color: #555; margin-bottom: 18px; line-height: 1.45; }
  .modal .btn { padding: 11px 30px; font-size: 0.9rem; }
  .modal .result-icon { font-size: 2.8rem; margin-bottom: 6px; }

  .legend {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 2px 0;
    flex-shrink: 0;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.7);
  }
  .legend span { display: flex; align-items: center; gap: 2px; }
  .legend-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 2px;
  }
</style>
</head>
<body>
<header>
  <h1>FIREBREAK</h1>
  <p>climb x wildfire</p>
</header>

<div id="status-bar">
  <span id="altitude-display">Alt: 0/11</span>
  <span id="moves-display">Moves: 0</span>
  <span id="breaks-display">Breaks: 3</span>
</div>

<div class="legend">
  <span><span class="legend-dot" style="background:#FFD166"></span> Hold</span>
  <span><span class="legend-dot" style="background:#2DC98D"></span> Brush</span>
  <span><span class="legend-dot" style="background:#8D99AE"></span> Rock</span>
  <span><span class="legend-dot" style="background:#6C757D;border:1px solid #aaa"></span> Break</span>
</div>

<div id="game-area">
  <div id="grid"></div>
</div>

<div id="controls">
  <button class="btn btn-firebreak" id="btn-firebreak" onclick="toggleFirebreakMode()">Firebreak (3)</button>
</div>

<div id="hint">Tap glowing holds to climb. Fire chases you!</div>

<div id="overlay">
  <div class="modal" id="modal">
    <div class="result-icon" id="result-icon"></div>
    <h2 id="result-title"></h2>
    <p id="result-text"></p>
    <button class="btn btn-climb" onclick="startGame()">Play Again</button>
  </div>
</div>

<script>
const COLS = 7;
const ROWS = 12;
let grid = [];
let climberPos = { r: ROWS - 1, c: 0 };
let moves = 0;
let firebreaks = 3;
let firebreakMode = false;
let gameOver = false;
let touchHandled = false;

function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) {
      if (r === 0) {
        row.push('summit');
      } else if (r >= ROWS - 1) {
        row.push('hold');
      } else {
        const rng = Math.random();
        if (rng < 0.30) row.push('hold');
        else if (rng < 0.60) row.push('vegetation');
        else row.push('rock');
      }
    }
    grid.push(row);
  }
  ensurePath();

  // Start climber on a hold in the bottom row
  let startC = Math.floor(COLS / 2);
  for (let c = 0; c < COLS; c++) {
    if (grid[ROWS - 1][c] === 'hold') { startC = c; break; }
  }
  climberPos = { r: ROWS - 1, c: startC };
}

function ensurePath() {
  // Carve a guaranteed winding path of holds bottom to top
  let c = Math.floor(COLS / 2);
  for (let r = ROWS - 1; r >= 0; r--) {
    grid[r][c] = r === 0 ? 'summit' : 'hold';
    // Random shift for next row
    const roll = Math.random();
    const shift = roll < 0.33 ? -1 : roll < 0.66 ? 1 : 0;
    c = Math.max(0, Math.min(COLS - 1, c + shift));
  }
  // Add a second partial path for variety
  c = Math.random() < 0.5 ? 0 : COLS - 1;
  for (let r = ROWS - 1; r >= Math.floor(ROWS / 3); r--) {
    if (grid[r][c] !== 'summit') grid[r][c] = 'hold';
    const roll = Math.random();
    const shift = roll < 0.3 ? -1 : roll < 0.6 ? 1 : 0;
    c = Math.max(0, Math.min(COLS - 1, c + shift));
  }
}

function canReach(fromR, fromC, toR, toC) {
  if (toR > fromR) return false; // can't climb down
  if (toR === fromR && toC === fromC) return false;
  const dr = Math.abs(fromR - toR);
  const dc = Math.abs(fromC - toC);
  // Can reach 1 step in any up direction, or 2 steps straight up
  return (dr <= 1 && dc <= 1) || (dr === 2 && dc === 0);
}

function getReachableCells() {
  const reachable = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = grid[r][c];
      if ((t === 'hold' || t === 'summit') &&
          canReach(climberPos.r, climberPos.c, r, c)) {
        reachable.push({ r, c });
      }
    }
  }
  return reachable;
}

function renderGrid() {
  const gridEl = document.getElementById('grid');
  gridEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
  gridEl.style.gridTemplateRows = `repeat(${ROWS}, 1fr)`;
  gridEl.innerHTML = '';

  const reachable = gameOver ? [] : getReachableCells();
  const reachableSet = new Set(reachable.map(p => `${p.r},${p.c}`));

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      const type = grid[r][c];
      cell.className = 'cell ' + type;

      const isClimber = r === climberPos.r && c === climberPos.c && !gameOver;
      if (isClimber) cell.classList.add('climber');

      if (reachableSet.has(`${r},${c}`) && !isClimber) {
        cell.classList.add('reachable');
      }

      // Icons
      if (type === 'summit') cell.textContent = '\u26F0';
      else if (type === 'fire') cell.textContent = '\uD83D\uDD25';
      else if (type === 'firebreak') cell.textContent = '\u2573';

      const row = r, col = c;
      cell.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        onCellClick(row, col);
      });

      gridEl.appendChild(cell);
    }
  }
  updateStatus();
}

function onCellClick(r, c) {
  if (gameOver) return;

  if (firebreakMode) {
    placeFirebreak(r, c);
    return;
  }

  const reachable = getReachableCells();
  if (!reachable.some(p => p.r === r && p.c === c)) return;

  climberPos = { r, c };
  moves++;

  if (grid[r][c] === 'summit') {
    endGame(true);
    return;
  }

  // Fire spreads after each climb
  spreadFire();

  // Check if climber's cell caught fire
  if (grid[climberPos.r][climberPos.c] === 'fire' ||
      grid[climberPos.r][climberPos.c] === 'scorched') {
    endGame(false);
    return;
  }

  // Check if stuck
  if (getReachableCells().length === 0) {
    endGame(false);
    return;
  }

  renderGrid();
}

function spreadFire() {
  // On first move, ignite bottom row brush
  const isFirst = !grid.some(row => row.some(c => c === 'fire' || c === 'scorched'));

  if (isFirst) {
    for (let c = 0; c < COLS; c++) {
      if (grid[ROWS - 1][c] === 'vegetation') {
        grid[ROWS - 1][c] = 'fire';
      }
    }
    // Also ignite a random bottom cell
    const rc = Math.floor(Math.random() * COLS);
    if (grid[ROWS - 1][rc] !== 'summit' && grid[ROWS - 1][rc] !== 'firebreak') {
      grid[ROWS - 1][rc] = 'fire';
    }
    return;
  }

  const newFires = [];

  for (let r = ROWS - 1; r >= 0; r--) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] !== 'fire') continue;

      // Fire spreads to all 5 upward/lateral neighbors
      const neighbors = [
        [r - 1, c], [r, c - 1], [r, c + 1],
        [r - 1, c - 1], [r - 1, c + 1]
      ];

      for (const [nr, nc] of neighbors) {
        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
        const t = grid[nr][nc];
        if (t === 'fire' || t === 'scorched' || t === 'firebreak' || t === 'summit') continue;

        if (t === 'vegetation') {
          newFires.push([nr, nc]);
        } else if (t === 'rock') {
          if (Math.random() < 0.15) newFires.push([nr, nc]);
        } else if (t === 'hold') {
          if (Math.random() < 0.12) newFires.push([nr, nc]);
        }
      }

      // Fire can burn out
      if (Math.random() < 0.2) grid[r][c] = 'scorched';
    }
  }

  for (const [r, c] of newFires) {
    grid[r][c] = 'fire';
  }

  // Steadily ignite bottom edge
  for (let c = 0; c < COLS; c++) {
    const t = grid[ROWS - 1][c];
    if (t !== 'fire' && t !== 'scorched' && t !== 'firebreak' && t !== 'summit') {
      if (Math.random() < 0.2) grid[ROWS - 1][c] = 'fire';
    }
  }
}

function placeFirebreak(r, c) {
  if (firebreaks <= 0) return;
  const t = grid[r][c];
  if (t !== 'vegetation' && t !== 'rock') return;
  if (r === climberPos.r && c === climberPos.c) return;

  grid[r][c] = 'firebreak';
  firebreaks--;

  document.getElementById('btn-firebreak').textContent = `Firebreak (${firebreaks})`;
  if (firebreaks <= 0) {
    firebreakMode = false;
    document.getElementById('btn-firebreak').classList.remove('active');
    document.getElementById('btn-firebreak').disabled = true;
  }
  renderGrid();
}

function toggleFirebreakMode() {
  if (firebreaks <= 0 || gameOver) return;
  firebreakMode = !firebreakMode;
  document.getElementById('btn-firebreak').classList.toggle('active', firebreakMode);
  document.getElementById('hint').textContent = firebreakMode
    ? 'Tap brush or rock to dig a firebreak'
    : 'Tap glowing holds to climb. Fire chases you!';
}

function updateStatus() {
  const alt = ROWS - 1 - climberPos.r;
  document.getElementById('altitude-display').textContent = `Alt: ${alt}/${ROWS - 1}`;
  document.getElementById('moves-display').textContent = `Moves: ${moves}`;
  document.getElementById('breaks-display').textContent = `Breaks: ${firebreaks}`;
}

function endGame(won) {
  gameOver = true;
  const alt = ROWS - 1 - climberPos.r;

  document.getElementById('result-icon').textContent = won ? '\u26F0\uFE0F' : '\uD83D\uDD25';
  document.getElementById('result-title').textContent = won ? 'Summit Reached!' : 'Engulfed!';
  document.getElementById('result-text').textContent = won
    ? `You summited in ${moves} moves, outrunning the wildfire!`
    : `The wildfire caught you at altitude ${alt}/${ROWS - 1} in ${moves} moves.`;

  document.getElementById('overlay').classList.add('show');
  renderGrid();
}

function startGame() {
  gameOver = false;
  moves = 0;
  firebreaks = 3;
  firebreakMode = false;

  document.getElementById('overlay').classList.remove('show');
  document.getElementById('btn-firebreak').textContent = 'Firebreak (3)';
  document.getElementById('btn-firebreak').disabled = false;
  document.getElementById('btn-firebreak').classList.remove('active');
  document.getElementById('hint').textContent = 'Tap glowing holds to climb. Fire chases you!';

  initGrid();
  renderGrid();
}

startGame();
</script>
</body>
</html>
