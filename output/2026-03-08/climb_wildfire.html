<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Firebreak</title>
<style>
  :root {
    --flame1: #FF6B35;
    --flame2: #FF3E00;
    --ember: #FFD166;
    --sky: #90E0EF;
    --rock: #577590;
    --green: #06D6A0;
    --snow: #F8F9FA;
    --dark: #1D3557;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(180deg, #CAF0F8 0%, #90E0EF 30%, #FFD166 70%, #FF6B35 100%);
    color: var(--dark);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  header {
    text-align: center;
    padding: 6px 0 2px;
    flex-shrink: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 1.3rem;
    letter-spacing: 0.1em;
    background: linear-gradient(90deg, var(--sky), var(--snow), var(--ember), var(--flame1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }

  header p {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.8);
    margin-top: 1px;
  }

  #status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 420px;
    padding: 2px 12px;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.9);
    flex-shrink: 0;
    z-index: 10;
  }

  #status-bar .stat {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 420px;
    min-height: 0;
    position: relative;
  }

  #grid-wrap {
    position: relative;
    width: min(88vw, 60vh, 400px);
    height: min(88vw, 60vh, 400px);
    flex-shrink: 0;
  }

  #grid {
    display: grid;
    width: 100%;
    height: 100%;
    gap: 2px;
    background: rgba(29, 53, 87, 0.15);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  .cell {
    position: relative;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    overflow: hidden;
  }

  .cell.rock {
    background: linear-gradient(135deg, #8D99AE, #577590);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), inset 0 -1px 2px rgba(0,0,0,0.2);
  }

  .cell.vegetation {
    background: linear-gradient(135deg, #06D6A0, #058C6B);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.2);
  }

  .cell.hold {
    background: linear-gradient(135deg, #FFD166, #EFB810);
    box-shadow: 0 0 8px rgba(255, 209, 102, 0.6), inset 0 1px 2px rgba(255,255,255,0.4);
    transform: scale(1.05);
  }

  .cell.fire {
    background: linear-gradient(135deg, var(--flame1), var(--flame2));
    animation: burn 0.4s ease-in-out infinite alternate;
    box-shadow: 0 0 10px rgba(255, 62, 0, 0.5);
  }

  .cell.scorched {
    background: linear-gradient(135deg, #2B2D30, #1A1A1A);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
  }

  .cell.climber {
    z-index: 5;
  }

  .cell.climber::after {
    content: '';
    width: 65%;
    height: 65%;
    background: radial-gradient(circle, #FFFFFF, #CAF0F8);
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(202, 240, 248, 0.8), 0 0 20px rgba(144, 224, 239, 0.4);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .cell.summit {
    background: linear-gradient(135deg, #CAF0F8, #FFFFFF);
    box-shadow: 0 0 12px rgba(202, 240, 248, 0.6);
  }

  .cell.reachable {
    outline: 2px solid rgba(255, 209, 102, 0.7);
    outline-offset: -2px;
  }

  .cell.firebreak {
    background: linear-gradient(135deg, #ADB5BD, #6C757D);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  }

  .cell.firebreak::after {
    content: '╳';
    color: rgba(255,255,255,0.4);
    font-size: 0.7rem;
  }

  @keyframes burn {
    0% { filter: brightness(1); }
    100% { filter: brightness(1.3); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(0.9); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
  }

  #controls {
    flex-shrink: 0;
    display: flex;
    gap: 8px;
    padding: 8px;
    z-index: 10;
  }

  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    touch-action: manipulation;
  }

  .btn:active {
    transform: scale(0.95);
  }

  .btn-climb {
    background: linear-gradient(135deg, var(--ember), var(--flame1));
    color: white;
    box-shadow: 0 2px 8px rgba(255, 107, 53, 0.4);
  }

  .btn-firebreak {
    background: linear-gradient(135deg, var(--rock), var(--dark));
    color: white;
    box-shadow: 0 2px 8px rgba(87, 117, 144, 0.4);
  }

  .btn-firebreak.active {
    outline: 3px solid var(--ember);
    outline-offset: 2px;
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: default;
  }

  #hint {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 2px 8px;
    flex-shrink: 0;
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }

  #overlay.show { display: flex; }

  .modal {
    background: white;
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    max-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .modal h2 {
    font-size: 1.4rem;
    margin-bottom: 8px;
  }

  .modal p {
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .modal .btn {
    padding: 10px 28px;
    font-size: 0.9rem;
  }

  .modal .result-icon {
    font-size: 2.5rem;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
<header>
  <h1>FIREBREAK</h1>
  <p>climb x wildfire</p>
</header>

<div id="status-bar">
  <span class="stat" id="altitude-display">Alt: 0</span>
  <span class="stat" id="moves-display">Moves: 0</span>
  <span class="stat" id="breaks-display">Breaks: 3</span>
</div>

<div id="game-area">
  <div id="grid-wrap">
    <div id="grid"></div>
  </div>
</div>

<div id="controls">
  <button class="btn btn-climb" id="btn-climb" onclick="advanceFire()">Advance Turn</button>
  <button class="btn btn-firebreak" id="btn-firebreak" onclick="toggleFirebreakMode()">Firebreak (3)</button>
</div>

<div id="hint">Tap holds to climb up. Place firebreaks to block the flames.</div>

<div id="overlay">
  <div class="modal" id="modal">
    <div class="result-icon" id="result-icon"></div>
    <h2 id="result-title"></h2>
    <p id="result-text"></p>
    <button class="btn btn-climb" onclick="startGame()">Play Again</button>
  </div>
</div>

<script>
const COLS = 8;
const ROWS = 10;
let grid = [];
let climberPos = { r: ROWS - 1, c: 0 };
let moves = 0;
let firebreaks = 3;
let firebreakMode = false;
let gameOver = false;
let fireTimer = null;
let fireFrontRow = ROWS; // fire hasn't reached the grid yet

// Cell types: 'rock', 'vegetation', 'hold', 'fire', 'scorched', 'firebreak', 'summit'
function initGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) {
      if (r === 0) {
        // Summit row
        row.push('summit');
      } else if (r >= ROWS - 1) {
        // Starting row - all holds
        row.push('hold');
      } else {
        // Mix of rock, vegetation, and holds
        const rng = Math.random();
        if (rng < 0.28) {
          row.push('hold');
        } else if (rng < 0.62) {
          row.push('vegetation');
        } else {
          row.push('rock');
        }
      }
    }
    grid.push(row);
  }

  // Ensure there's always a reachable path of holds from bottom to top
  ensurePath();

  // Place climber at bottom-left hold
  let startC = 0;
  for (let c = 0; c < COLS; c++) {
    if (grid[ROWS - 1][c] === 'hold') {
      startC = c;
      break;
    }
  }
  climberPos = { r: ROWS - 1, c: startC };
}

function ensurePath() {
  // Guarantee a winding path of holds from bottom row to top
  let c = Math.floor(Math.random() * COLS);
  for (let r = ROWS - 1; r >= 0; r--) {
    if (r === 0) {
      grid[r][c] = 'summit';
    } else {
      grid[r][c] = 'hold';
    }
    // Randomly shift left or right for next row
    const shift = Math.random() < 0.33 ? -1 : Math.random() < 0.66 ? 1 : 0;
    c = Math.max(0, Math.min(COLS - 1, c + shift));
  }
}

function canReach(fromR, fromC, toR, toC) {
  // Climber can reach holds within 2 cells (Manhattan distance)
  // but must go up or sideways (not down)
  if (toR > fromR) return false; // can't climb down
  const dist = Math.abs(fromR - toR) + Math.abs(fromC - toC);
  return dist > 0 && dist <= 2;
}

function getReachableCells() {
  const reachable = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if ((grid[r][c] === 'hold' || grid[r][c] === 'summit') &&
          canReach(climberPos.r, climberPos.c, r, c) &&
          grid[r][c] !== 'fire' && grid[r][c] !== 'scorched') {
        reachable.push({ r, c });
      }
    }
  }
  return reachable;
}

function renderGrid() {
  const gridEl = document.getElementById('grid');
  gridEl.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;
  gridEl.style.gridTemplateRows = `repeat(${ROWS}, 1fr)`;
  gridEl.innerHTML = '';

  const reachable = gameOver ? [] : getReachableCells();
  const reachableSet = new Set(reachable.map(p => `${p.r},${p.c}`));

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell ' + grid[r][c];

      if (r === climberPos.r && c === climberPos.c && !gameOver) {
        cell.classList.add('climber');
      }

      if (reachableSet.has(`${r},${c}`) && !(r === climberPos.r && c === climberPos.c)) {
        cell.classList.add('reachable');
      }

      // Cell content hints
      if (grid[r][c] === 'vegetation') {
        cell.textContent = '';
      } else if (grid[r][c] === 'summit') {
        cell.textContent = '⛰';
      }

      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('click', () => onCellClick(r, c));
      cell.addEventListener('touchstart', (e) => {
        e.preventDefault();
        onCellClick(r, c);
      }, { passive: false });

      gridEl.appendChild(cell);
    }
  }

  updateStatus();
}

function onCellClick(r, c) {
  if (gameOver) return;

  if (firebreakMode) {
    placeFirebreak(r, c);
    return;
  }

  // Try to move climber
  const reachable = getReachableCells();
  const isReachable = reachable.some(p => p.r === r && p.c === c);

  if (!isReachable) return;

  climberPos = { r, c };
  moves++;

  // Check win
  if (grid[r][c] === 'summit') {
    endGame(true);
    return;
  }

  // After climbing, fire spreads
  spreadFire();

  // Check if climber is on fire
  if (grid[climberPos.r][climberPos.c] === 'fire' || grid[climberPos.r][climberPos.c] === 'scorched') {
    endGame(false);
    return;
  }

  // Check if climber has any reachable cells
  const nextReachable = getReachableCells();
  if (nextReachable.length === 0) {
    endGame(false);
    return;
  }

  renderGrid();
}

function spreadFire() {
  // Fire starts from the bottom and moves up
  // It spreads through vegetation easily, slowly through rock, blocked by firebreaks
  if (fireFrontRow >= ROWS) {
    // First fire: ignite bottom row vegetation/holds
    fireFrontRow = ROWS - 1;
    for (let c = 0; c < COLS; c++) {
      if (grid[ROWS - 1][c] === 'vegetation') {
        grid[ROWS - 1][c] = 'fire';
      }
    }
    return;
  }

  const newFires = [];

  // Each fire cell tries to spread to adjacent cells (up, left, right, and slightly up-diagonal)
  for (let r = ROWS - 1; r >= 0; r--) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] !== 'fire') continue;

      const neighbors = [
        { r: r - 1, c: c },     // up
        { r: r, c: c - 1 },     // left
        { r: r, c: c + 1 },     // right
        { r: r - 1, c: c - 1 }, // up-left
        { r: r - 1, c: c + 1 }, // up-right
      ];

      for (const n of neighbors) {
        if (n.r < 0 || n.r >= ROWS || n.c < 0 || n.c >= COLS) continue;
        const t = grid[n.r][n.c];
        if (t === 'firebreak' || t === 'fire' || t === 'scorched' || t === 'summit') continue;

        if (t === 'vegetation') {
          // Vegetation always catches fire
          newFires.push({ r: n.r, c: n.c });
        } else if (t === 'rock' || t === 'hold') {
          // Rock/holds have 25% chance to catch fire each turn
          if (Math.random() < 0.25) {
            newFires.push({ r: n.r, c: n.c });
          }
        }
      }

      // Current fire cells have a chance to become scorched
      if (Math.random() < 0.3) {
        grid[r][c] = 'scorched';
      }
    }
  }

  for (const f of newFires) {
    grid[f.r][f.c] = 'fire';
  }

  // Also ignite some random bottom vegetation each turn the fire pushes
  if (Math.random() < 0.5) {
    const bottomR = ROWS - 1;
    for (let c = 0; c < COLS; c++) {
      if (grid[bottomR][c] === 'vegetation' || grid[bottomR][c] === 'rock') {
        if (Math.random() < 0.3) {
          grid[bottomR][c] = 'fire';
        }
      }
    }
  }
}

function advanceFire() {
  if (gameOver) return;
  spreadFire();
  moves++;

  // Check if climber is engulfed
  if (grid[climberPos.r][climberPos.c] === 'fire' || grid[climberPos.r][climberPos.c] === 'scorched') {
    endGame(false);
    return;
  }

  const nextReachable = getReachableCells();
  if (nextReachable.length === 0) {
    endGame(false);
    return;
  }

  renderGrid();
}

function placeFirebreak(r, c) {
  if (firebreaks <= 0) return;
  if (grid[r][c] !== 'vegetation' && grid[r][c] !== 'rock') return;
  if (r === climberPos.r && c === climberPos.c) return;

  grid[r][c] = 'firebreak';
  firebreaks--;

  document.getElementById('btn-firebreak').textContent = `Firebreak (${firebreaks})`;
  if (firebreaks <= 0) {
    firebreakMode = false;
    document.getElementById('btn-firebreak').classList.remove('active');
    document.getElementById('btn-firebreak').disabled = true;
  }

  renderGrid();
}

function toggleFirebreakMode() {
  if (firebreaks <= 0 || gameOver) return;
  firebreakMode = !firebreakMode;
  document.getElementById('btn-firebreak').classList.toggle('active', firebreakMode);
  document.getElementById('hint').textContent = firebreakMode
    ? 'Tap vegetation or rock to place a firebreak (blocks fire spread)'
    : 'Tap holds to climb up. Place firebreaks to block the flames.';
}

function updateStatus() {
  const alt = ROWS - 1 - climberPos.r;
  document.getElementById('altitude-display').textContent = `Alt: ${alt}`;
  document.getElementById('moves-display').textContent = `Moves: ${moves}`;
  document.getElementById('breaks-display').textContent = `Breaks: ${firebreaks}`;
}

function endGame(won) {
  gameOver = true;
  const alt = ROWS - 1 - climberPos.r;

  document.getElementById('result-icon').textContent = won ? '⛰' : '🔥';
  document.getElementById('result-title').textContent = won ? 'Summit Reached!' : 'Engulfed!';

  if (won) {
    document.getElementById('result-text').textContent =
      `You reached the summit in ${moves} moves! The wildfire couldn't catch you.`;
  } else {
    document.getElementById('result-text').textContent =
      `The wildfire caught you at altitude ${alt}. You climbed ${alt} of ${ROWS - 1} rows in ${moves} moves.`;
  }

  document.getElementById('overlay').classList.add('show');
  renderGrid();
}

function startGame() {
  gameOver = false;
  moves = 0;
  firebreaks = 3;
  firebreakMode = false;
  fireFrontRow = ROWS;

  document.getElementById('overlay').classList.remove('show');
  document.getElementById('btn-firebreak').textContent = `Firebreak (3)`;
  document.getElementById('btn-firebreak').disabled = false;
  document.getElementById('btn-firebreak').classList.remove('active');
  document.getElementById('hint').textContent = 'Tap holds to climb up. Place firebreaks to block the flames.';

  initGrid();
  renderGrid();
}

startGame();
</script>
</body>
</html>
