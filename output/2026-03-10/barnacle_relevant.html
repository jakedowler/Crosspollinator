<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Barnacle — What Sticks</title>
<meta name="description" content="A daily meditation on what you choose to hold onto. Two words, one ocean, and everything drifting past.">
<meta name="theme-color" content="#1a2a3a">
<style>
  :root {
    --deep: #1a2a3a;
    --ocean: #2d4a5a;
    --teal: #5a9a9a;
    --sand: #d4c5a9;
    --cream: #f0ebe0;
    --amber: #d4943a;
    --rose: #9a6a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100dvh;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--deep);
    color: var(--cream);
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    padding: 8px 16px;
    background: rgba(0,0,0,0.2);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 16px;
    font-weight: normal;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--sand);
  }

  header p {
    font-size: 11px;
    color: var(--teal);
    font-style: italic;
    margin-top: 2px;
  }

  #ocean {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: linear-gradient(
      180deg,
      #1a3040 0%,
      #1a2a3a 30%,
      #162535 60%,
      #0f1a25 100%
    );
    /* Subtle film grain texture via SVG filter */
  }

  /* Vignette */
  #ocean::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(10,15,20,0.4) 100%);
    pointer-events: none;
    z-index: 8;
  }

  /* Film grain overlay */
  #grain-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 9;
    opacity: 0.04;
    filter: url(#grain);
    mix-blend-mode: overlay;
  }

  /* Subtle light rays from surface */
  #ocean::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: radial-gradient(ellipse at 50% 0%, rgba(90,154,154,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Caustic light canvas */
  #caustics-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 50%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.06;
  }

  /* Floating particles (plankton) */
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: rgba(90,154,154,0.12);
    pointer-events: none;
    z-index: 0;
  }

  /* Seaweed */
  .seaweed {
    position: absolute;
    bottom: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.15;
  }

  /* Current lines */
  .current-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(90,154,154,0.06) 30%, rgba(90,154,154,0.06) 70%, transparent 100%);
    pointer-events: none;
    z-index: 0;
    animation: drift-line linear infinite;
  }

  @keyframes drift-line {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100vw); }
  }

  /* Fragment releasing glow */
  .fragment.releasing {
    color: rgba(90,154,154,0.4);
    border-color: rgba(90,154,154,0.2);
    transition: all 1s;
  }

  /* Ghost text of missed fragments */
  #ghosts {
    position: absolute;
    top: 8px;
    left: 12px;
    max-width: 45%;
    max-height: 40%;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .ghost {
    font-size: 9px;
    color: rgba(90,154,154,0.08);
    display: inline;
    margin-right: 8px;
    line-height: 1.8;
    animation: ghostAppear 2s ease-out forwards;
  }

  @keyframes ghostAppear {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* Catch ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(212,148,58,0.3);
    pointer-events: none;
    z-index: 4;
    animation: rippleOut 0.8s ease-out forwards;
  }

  @keyframes rippleOut {
    0% { width: 0; height: 0; opacity: 0.6; }
    100% { width: 80px; height: 80px; opacity: 0; margin-left: -40px; margin-top: -40px; }
  }

  /* Intro fade */
  #intro-veil {
    position: absolute;
    inset: 0;
    background: var(--deep);
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 2s;
  }

  #intro-veil.fade {
    opacity: 0;
    pointer-events: none;
  }

  #intro-veil .intro-words {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--teal);
    opacity: 0;
    animation: introFade 2s ease-out 0.5s forwards;
  }

  @keyframes introFade {
    0% { opacity: 0; transform: translateY(10px); }
    60% { opacity: 0.6; }
    100% { opacity: 0.6; transform: translateY(0); }
  }

  /* The rock at bottom */
  #reef {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: min(90vw, 320px);
    height: 100px;
    pointer-events: none;
    z-index: 1;
    animation: reefBreath 6s ease-in-out infinite;
  }

  @keyframes reefBreath {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
  }

  /* Attached items on the reef */
  .attached {
    position: absolute;
    font-size: 12px;
    color: var(--cream);
    background: rgba(212, 148, 58, 0.12);
    border: 1px solid rgba(212, 148, 58, 0.25);
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
    pointer-events: none;
    animation: attachPulse 0.6s ease-out, gentleSway 4s ease-in-out infinite;
    z-index: 2;
  }

  @keyframes attachPulse {
    0% { scale: 1.3; opacity: 0; }
    50% { scale: 1.05; }
    100% { scale: 1; opacity: 1; }
  }

  @keyframes gentleSway {
    0%, 100% { transform: translateX(0) rotate(var(--rot, 0deg)); }
    50% { transform: translateX(3px) rotate(calc(var(--rot, 0deg) + 1deg)); }
  }

  /* Drifting fragments */
  .fragment {
    position: absolute;
    font-size: 15px;
    color: var(--cream);
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    opacity: 0;
    background: rgba(90,154,154,0.12);
    border: 1px solid rgba(90,154,154,0.2);
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    z-index: 5;
    transition: opacity 0.8s, background 0.2s, border-color 0.2s;
  }

  .fragment:hover, .fragment:active {
    background: rgba(212,148,58,0.2);
    border-color: rgba(212,148,58,0.4);
    box-shadow: 0 0 12px rgba(212,148,58,0.15);
  }

  .fragment.visible { opacity: 1; }
  .fragment.fading { opacity: 0; transition: opacity 1.5s; }
  .fragment.caught {
    opacity: 0;
    transform: scale(0.8) translateY(30px);
    transition: all 0.5s ease-in;
  }

  /* Settling sparkle */
  .sparkle {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--amber);
    opacity: 0.4;
    pointer-events: none;
    z-index: 4;
    animation: sparkleDown 0.6s ease-in forwards;
  }

  @keyframes sparkleDown {
    0% { opacity: 0.4; transform: scale(1); }
    100% { opacity: 0; transform: scale(0) translateY(20px); }
  }

  /* Bubbles */
  .bubble {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(90,154,154,0.15);
    pointer-events: none;
    animation: rise linear forwards;
  }

  @keyframes rise {
    0% { opacity: 0.4; transform: translateY(0) translateX(0); }
    100% { opacity: 0; transform: translateY(-120px) translateX(20px); }
  }

  /* End card */
  #endcard {
    position: absolute;
    inset: 0;
    background: rgba(15, 26, 37, 0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s;
    padding: 20px;
    z-index: 10;
  }

  #endcard.show {
    opacity: 1;
    pointer-events: auto;
  }

  #endcard h2 {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 6px;
    opacity: 0.6;
  }

  #endcard .date-line {
    font-size: 11px;
    color: var(--teal);
    opacity: 0.4;
    margin-bottom: 24px;
    letter-spacing: 1px;
  }

  #collection {
    max-width: 340px;
    text-align: center;
  }

  #collection .item {
    display: inline-block;
    font-size: 14px;
    color: var(--cream);
    background: rgba(212,148,58,0.1);
    border: 1px solid rgba(212,148,58,0.2);
    padding: 5px 14px;
    border-radius: 16px;
    margin: 4px;
    opacity: 0;
    animation: itemReveal 0.5s ease-out forwards;
  }

  @keyframes itemReveal {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #reef-art {
    width: 200px;
    height: 60px;
    margin-bottom: 20px;
    opacity: 0;
    animation: itemReveal 1s ease-out 0.2s forwards;
  }

  #endcard .tagline {
    font-size: 12px;
    color: var(--sand);
    font-style: italic;
    margin-top: 20px;
    opacity: 0.5;
  }

  #endcard .stats {
    font-size: 10px;
    color: var(--teal);
    opacity: 0.3;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  #share-btn {
    margin-top: 20px;
    padding: 10px 28px;
    background: transparent;
    border: 1px solid rgba(90,154,154,0.3);
    color: var(--teal);
    font-family: Georgia, serif;
    font-size: 12px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 1px;
    opacity: 0.7;
    transition: opacity 0.3s, border-color 0.3s;
  }

  #share-btn:hover, #share-btn:active {
    opacity: 1;
    border-color: var(--teal);
  }

  #counter {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 11px;
    color: var(--teal);
    opacity: 0;
    z-index: 6;
    transition: opacity 0.5s;
  }

  #counter.visible { opacity: 0.5; }

  /* Barnacle dots in counter */
  #counter .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-left: 3px;
    vertical-align: middle;
    transition: background 0.3s;
  }

  #counter .dot.filled {
    background: var(--amber);
    opacity: 0.6;
  }

  #counter .dot.empty {
    background: rgba(90,154,154,0.15);
  }

  #hint {
    position: absolute;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--teal);
    opacity: 0.5;
    text-align: center;
    pointer-events: none;
    transition: opacity 1s;
    z-index: 6;
    white-space: nowrap;
    animation: hintBreath 4s ease-in-out infinite;
  }

  @keyframes hintBreath {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.6; }
  }

  #hint.hidden {
    animation: none;
    opacity: 0 !important;
  }

  @media (max-width: 400px) {
    header h1 { font-size: 14px; letter-spacing: 2px; }
    header p { font-size: 10px; }
    .fragment { font-size: 13px !important; padding: 6px 14px; }
    .attached { font-size: 10px; padding: 2px 8px; }
    #collection .item { font-size: 12px; padding: 3px 10px; }
    #hint { font-size: 10px; }
  }

  @media (min-width: 768px) {
    header h1 { font-size: 18px; }
    .fragment { max-width: 60vw; }
    #collection { max-width: 500px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<header>
  <h1>Barnacle</h1>
  <p>what sticks is who you are</p>
</header>

<!-- Grain filter -->
<svg style="position:absolute;width:0;height:0">
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
</svg>
<div id="ocean">
  <div id="grain-overlay"></div>
  <!-- Water surface -->
  <svg style="position:absolute;top:0;left:0;width:100%;height:8px;z-index:0;opacity:0.2;pointer-events:none" viewBox="0 0 400 8" preserveAspectRatio="none">
    <path d="M0 4 Q50 1, 100 4 Q150 7, 200 4 Q250 1, 300 4 Q350 7, 400 4" stroke="#5a9a9a" fill="none" stroke-width="1">
      <animate attributeName="d" dur="3s" repeatCount="indefinite"
        values="M0 4 Q50 1, 100 4 Q150 7, 200 4 Q250 1, 300 4 Q350 7, 400 4;M0 4 Q50 6, 100 4 Q150 2, 200 4 Q250 6, 300 4 Q350 2, 400 4;M0 4 Q50 1, 100 4 Q150 7, 200 4 Q250 1, 300 4 Q350 7, 400 4"/>
    </path>
  </svg>
  <canvas id="caustics-canvas"></canvas>
  <div id="ghosts"></div>
  <div id="counter"></div>
  <div id="hint">tap what resonates &mdash; let the rest drift</div>

  <!-- Seaweed strands -->
  <svg class="seaweed" style="left:8%; width:30px; height:80px;" viewBox="0 0 30 80">
    <path d="M15 80 Q10 60 15 45 Q20 30 12 10" stroke="#3a6a5a" fill="none" stroke-width="2" stroke-linecap="round">
      <animate attributeName="d" dur="4s" repeatCount="indefinite" values="M15 80 Q10 60 15 45 Q20 30 12 10;M15 80 Q20 60 15 45 Q10 30 18 10;M15 80 Q10 60 15 45 Q20 30 12 10"/>
    </path>
  </svg>
  <svg class="seaweed" style="left:85%; width:25px; height:65px;" viewBox="0 0 25 65">
    <path d="M12 65 Q8 45 14 30 Q18 15 10 2" stroke="#3a6a5a" fill="none" stroke-width="2" stroke-linecap="round">
      <animate attributeName="d" dur="5s" repeatCount="indefinite" values="M12 65 Q8 45 14 30 Q18 15 10 2;M12 65 Q18 45 12 30 Q8 15 16 2;M12 65 Q8 45 14 30 Q18 15 10 2"/>
    </path>
  </svg>
  <svg class="seaweed" style="left:35%; width:20px; height:55px;" viewBox="0 0 20 55">
    <path d="M10 55 Q6 40 12 25 Q16 12 8 0" stroke="#3a6a5a" fill="none" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="d" dur="6s" repeatCount="indefinite" values="M10 55 Q6 40 12 25 Q16 12 8 0;M10 55 Q15 40 10 25 Q5 12 13 0;M10 55 Q6 40 12 25 Q16 12 8 0"/>
    </path>
  </svg>

  <div id="reef">
    <svg viewBox="0 0 320 110" preserveAspectRatio="xMidYMax meet" style="width:100%;height:100%">
      <!-- Main rock mass -->
      <ellipse cx="160" cy="100" rx="150" ry="35" fill="#161f2a"/>
      <ellipse cx="120" cy="92" rx="60" ry="22" fill="#1a2832"/>
      <ellipse cx="200" cy="94" rx="50" ry="18" fill="#1a2832"/>
      <ellipse cx="160" cy="85" rx="40" ry="14" fill="#1e2d3a"/>
      <!-- Texture lines -->
      <path d="M60 98 Q90 90 120 95 Q150 88 190 93 Q220 89 260 97" stroke="#2d4a5a" fill="none" stroke-width="0.5" opacity="0.4"/>
      <path d="M80 105 Q130 96 180 100 Q220 95 250 103" stroke="#2d4a5a" fill="none" stroke-width="0.5" opacity="0.3"/>
      <!-- Small barnacle shapes on rock -->
      <circle cx="110" cy="88" r="3" fill="none" stroke="#3a5a6a" stroke-width="0.5" opacity="0.3"/>
      <circle cx="175" cy="86" r="2.5" fill="none" stroke="#3a5a6a" stroke-width="0.5" opacity="0.3"/>
      <circle cx="145" cy="82" r="2" fill="none" stroke="#3a5a6a" stroke-width="0.5" opacity="0.3"/>
      <circle cx="195" cy="90" r="3" fill="none" stroke="#3a5a6a" stroke-width="0.5" opacity="0.25"/>
    </svg>
  </div>

  <div id="intro-veil">
    <span class="intro-words">barnacle &times; relevant</span>
    <span style="font-size:9px; color:var(--teal); opacity:0; letter-spacing:2px;
      animation: introFade 2s ease-out 1.5s forwards; margin-top:12px;">2026-03-10</span>
  </div>

  <div id="endcard">
    <h2>Your Reef</h2>
    <div class="date-line">2026-03-10</div>
    <div id="collection"></div>
    <div class="tagline">what sticks is who you are</div>
    <div style="font-size:8px; color:var(--teal); opacity:0.15; margin-top:6px;
      letter-spacing:2px; text-transform:uppercase;">barnacle &times; relevant</div>
    <div class="stats" id="stats"></div>
    <button id="drifted-btn" style="margin-top:16px; background:none; border:none;
      color:var(--teal); opacity:0.3; font-family:Georgia,serif; font-size:10px;
      cursor:pointer; letter-spacing:1px; padding:4px 8px;">what drifted past</button>
    <div id="drifted" style="display:none; max-width:320px; text-align:center;
      margin-top:10px; max-height:120px; overflow-y:auto;"></div>
    <button id="share-btn">copy to share</button>
    <button id="release-btn" style="margin-top:8px; background:none; border:none;
      color:var(--teal); opacity:0.15; font-family:Georgia,serif; font-size:9px;
      cursor:pointer; letter-spacing:1px; padding:4px 8px;">release your reef</button>
  </div>
</div>

<script>
(function() {
  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = seed + 0x6D2B79F5 | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function hashStr(s) {
    let h = 0;
    for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
    return h;
  }

  const today = '2026-03-10';
  const rng = mulberry32(hashStr(today));

  // Fragments with subtle tint categories
  // 0=neutral, 1=sea(blue), 2=memory(warm), 3=thought(green)
  const allFragments = [
    // Things that stick (neutral)
    {t:"first impression",c:0}, {t:"a name someone called you",c:2},
    {t:"the smell of rain",c:0}, {t:"your mother's kitchen",c:2},
    {t:"a song from a car ride",c:2}, {t:"the sound of a door closing",c:0},
    {t:"chalk on your fingers",c:0}, {t:"salt on your lips",c:1},
    // Sea & tide
    {t:"the pull of the tide",c:1}, {t:"light through deep water",c:1},
    {t:"sand between pages",c:1}, {t:"a shell with a hole",c:1},
    {t:"the sound of waves at night",c:1}, {t:"fog on the harbor",c:1},
    {t:"barnacles on the pier",c:1}, {t:"the whale's song",c:1},
    {t:"driftwood alphabet",c:1},
    // Relevance & meaning
    {t:"what you chose not to say",c:3}, {t:"the question you keep asking",c:3},
    {t:"a fact that changed everything",c:3}, {t:"the irrelevant detail that wasn't",c:3},
    {t:"what the algorithm missed",c:3}, {t:"the thing you googled at 2am",c:3},
    {t:"a headline you can't forget",c:3}, {t:"the book you never finished",c:2},
    // Memory & identity
    {t:"your handwriting at age ten",c:2}, {t:"the lie you told yourself",c:2},
    {t:"someone else's photograph",c:2}, {t:"the scar on your left hand",c:2},
    {t:"a language you almost learned",c:2}, {t:"your grandfather's silence",c:2},
    {t:"the dream that repeated",c:2}, {t:"a color you can't name",c:0},
    // Small beauties
    {t:"condensation on glass",c:0}, {t:"the weight of a peach",c:0},
    {t:"dust in a beam of light",c:0}, {t:"the creak of a wooden floor",c:0},
    {t:"a bird you heard but never saw",c:0}, {t:"ice cracking on a puddle",c:0},
    {t:"the exact shade of 4pm",c:0}, {t:"wind through tall grass",c:0},
    // Connections
    {t:"a stranger's kindness",c:2}, {t:"the friend who disappeared",c:2},
    {t:"a letter you never sent",c:2}, {t:"the conversation in the next booth",c:0},
    {t:"your reflection in a shop window",c:0}, {t:"the person who believed you",c:2},
    {t:"a hand on your shoulder",c:2}, {t:"laughter from another room",c:0},
    // Time
    {t:"the longest Tuesday",c:0}, {t:"a year that felt like a week",c:0},
    {t:"the moment before the news",c:0}, {t:"three seconds of freefall",c:0},
    {t:"waiting for a phone to ring",c:0}, {t:"the age you felt most alive",c:2},
    {t:"midnight in an empty house",c:0}, {t:"the first warm day",c:0},
    // Textures of thought
    {t:"an idea you couldn't explain",c:3}, {t:"the word on the tip of your tongue",c:3},
    {t:"a pattern only you noticed",c:3}, {t:"the map you drew from memory",c:3},
    {t:"numbers that felt important",c:3}, {t:"a theory about pigeons",c:3},
    {t:"the reason you stopped running",c:2}, {t:"what the clouds looked like that day",c:0},
    // Additional
    {t:"a promise you kept quietly",c:2}, {t:"the gap between two buildings",c:0},
    {t:"someone's name you forgot",c:2}, {t:"the taste of a coin",c:0},
    {t:"a dog that followed you home",c:2}, {t:"the wrong train, the right city",c:0},
    {t:"a ceiling you stared at",c:0}, {t:"the last page of something",c:2},
    {t:"what the water said",c:1}, {t:"a place that no longer exists",c:2},
    {t:"the shape of your fear",c:3}, {t:"kindness from the wrong person",c:2},
    {t:"a door left open",c:0}, {t:"the thing under the stairs",c:0},
    {t:"someone else's wedding",c:2}, {t:"the hour before dawn",c:0},
    // Final additions
    {t:"the view from a bridge",c:0}, {t:"permission you gave yourself",c:3},
    {t:"a recipe you know by heart",c:2}, {t:"the last bus home",c:0},
    {t:"sunlight on a closed eyelid",c:0}, {t:"the version of you they remember",c:2},
    {t:"what you'd save in a fire",c:3}
  ];

  const TINT_COLORS = [
    'rgba(212,197,169,VAL)', // 0: neutral sand
    'rgba(90,170,180,VAL)',  // 1: sea blue
    'rgba(212,148,58,VAL)',  // 2: warm memory
    'rgba(120,180,140,VAL)'  // 3: thought green
  ];

  const pools = allFragments.map(f => f.t);

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const fragments = shuffle(pools);
  const MAX_ATTACH = 7;
  const TOTAL_TO_SHOW = 24;

  const ocean = document.getElementById('ocean');
  const counter = document.getElementById('counter');
  const hint = document.getElementById('hint');
  const endcard = document.getElementById('endcard');
  const collection = document.getElementById('collection');
  const shareBtn = document.getElementById('share-btn');

  let attached = [];
  let shown = 0;
  let active = [];
  let ended = false;

  // Build counter dots
  for (let i = 0; i < MAX_ATTACH; i++) {
    const dot = document.createElement('span');
    dot.className = 'dot empty';
    counter.appendChild(dot);
  }

  function updateCounter() {
    if (attached.length > 0) {
      counter.classList.add('visible');
      const dots = counter.querySelectorAll('.dot');
      dots.forEach((d, i) => {
        d.className = 'dot ' + (i < attached.length ? 'filled' : 'empty');
      });
    }
  }

  function spawnFragment() {
    if (ended || shown >= TOTAL_TO_SHOW) return;

    const text = fragments[shown];
    shown++;

    // Find original fragment data for tint
    const fragData = allFragments.find(f => f.t === text);
    const tintIdx = fragData ? fragData.c : 0;

    const el = document.createElement('div');
    el.className = 'fragment';
    el.textContent = text;

    // Subtle tint based on category
    const tintColor = TINT_COLORS[tintIdx].replace('VAL', '0.08');
    el.style.borderColor = TINT_COLORS[tintIdx].replace('VAL', '0.12');
    el.style.background = tintColor;

    // Memories get italics, thoughts get slightly smaller letter-spacing
    if (tintIdx === 2) el.style.fontStyle = 'italic';
    if (tintIdx === 3) el.style.letterSpacing = '0.5px';

    // Vary depth feel
    const depth = rng();
    el.style.fontSize = (13 + depth * 4) + 'px';

    const goRight = rng() > 0.5;
    const h = ocean.clientHeight;
    const y = 20 + rng() * (h * 0.55);
    const speed = 14 + rng() * 20;

    el.style.top = y + 'px';
    if (goRight) {
      el.style.left = '-300px';
    } else {
      el.style.left = (ocean.clientWidth + 10) + 'px';
    }

    ocean.appendChild(el);

    const frag = { el, goRight, speed, y, text, startTime: 0 };
    active.push(frag);

    requestAnimationFrame(() => el.classList.add('visible'));

    el.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      if (ended || attached.length >= MAX_ATTACH) return;

      attached.push(text);
      el.classList.add('caught');
      active = active.filter(f => f.el !== el);
      hint.classList.add('hidden');

      // Haptic feedback on mobile
      if (navigator.vibrate) navigator.vibrate(15);

      // Settling sparkles
      const oRect = ocean.getBoundingClientRect();
      const cx = (e.clientX || e.pageX) - oRect.left;
      const cy = (e.clientY || e.pageY) - oRect.top;
      for (let s = 0; s < 4; s++) {
        const sp = document.createElement('div');
        sp.className = 'sparkle';
        sp.style.left = (cx + (Math.random() - 0.5) * 30) + 'px';
        sp.style.top = (cy + Math.random() * 10) + 'px';
        sp.style.animationDelay = (s * 0.08) + 's';
        ocean.appendChild(sp);
        setTimeout(() => sp.remove(), 700);
      }

      // Double ripple effect
      const rect = ocean.getBoundingClientRect();
      const rx = (e.clientX || e.pageX) - rect.left;
      const ry = (e.clientY || e.pageY) - rect.top;
      for (let r = 0; r < 2; r++) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple';
        ripple.style.left = rx + 'px';
        ripple.style.top = ry + 'px';
        ripple.style.animationDelay = (r * 0.15) + 's';
        if (r === 1) ripple.style.animationDuration = '1s';
        ocean.appendChild(ripple);
        setTimeout(() => ripple.remove(), 1200);
      }

      spawnBubbles(e.clientX || e.pageX, e.clientY || e.pageY, 5);

      setTimeout(() => {
        el.remove();
        placeOnReef(text);
        updateCounter();

        // Ocean warms subtly via an overlay
        const warmth = attached.length / MAX_ATTACH;
        let warmOverlay = document.getElementById('warm-overlay');
        if (!warmOverlay) {
          warmOverlay = document.createElement('div');
          warmOverlay.id = 'warm-overlay';
          warmOverlay.style.cssText = `position:absolute; inset:0; pointer-events:none;
            z-index:0; transition:opacity 2s; background:
            radial-gradient(ellipse at 50% 80%, rgba(212,148,58,0.04) 0%, transparent 60%);`;
          ocean.insertBefore(warmOverlay, ocean.firstChild);
        }
        warmOverlay.style.opacity = warmth.toString();

        if (attached.length >= MAX_ATTACH) setTimeout(endSession, 800);
      }, 400);
    });
  }

  function placeOnReef(text) {
    const el = document.createElement('div');
    el.className = 'attached';
    el.textContent = text;

    const w = ocean.clientWidth;
    const h = ocean.clientHeight;
    const cx = w / 2;
    const idx = attached.length - 1;

    // Fan out in an arc: left to right, rising slightly
    const angle = -0.6 + (idx / (MAX_ATTACH - 1)) * 1.2; // -0.6 to 0.6 radians
    const radius = 80 + rng() * 40;
    const x = cx + Math.sin(angle) * radius;
    const yBase = h - 40;
    const y = yBase - Math.abs(Math.cos(angle)) * radius * 0.4 - rng() * 15;

    el.style.left = Math.max(5, Math.min(w - 160, x - 60)) + 'px';
    el.style.top = Math.min(yBase, y) + 'px';
    el.style.setProperty('--rot', (angle * 8) + 'deg');
    el.style.animationDelay = '0s, ' + (rng() * 2) + 's';

    ocean.appendChild(el);
  }

  function spawnBubbles(x, y, count) {
    const r = ocean.getBoundingClientRect();
    for (let i = 0; i < count; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      b.style.left = (x - r.left + (Math.random() - 0.5) * 20) + 'px';
      b.style.top = (y - r.top) + 'px';
      b.style.animationDuration = (2 + Math.random() * 2) + 's';
      ocean.appendChild(b);
      setTimeout(() => b.remove(), 4000);
    }
  }

  let lastTime = 0;

  function animate(time) {
    if (ended && active.length === 0) return;
    if (!lastTime) lastTime = time;
    lastTime = time;
    const w = ocean.clientWidth;

    for (let i = active.length - 1; i >= 0; i--) {
      const f = active[i];
      if (!f.startTime) f.startTime = time;

      const elapsed = (time - f.startTime) / 1000;
      const progress = elapsed / f.speed;

      let x;
      if (f.goRight) {
        x = -300 + progress * (w + 600);
      } else {
        x = (w + 10) - progress * (w + 600);
      }
      f.el.style.left = x + 'px';

      const wobble = Math.sin(elapsed * 0.5) * 8;
      f.el.style.top = (f.y + wobble) + 'px';

      // Start releasing glow near the edge
      if (progress > 0.85 && !f.releasing) {
        f.releasing = true;
        f.el.classList.add('releasing');
      }

      if (progress > 1) {
        f.el.classList.add('fading');
        active.splice(i, 1);
        setTimeout(() => f.el.remove(), 1500);

        // Ghost of the missed fragment
        const ghost = document.createElement('span');
        ghost.className = 'ghost';
        ghost.textContent = f.text;
        document.getElementById('ghosts').appendChild(ghost);

        if (shown >= TOTAL_TO_SHOW && active.length === 0 && !ended) {
          setTimeout(endSession, 1000);
        }
      }
    }

    requestAnimationFrame(animate);
  }

  function generateReefArt(kept) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 200 60');
    svg.setAttribute('id', 'reef-art');

    const rock = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
    rock.setAttribute('cx', '100'); rock.setAttribute('cy', '55');
    rock.setAttribute('rx', '90'); rock.setAttribute('ry', '12');
    rock.setAttribute('fill', '#1e2d3a'); rock.setAttribute('stroke', '#2d4a5a');
    rock.setAttribute('stroke-width', '0.5');
    svg.appendChild(rock);

    const spacing = kept > 0 ? 140 / kept : 0;
    for (let b = 0; b < kept; b++) {
      const bx = 30 + b * spacing + (rng() - 0.5) * 10;
      const by = 44 - rng() * 15;
      const br = 4 + rng() * 4;

      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', bx.toFixed(1));
      circle.setAttribute('cy', by.toFixed(1));
      circle.setAttribute('r', br.toFixed(1));
      circle.setAttribute('fill', 'rgba(212,148,58,0.15)');
      circle.setAttribute('stroke', 'rgba(212,148,58,0.3)');
      circle.setAttribute('stroke-width', '0.5');
      svg.appendChild(circle);

      const inner = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      inner.setAttribute('cx', bx.toFixed(1));
      inner.setAttribute('cy', by.toFixed(1));
      inner.setAttribute('r', (br * 0.5).toFixed(1));
      inner.setAttribute('fill', 'none');
      inner.setAttribute('stroke', 'rgba(212,148,58,0.2)');
      inner.setAttribute('stroke-width', '0.3');
      svg.appendChild(inner);

      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', bx.toFixed(1));
      dot.setAttribute('cy', by.toFixed(1));
      dot.setAttribute('r', '1');
      dot.setAttribute('fill', 'rgba(212,148,58,0.2)');
      svg.appendChild(dot);
    }

    if (kept > 0) {
      for (let s = 0; s < Math.min(kept, 3); s++) {
        const sx = 25 + (s * 70) + rng() * 20;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const h = 10 + rng() * 10;
        path.setAttribute('d', `M${sx} 50 Q${sx - 3} ${50 - h / 2} ${sx + 2} ${50 - h}`);
        path.setAttribute('stroke', 'rgba(58,106,90,0.2)');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-width', '1');
        path.setAttribute('stroke-linecap', 'round');
        svg.appendChild(path);
      }
    }

    const dateLine = endcard.querySelector('.date-line');
    endcard.insertBefore(svg, dateLine);
  }

  function endSession() {
    if (ended) return;
    ended = true;

    collection.innerHTML = '';
    const items = attached.length > 0
      ? attached
      : ['you let everything pass', 'the rock remains', 'waiting for tomorrow\u2019s tide'];

    items.forEach((text, i) => {
      const item = document.createElement('span');
      item.className = 'item';
      item.textContent = text;
      item.style.animationDelay = (i * 0.15) + 's';
      if (attached.length === 0) {
        item.style.fontStyle = 'italic';
        item.style.opacity = '0.6';
      }
      collection.appendChild(item);
    });

    const total = shown;
    const kept = attached.length;
    const released = total - kept;
    document.getElementById('stats').textContent =
      kept + ' kept \u00b7 ' + released + ' released';

    // Contextual heading based on how many you kept
    const h2 = endcard.querySelector('h2');
    if (kept === 0) {
      h2.textContent = 'Bare Rock';
    } else if (kept <= 2) {
      h2.textContent = 'Sparse Reef';
    } else if (kept <= 4) {
      h2.textContent = 'Your Reef';
    } else if (kept <= 6) {
      h2.textContent = 'Rich Reef';
    } else {
      h2.textContent = 'Full Reef';
    }

    // Generate and insert reef art
    generateReefArt(kept);

    // Save to localStorage
    try { localStorage.setItem(storageKey, JSON.stringify(attached)); } catch(e) {}

    // Fade the ocean elements before showing end card
    document.querySelectorAll('.attached, .seaweed, #reef, #ghosts, #counter, #hint').forEach(el => {
      el.style.transition = 'opacity 0.8s';
      el.style.opacity = '0.3';
    });

    setTimeout(() => endcard.classList.add('show'), 600);
  }

  // "What drifted past" toggle
  const driftedBtn = document.getElementById('drifted-btn');
  const driftedDiv = document.getElementById('drifted');
  let driftedShown = false;

  driftedBtn.addEventListener('click', function() {
    driftedShown = !driftedShown;
    if (driftedShown) {
      driftedDiv.style.display = 'block';
      driftedDiv.innerHTML = '';
      const missed = fragments.slice(0, shown).filter(t => !attached.includes(t));
      missed.forEach((t, i) => {
        const span = document.createElement('span');
        span.style.cssText = `display:inline-block; font-size:11px; color:rgba(90,154,154,0.3);
          padding:2px 8px; margin:2px; opacity:0; animation:itemReveal 0.3s ease-out forwards;
          animation-delay:${i * 0.05}s;`;
        span.textContent = t;
        driftedDiv.appendChild(span);
      });
      driftedBtn.textContent = 'hide';
    } else {
      driftedDiv.style.display = 'none';
      driftedBtn.textContent = 'what drifted past';
    }
  });

  // Release (replay) button
  document.getElementById('release-btn').addEventListener('click', function() {
    try { localStorage.removeItem(storageKey); } catch(e) {}
    location.reload();
  });

  shareBtn.addEventListener('click', function() {
    // Build visual reef line
    const reefLine = attached.length > 0
      ? '\u3000' + '\ud83e\udea8'.repeat(Math.min(attached.length, 7)) + '\u3000'
      : '\u3000\u25cb\u3000';

    const lines = ['\ud83c\udf0a Barnacle \u2014 ' + today];
    lines.push(reefLine);
    lines.push('');
    if (attached.length > 0) {
      attached.forEach(t => lines.push('\u2219 ' + t));
    } else {
      lines.push('let everything drift');
    }
    lines.push('', 'what sticks is who you are');

    if (navigator.clipboard) {
      navigator.clipboard.writeText(lines.join('\n')).then(() => {
        shareBtn.textContent = 'copied';
        setTimeout(() => { shareBtn.textContent = 'copy to share'; }, 2000);
      });
    }
  });

  // Spawn fragments in wave patterns (tide rhythm)
  let spawnCount = 0;
  const WAVE_SIZES = [3, 4, 3, 4, 3, 4, 3]; // 24 total across 7 waves
  let waveIdx = 0;
  let inWave = 0;

  function scheduleNext() {
    if (spawnCount >= TOTAL_TO_SHOW || ended) return;

    const waveSize = WAVE_SIZES[waveIdx] || 3;

    spawnFragment();
    spawnCount++;
    inWave++;

    if (inWave >= waveSize) {
      // Pause between waves (the tide ebbs)
      inWave = 0;
      waveIdx++;

      // Brief reflective prompt between waves
      const prompts = [
        'what are you looking for?',
        'does it matter?',
        'what would you keep forever?',
        'is anything truly irrelevant?',
        'what drifts back?',
        'where does it go?'
      ];
      if (waveIdx < WAVE_SIZES.length && spawnCount < TOTAL_TO_SHOW) {
        const prompt = prompts[waveIdx % prompts.length];
        const promptEl = document.createElement('div');
        promptEl.style.cssText = `position:absolute; bottom:115px; left:50%; transform:translateX(-50%);
          font-size:10px; color:rgba(90,154,154,0.15); pointer-events:none; z-index:6;
          font-style:italic;`;
        promptEl.textContent = prompt;
        ocean.appendChild(promptEl);
        setTimeout(() => {
          promptEl.style.transition = 'opacity 1.5s';
          promptEl.style.opacity = '0';
          setTimeout(() => promptEl.remove(), 1500);
        }, 2000);
      }

      setTimeout(() => {
        // Brighten caustics briefly as new wave arrives
        causticsCanvas.style.transition = 'opacity 1s';
        causticsCanvas.style.opacity = '0.1';
        setTimeout(() => {
          causticsCanvas.style.opacity = '0.06';
        }, 1500);
        scheduleNext();
      }, 3500 + rng() * 2000);
    } else {
      // Quick succession within a wave
      setTimeout(scheduleNext, 600 + rng() * 800);
    }
  }

  // Horizontal current lines
  for (let i = 0; i < 6; i++) {
    const line = document.createElement('div');
    line.className = 'current-line';
    line.style.top = (15 + Math.random() * 55) + '%';
    line.style.width = (30 + Math.random() * 40) + '%';
    line.style.animationDuration = (20 + Math.random() * 15) + 's';
    line.style.animationDelay = (-Math.random() * 20) + 's';
    ocean.appendChild(line);
  }

  // Canvas caustics
  const causticsCanvas = document.getElementById('caustics-canvas');
  const ctx = causticsCanvas.getContext('2d');
  function resizeCaustics() {
    causticsCanvas.width = ocean.clientWidth / 3; // Low res for performance
    causticsCanvas.height = ocean.clientHeight / 6;
  }
  // Delay first resize to ensure ocean has rendered
  requestAnimationFrame(resizeCaustics);
  window.addEventListener('resize', resizeCaustics);

  function drawCaustics(time) {
    const w = causticsCanvas.width;
    const h = causticsCanvas.height;
    const t = time * 0.0003;

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = 'rgba(90,200,196,0.3)';

    for (let i = 0; i < 8; i++) {
      const cx = w * (0.15 + 0.7 * Math.sin(t + i * 1.3) * 0.5 + 0.5);
      const cy = h * (0.2 + 0.6 * Math.cos(t * 0.7 + i * 0.9) * 0.5 + 0.5);
      const r = (15 + 10 * Math.sin(t * 0.5 + i * 2)) * (w / 100);
      ctx.beginPath();
      ctx.arc(cx, cy, Math.max(r, 2), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function causticsLoop(time) {
    if (ended) return;
    drawCaustics(time);
    requestAnimationFrame(causticsLoop);
  }
  requestAnimationFrame(causticsLoop);

  // Background atmosphere fragments (distant, untappable)
  const distantWords = ['memory', 'attachment', 'choice', 'tide', 'permanence',
    'surface', 'depth', 'filter', 'anchor', 'drift'];
  function spawnDistant() {
    if (ended) return;
    const word = distantWords[Math.floor(rng() * distantWords.length)];
    const el = document.createElement('div');
    el.style.cssText = `position:absolute; font-size:10px; color:rgba(90,154,154,0.04);
      pointer-events:none; z-index:0; white-space:nowrap;
      top:${10 + rng() * 60}%; left:-100px;`;
    el.textContent = word;
    ocean.appendChild(el);
    const speed = 30 + rng() * 20;
    const w = ocean.clientWidth;
    const start = performance.now();
    function d(now) {
      const t = (now - start) / (speed * 1000);
      if (t > 1) { el.remove(); return; }
      el.style.left = (-100 + t * (w + 200)) + 'px';
      requestAnimationFrame(d);
    }
    requestAnimationFrame(d);
  }
  setInterval(() => { if (!ended) spawnDistant(); }, 5000);
  setTimeout(spawnDistant, 2000);

  // Occasional tiny fish silhouette
  function spawnFish() {
    if (ended) return;
    const el = document.createElement('div');
    const y = 15 + rng() * 50;
    const goRight = rng() > 0.5;
    const size = 6 + rng() * 4;
    el.style.cssText = `position:absolute; pointer-events:none; z-index:0;
      top:${y}%; font-size:${size}px; color:rgba(90,154,154,0.06);
      ${goRight ? 'left:-20px' : 'right:-20px; transform:scaleX(-1)'};`;
    el.innerHTML = '&#9753;'; // fish-like character
    ocean.appendChild(el);
    const speed = 12 + rng() * 15;
    const w = ocean.clientWidth;
    const start = performance.now();
    function swim(now) {
      const t = (now - start) / (speed * 1000);
      if (t > 1) { el.remove(); return; }
      const x = goRight ? (-20 + t * (w + 40)) : (w + 20 - t * (w + 40));
      const wobY = Math.sin(t * 20) * 3;
      if (goRight) el.style.left = x + 'px';
      else { el.style.right = 'auto'; el.style.left = x + 'px'; }
      el.style.top = `calc(${y}% + ${wobY}px)`;
      requestAnimationFrame(swim);
    }
    requestAnimationFrame(swim);
  }
  setTimeout(spawnFish, 8000 + rng() * 10000);
  setInterval(() => { if (!ended) spawnFish(); }, 15000 + rng() * 10000);

  // Floating plankton particles
  function spawnParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const x = Math.random() * ocean.clientWidth;
    const y = Math.random() * ocean.clientHeight * 0.7;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.opacity = '0';
    ocean.appendChild(p);

    const dx = (Math.random() - 0.5) * 60;
    const dy = -20 - Math.random() * 40;
    const dur = 6000 + Math.random() * 6000;
    const start = performance.now();

    function drift(now) {
      const t = (now - start) / dur;
      if (t > 1) { p.remove(); return; }
      const ease = t < 0.2 ? t * 5 : t > 0.8 ? (1 - t) * 5 : 1;
      p.style.opacity = (0.12 * ease).toString();
      p.style.left = (x + dx * t) + 'px';
      p.style.top = (y + dy * t + Math.sin(t * 6) * 5) + 'px';
      requestAnimationFrame(drift);
    }
    requestAnimationFrame(drift);
  }

  // Spawn initial batch of particles
  for (let i = 0; i < 15; i++) {
    setTimeout(spawnParticle, Math.random() * 3000);
  }
  setInterval(() => { if (!ended) spawnParticle(); }, 800);

  // Check if already completed today
  const storageKey = 'barnacle-' + today;
  const saved = localStorage.getItem(storageKey);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      attached = data;
      shown = TOTAL_TO_SHOW;
      const veilEl = document.getElementById('intro-veil');
      if (veilEl) veilEl.remove();
      // Show end card directly (don't call endSession — just render the result)
      ended = true;

      collection.innerHTML = '';
      const items = attached.length > 0
        ? attached
        : ['you let everything pass', 'the rock remains', 'waiting for tomorrow\u2019s tide'];
      items.forEach((text, i) => {
        const item = document.createElement('span');
        item.className = 'item';
        item.textContent = text;
        item.style.animationDelay = (i * 0.15) + 's';
        if (attached.length === 0) {
          item.style.fontStyle = 'italic';
          item.style.opacity = '0.6';
        }
        collection.appendChild(item);
      });

      const kept = attached.length;
      const released = TOTAL_TO_SHOW - kept;
      document.getElementById('stats').textContent =
        kept + ' kept \u00b7 ' + released + ' released';

      const h2 = endcard.querySelector('h2');
      if (kept === 0) h2.textContent = 'Bare Rock';
      else if (kept <= 2) h2.textContent = 'Sparse Reef';
      else if (kept <= 4) h2.textContent = 'Your Reef';
      else if (kept <= 6) h2.textContent = 'Rich Reef';
      else h2.textContent = 'Full Reef';

      generateReefArt(kept);
      endcard.classList.add('show');
    } catch(e) {
      localStorage.removeItem(storageKey);
    }
  }

  if (!ended) {
    // Intro veil: fade after 2.5s, start fragments after it fades
    const veil = document.getElementById('intro-veil');
    setTimeout(() => {
      veil.classList.add('fade');
      setTimeout(() => veil.remove(), 2000);
    }, 2500);

    requestAnimationFrame(animate);
    setTimeout(scheduleNext, 3500); // Start after intro fades
  }

  // Ambient bubbles from reef
  setInterval(() => {
    if (ended) return;
    const cx = ocean.clientWidth / 2 + (Math.random() - 0.5) * 200;
    const rect = ocean.getBoundingClientRect();
    spawnBubbles(rect.left + cx, rect.top + ocean.clientHeight - 30, 1);
  }, 4000);
})();
</script>
</body>
</html>
