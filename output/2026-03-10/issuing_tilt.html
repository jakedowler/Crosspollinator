<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TILT — What Issues Forth</title>
<meta name="description" content="Tilt to guide what's issuing from the source. Fill the vessels before time runs out.">
<meta name="theme-color" content="#f5f0e6">
<style>
  :root {
    --void: #f5f0e6;
    --glow: #2a2a1e;
    --ember: #c45a2c;
    --cool: #5a7a4a;
    --mint: #8aaa5a;
    --purple: #7a6a4a;
    --surface: #e8e0cc;
    --line: #d4cbb0;
    --olive: #6b7a3a;
    --dark-olive: #3a4420;
    --cream: #faf6ee;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100dvh;
    overflow: hidden;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: var(--cream);
    color: var(--dark-olive);
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    pointer-events: none;
  }

  #ui h1 {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 400;
    opacity: 0.6;
  }

  #ui .timer {
    font-size: 14px;
    font-variant-numeric: tabular-nums;
    opacity: 0.5;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  #score-display {
    position: absolute;
    bottom: 16px;
    left: 0; right: 0;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.4;
  }

  #wave-indicator {
    position: absolute;
    top: 40px;
    left: 0; right: 0;
    text-align: center;
    z-index: 10;
    pointer-events: none;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #wave-indicator.show { opacity: 0.6; }

  #intro {
    position: absolute;
    inset: 0;
    background: var(--cream);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    transition: opacity 1s;
  }

  #intro.fade { opacity: 0; pointer-events: none; }

  #intro h1 {
    font-size: 28px;
    letter-spacing: 6px;
    font-weight: 300;
    margin-bottom: 8px;
    color: var(--dark-olive);
  }

  #intro p {
    font-size: 13px;
    opacity: 0.5;
    margin-bottom: 6px;
    color: var(--olive);
  }

  #intro .rules {
    font-size: 11px;
    opacity: 0.35;
    margin-bottom: 24px;
    color: var(--dark-olive);
    max-width: 280px;
    text-align: center;
    line-height: 1.6;
  }

  #intro .start-btn {
    background: none;
    border: 1px solid var(--olive);
    color: var(--dark-olive);
    padding: 10px 28px;
    border-radius: 24px;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #intro .start-btn:hover {
    border-color: var(--dark-olive);
    background: rgba(107,122,58,0.08);
  }

  #endcard {
    position: absolute;
    inset: 0;
    background: rgba(250,246,238,0.95);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    transition: opacity 1s;
  }

  #endcard.show { display: flex; opacity: 1; }

  #endcard h2 {
    font-size: 22px;
    letter-spacing: 4px;
    font-weight: 300;
    margin-bottom: 6px;
    color: var(--dark-olive);
  }

  #endcard .final-score {
    font-size: 48px;
    font-weight: 200;
    margin: 16px 0;
    color: var(--olive);
  }

  #endcard .breakdown {
    font-size: 12px;
    opacity: 0.5;
    letter-spacing: 1px;
    margin-bottom: 24px;
    color: var(--dark-olive);
    text-align: center;
    line-height: 1.8;
  }

  #endcard .again-btn {
    background: none;
    border: 1px solid var(--olive);
    color: var(--dark-olive);
    padding: 10px 28px;
    border-radius: 24px;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #endcard .again-btn:hover {
    border-color: var(--dark-olive);
    background: rgba(107,122,58,0.08);
  }

  #hint {
    position: absolute;
    bottom: 36px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    opacity: 0.3;
    z-index: 10;
    pointer-events: none;
    font-style: italic;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <h1>TILT</h1>
  <div class="timer" id="timer">1:00</div>
</div>

<div id="score-display">
  <span id="score-text">0 caught · 0 lost</span>
</div>

<div id="wave-indicator"></div>

<div id="hint">tilt your device or move your pointer</div>

<div id="intro">
  <h1>TILT</h1>
  <p>guide what issues forth</p>
  <div class="rules">
    particles issue in waves of one color<br>
    tilt to steer them into matching vessels<br>
    particles that leave the screen are lost
  </div>
  <button class="start-btn" id="start-btn">begin</button>
</div>

<div id="endcard">
  <h2>TIME</h2>
  <div class="final-score" id="final-score">0</div>
  <div class="breakdown" id="breakdown"></div>
  <button class="again-btn" id="again-btn">once more</button>
</div>

<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);

  let W, H;
  function resize() {
    W = canvas.clientWidth;
    H = canvas.clientHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (started && !gameOver) createVessels();
  }
  resize();
  window.addEventListener('resize', resize);

  // --- Constants ---
  const COLORS = {
    ember: '#b85430',
    cool: '#4a6a3a',
    mint: '#7a9e48',
    purple: '#8a6e3a'
  };
  const COLOR_KEYS = Object.keys(COLORS);
  const VESSEL_SYMBOLS = { ember: '\u25C6', cool: '\u25CF', mint: '\u25B2', purple: '\u25A0' };
  const VESSEL_NAMES = { ember: 'fire', cool: 'leaf', mint: 'seed', purple: 'earth' };

  const GRAVITY = 180;
  const SOURCE_RADIUS = 8;
  const PARTICLE_RADIUS = 5;

  // --- State ---
  let tiltX = 0, tiltY = 0;
  let smoothTiltX = 0, smoothTiltY = 0;
  let started = false, gameOver = false;
  let timeLeft = 60;
  let lastTime = 0;
  let score = 0;
  let particles = [];
  let vessels = [];
  let collected = { ember: 0, cool: 0, mint: 0, purple: 0 };
  let lost = 0;
  let shakeX = 0, shakeY = 0;
  let combo = 0;
  let comboTimer = 0;
  let floatingTexts = [];
  let sparkles = [];
  let ripples = [];

  // Wave system
  let waveQueue = [];
  let waveSpawnCount = 0;
  let waveSpawnDelay = 0;
  let currentWaveColor = null;
  let nextWaveColor = null;
  let wavePause = 0;
  let waveNumber = 0;
  let totalWaveParticles = 0;
  let waveCaught = 0;
  let waveLost = 0;
  let perfectWaves = 0;

  // Tilt input
  let hasDeviceOrientation = false;

  window.addEventListener('deviceorientation', (e) => {
    if (e.gamma === null) return;
    hasDeviceOrientation = true;
    tiltX = Math.max(-1, Math.min(1, (e.gamma || 0) / 25));
    tiltY = Math.max(-1, Math.min(1, (e.beta - 45 || 0) / 25));
  });

  document.addEventListener('pointermove', (e) => {
    if (hasDeviceOrientation) return;
    tiltX = ((e.clientX / W) - 0.5) * 2;
    tiltY = ((e.clientY / H) - 0.5) * 2;
  });

  // --- Vessels ---
  // Placed asymmetrically: spread across bottom with real distance between them
  function createVessels() {
    const positions = [
      { x: W * 0.12, y: H * 0.78, key: 'ember' },
      { x: W * 0.38, y: H * 0.88, key: 'cool' },
      { x: W * 0.62, y: H * 0.88, key: 'mint' },
      { x: W * 0.88, y: H * 0.78, key: 'purple' },
    ];

    // Preserve fill state on resize
    const oldFills = {};
    for (const v of vessels) oldFills[v.key] = v.fill;

    vessels = [];
    positions.forEach(pos => {
      vessels.push({
        x: pos.x,
        y: pos.y,
        radius: 32,
        color: COLORS[pos.key],
        key: pos.key,
        fill: oldFills[pos.key] || 0,
        capacity: 8,
        pulseTimer: 0,
        glowIntensity: 0,
      });
    });
  }

  // --- Wave generation ---
  function generateWaveQueue() {
    // Create a shuffled sequence of colors so you don't get the same
    // color twice in a row (mostly)
    const shuffled = [...COLOR_KEYS];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
  }

  // Mixed wave state
  let isMixedWave = false;
  let mixedColors = [];

  function startNextWave() {
    if (waveQueue.length === 0) {
      waveQueue = generateWaveQueue();
    }

    waveNumber++;
    isMixedWave = false;
    mixedColors = [];

    const progress = 1 - (timeLeft / 60);

    // Late game: chance of mixed wave (2 colors)
    if (waveNumber > 6 && progress > 0.45 && Math.random() < 0.35) {
      isMixedWave = true;
      // Pick 2 different colors
      const shuffled = [...COLOR_KEYS].sort(() => Math.random() - 0.5);
      mixedColors = [shuffled[0], shuffled[1]];
      currentWaveColor = mixedColors[0]; // primary for source color
    } else {
      currentWaveColor = waveQueue.shift();
    }

    // Prepare next preview
    if (waveQueue.length === 0) waveQueue = generateWaveQueue();
    nextWaveColor = waveQueue[0];

    // Difficulty curve
    if (progress < 0.25) {
      waveSpawnCount = 2;
    } else if (progress < 0.5) {
      waveSpawnCount = 2 + Math.floor(Math.random() * 2); // 2-3
    } else if (progress < 0.75) {
      waveSpawnCount = 3 + Math.floor(Math.random() * 2); // 3-4
    } else {
      waveSpawnCount = 3 + Math.floor(Math.random() * 3); // 3-5
    }

    totalWaveParticles = waveSpawnCount;
    waveCaught = 0;
    waveLost = 0;
    waveSpawnDelay = 0;

    // Show wave indicator
    const el = document.getElementById('wave-indicator');
    // Phase labels for progression feel
    let phaseLabel = '';
    const progress = 1 - (timeLeft / 60);
    if (progress > 0.75) phaseLabel = ' · surge';
    else if (progress > 0.5) phaseLabel = ' · rising';
    else if (progress > 0.25) phaseLabel = ' · steady';

    if (isMixedWave) {
      el.textContent = VESSEL_NAMES[mixedColors[0]] + ' + ' + VESSEL_NAMES[mixedColors[1]] + phaseLabel;
      el.style.color = COLORS[mixedColors[0]];
    } else {
      el.textContent = VESSEL_NAMES[currentWaveColor] + phaseLabel;
      el.style.color = COLORS[currentWaveColor];
    }
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1500);


  }

  function spawnWaveParticle() {
    const cx = W / 2;
    const cy = H * 0.15;

    // Pick color — for mixed waves, alternate
    let colorKey;
    if (isMixedWave) {
      colorKey = mixedColors[waveSpawnCount % mixedColors.length];
    } else {
      colorKey = currentWaveColor;
    }

    // Spray angle: mostly downward with some spread
    // Slight bias toward the correct vessel to make it feel fair
    const vessel = vessels.find(v => v.key === colorKey);
    const angleToVessel = Math.atan2(vessel.y - cy, vessel.x - cx);
    const randomAngle = -Math.PI / 2 + (Math.random() - 0.5) * 1.4;
    const angle = randomAngle * 0.8 + angleToVessel * 0.2;

    const speed = 30 + Math.random() * 25;

    const isLastInWave = waveSpawnCount <= 1; // this is the last particle of the wave

    particles.push({
      x: cx + (Math.random() - 0.5) * 6,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      radius: PARTICLE_RADIUS + Math.random() * 1.5 + (isLastInWave ? 1.5 : 0),
      color: COLORS[colorKey],
      colorKey: colorKey,
      life: 12,
      age: 0,
      trail: [],
      nearEdge: false,
      isLast: isLastInWave,
    });
  }

  // --- Sparkle effects ---
  function addSparkles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 40 + Math.random() * 80;
      sparkles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: 1 + Math.random() * 2,
        color,
        life: 0.4 + Math.random() * 0.4,
        age: 0
      });
    }
  }

  // --- Update ---
  function update(dt) {
    if (!started || gameOver) return;

    timeLeft -= dt;
    if (timeLeft <= 0) {
      timeLeft = 0;
      endGame();
      return;
    }

    // Timer display
    const secs = Math.ceil(timeLeft);
    const mins = Math.floor(secs / 60);
    const s = secs % 60;
    const timerEl = document.getElementById('timer');
    timerEl.textContent = mins + ':' + s.toString().padStart(2, '0');
    timerEl.style.color = timeLeft < 10 ? '#b85430' : '';
    timerEl.style.opacity = timeLeft < 10 ? '0.8' : '0.5';

    // Smooth tilt (slight lag for feel)
    smoothTiltX += (tiltX - smoothTiltX) * 6 * dt;
    smoothTiltY += (tiltY - smoothTiltY) * 6 * dt;

    // --- Wave management ---
    if (waveSpawnCount > 0) {
      // Currently spawning a wave
      waveSpawnDelay -= dt;
      if (waveSpawnDelay <= 0) {
        spawnWaveParticle();
        waveSpawnCount--;
        // Stagger more at start, faster in late game
        const staggerBase = timeLeft > 30 ? 0.4 : 0.3;
        waveSpawnDelay = staggerBase + Math.random() * 0.15;
      }
    } else if (particles.length === 0 && wavePause <= 0 && currentWaveColor !== null) {
      // All particles from previous wave resolved — check for perfect wave
      if (waveCaught === totalWaveParticles && totalWaveParticles > 0) {
        perfectWaves++;
        const bonus = 25 * totalWaveParticles;
        score += bonus;
        floatingTexts.push({
          x: W / 2, y: H * 0.45,
          text: 'PERFECT WAVE +' + bonus,
          color: COLORS[currentWaveColor],
          life: 2
        });
        // Big sparkle burst at center
        addSparkles(W / 2, H * 0.45, COLORS[currentWaveColor], 15);
      }

      // Pause then start next
      wavePause = 1.2;
    } else if (particles.length === 0 && wavePause <= 0 && currentWaveColor === null) {
      // First wave hasn't started yet — handled by initial wavePause
    }

    if (wavePause > 0) {
      wavePause -= dt;
      if (wavePause <= 0) {
        startNextWave();
      }
      // Preview next wave color — highlight target vessel during pause
      if (nextWaveColor) {

        const previewVessel = vessels.find(v => v.key === nextWaveColor);
        if (previewVessel) {
          previewVessel.glowIntensity = 0.5 + Math.sin(Date.now() * 0.006) * 0.3;
        }
      }
    }

    // --- Gravity ---
    // Nonlinear response: gentle for small tilts, dramatic for large
    const curvedTiltX = Math.sign(smoothTiltX) * Math.pow(Math.abs(smoothTiltX), 1.4);
    const curvedTiltY = Math.sign(smoothTiltY) * Math.pow(Math.abs(smoothTiltY), 1.3);
    const gx = curvedTiltX * GRAVITY * 2.2;
    const gy = GRAVITY * 0.25 + curvedTiltY * GRAVITY * 1.4;

    // --- Update particles ---
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age += dt;

      // Expired (shouldn't happen often with long life, but safety)
      if (p.age > p.life) {
        lost++;
        particles.splice(i, 1);
        continue;
      }

      p.vx += gx * dt;
      p.vy += gy * dt;

      // Light air resistance
      p.vx *= 0.995;
      p.vy *= 0.995;

      p.x += p.vx * dt;
      p.y += p.vy * dt;

      // Trail
      p.trail.push({ x: p.x, y: p.y });
      if (p.trail.length > 10) p.trail.shift();

      // --- Off-screen = lost ---
      const margin = 30;
      const edgeWarning = 60; // start flashing when near edge

      // Edge proximity warning — particle pulses when near boundary
      p.nearEdge = (
        p.x < edgeWarning || p.x > W - edgeWarning ||
        p.y < edgeWarning || p.y > H - edgeWarning
      );

      if (p.x < -margin || p.x > W + margin || p.y < -margin || p.y > H + margin) {
        lost++;
        waveLost++;
        particles.splice(i, 1);

        // Visual: edge flash where particle escaped
        const clampX = Math.max(0, Math.min(W, p.x));
        const clampY = Math.max(0, Math.min(H, p.y));
        floatingTexts.push({
          x: clampX, y: clampY,
          text: 'lost',
          color: '#8a3a2a',
          life: 1
        });

        shakeX += (Math.random() - 0.5) * 5;
        shakeY += (Math.random() - 0.5) * 5;
        continue;
      }

      // --- Gentle attraction toward correct vessel when close ---
      const correctVessel = vessels.find(vv => vv.key === p.colorKey);
      if (correctVessel) {
        const cdx = correctVessel.x - p.x;
        const cdy = correctVessel.y - p.y;
        const cdist = Math.sqrt(cdx * cdx + cdy * cdy);
        // Only attract when within 2x vessel radius — a gentle nudge, not a magnet
        if (cdist < correctVessel.radius * 2.5 && cdist > 0) {
          const attractStrength = 30 * (1 - cdist / (correctVessel.radius * 2.5));
          p.vx += (cdx / cdist) * attractStrength * dt;
          p.vy += (cdy / cdist) * attractStrength * dt;
        }
      }

      // --- Vessel collision ---
      for (const v of vessels) {
        const dx = p.x - v.x;
        const dy = p.y - v.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < v.radius + p.radius) {
          particles.splice(i, 1);

          if (p.colorKey === v.key) {
            // Correct vessel!
            const wasFull = v.fill >= v.capacity;
            v.fill = Math.min(v.fill + 1, v.capacity);
            combo++;
            comboTimer = 3;
            const pts = 15 + Math.min(combo * 5, 30);
            score += pts;
            v.pulseTimer = 0.4;
            collected[v.key]++;

            waveCaught++;
            addSparkles(p.x, p.y, v.color, 8);
            ripples.push({ x: v.x, y: v.y, radius: v.radius, maxRadius: v.radius * 3, color: v.color, life: 0.6, age: 0 });

            if (!wasFull && v.fill >= v.capacity) {
              score += 75;
              v.pulseTimer = 0.8;
              floatingTexts.push({
                x: v.x, y: v.y - v.radius - 24,
                text: 'FULL +75', color: v.color, life: 2
              });
              addSparkles(v.x, v.y, v.color, 20);
            } else {
              floatingTexts.push({
                x: v.x, y: v.y - v.radius - 8,
                text: '+' + pts + (combo > 2 ? ' x' + combo : ''),
                color: v.color, life: 1.2
              });
            }
          } else {
            // Wrong vessel — significant penalty
            waveLost++;
            combo = 0;
            score = Math.max(0, score - 10);
            v.pulseTimer = 0.2;
            shakeX = (Math.random() - 0.5) * 10;
            shakeY = (Math.random() - 0.5) * 10;

            floatingTexts.push({
              x: v.x, y: v.y - v.radius - 8,
              text: '-10 wrong',
              color: '#8a3a2a',
              life: 1.2
            });
          }
          break;
        }
      }
    }

    // --- Vessel glow for active wave ---
    for (const v of vessels) {
      if (v.pulseTimer > 0) v.pulseTimer -= dt;

      // Highlight the vessel(s) matching the current wave
      const isActive = isMixedWave
        ? mixedColors.includes(v.key)
        : (currentWaveColor === v.key);
      const targetGlow = (isActive && (waveSpawnCount > 0 || particles.length > 0)) ? 1 : 0;
      v.glowIntensity += (targetGlow - v.glowIntensity) * 4 * dt;
    }

    // Combo timer
    if (comboTimer > 0) {
      comboTimer -= dt;
      if (comboTimer <= 0) combo = 0;
    }

    // Shake decay
    shakeX *= 0.88;
    shakeY *= 0.88;
    if (Math.abs(shakeX) < 0.1) shakeX = 0;
    if (Math.abs(shakeY) < 0.1) shakeY = 0;

    // Floating texts
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const ft = floatingTexts[i];
      ft.life -= dt;
      ft.y -= 25 * dt;
      if (ft.life <= 0) floatingTexts.splice(i, 1);
    }

    // Ripples
    for (let i = ripples.length - 1; i >= 0; i--) {
      const r = ripples[i];
      r.age += dt;
      if (r.age > r.life) { ripples.splice(i, 1); continue; }
      r.radius += (r.maxRadius - r.radius) * 4 * dt;
    }

    // Sparkles
    for (let i = sparkles.length - 1; i >= 0; i--) {
      const s = sparkles[i];
      s.age += dt;
      if (s.age > s.life) { sparkles.splice(i, 1); continue; }
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vx *= 0.96;
      s.vy *= 0.96;
    }

    // Update score display
    const total = Object.values(collected).reduce((a, b) => a + b, 0);
    const comboStr = combo > 2 ? ' · ' + combo + 'x combo' : '';
    document.getElementById('score-text').textContent =
      total + ' caught · ' + lost + ' lost' + comboStr;
  }

  // --- Draw ---
  function draw() {
    ctx.save();
    ctx.translate(shakeX, shakeY);
    ctx.clearRect(-20, -20, W + 40, H + 40);

    // Background
    const grad = ctx.createRadialGradient(
      W / 2 + smoothTiltX * 60, H * 0.15 + smoothTiltY * 30, 0,
      W / 2, H / 2, H * 0.9
    );
    grad.addColorStop(0, '#f5f0e6');
    grad.addColorStop(1, '#ede5d0');
    ctx.fillStyle = grad;
    ctx.fillRect(-20, -20, W + 40, H + 40);

    if (!started && !gameOver) {
      ctx.restore();
      return;
    }

    // Ambient floating rings
    const t = Date.now() * 0.001;
    for (let i = 0; i < 4; i++) {
      const ax = W * 0.2 + Math.sin(t * 0.2 + i * 2.5) * W * 0.3;
      const ay = H * 0.3 + Math.cos(t * 0.15 + i * 1.8) * H * 0.2;
      const ar = 40 + i * 20;
      ctx.strokeStyle = 'rgba(107,122,58,0.025)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(ax, ay, ar, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Gravity flow field — curved strokes showing pull direction
    const gravAng = Math.atan2(
      GRAVITY * 0.3 + smoothTiltY * GRAVITY * 1.2,
      smoothTiltX * GRAVITY * 2.0
    );
    const tiltStrength = Math.sqrt(smoothTiltX * smoothTiltX + smoothTiltY * smoothTiltY);
    ctx.strokeStyle = 'rgba(58,68,32,' + (0.015 + tiltStrength * 0.02) + ')';
    ctx.lineWidth = 0.5;
    const gridSize = 70;
    for (let gx = gridSize * 0.5; gx < W; gx += gridSize) {
      for (let gy = gridSize * 0.5; gy < H; gy += gridSize) {
        const len = 10 + tiltStrength * 8;
        const localAng = gravAng + Math.sin(gx * 0.01 + gy * 0.01 + t * 0.5) * 0.15;
        ctx.beginPath();
        ctx.moveTo(gx, gy);
        const ex = gx + Math.cos(localAng) * len;
        const ey = gy + Math.sin(localAng) * len;
        ctx.lineTo(ex, ey);
        ctx.stroke();
        // Tiny dot at tip
        ctx.fillStyle = ctx.strokeStyle;
        ctx.beginPath();
        ctx.arc(ex, ey, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // --- Source ---
    const cx = W / 2;
    const cy = H * 0.15;
    const pulse = 1 + Math.sin(Date.now() * 0.003) * 0.2;

    // Source glow — colored by current/next wave
    const glowColor = currentWaveColor ? COLORS[currentWaveColor] : '#6b7a3a';
    const sg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40 * pulse);
    sg.addColorStop(0, hexToRgba(glowColor, 0.2));
    sg.addColorStop(0.5, hexToRgba(glowColor, 0.06));
    sg.addColorStop(1, hexToRgba(glowColor, 0));
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(cx, cy, 40 * pulse, 0, Math.PI * 2);
    ctx.fill();

    // Source core — draw the shape of the current wave color
    ctx.fillStyle = hexToRgba(glowColor, 0.6);
    if (currentWaveColor) {
      drawShape(ctx, currentWaveColor, cx, cy, SOURCE_RADIUS * pulse);
    } else {
      ctx.beginPath();
      ctx.arc(cx, cy, SOURCE_RADIUS * pulse, 0, Math.PI * 2);
      ctx.fill();
    }

    // Source ring
    ctx.strokeStyle = hexToRgba(glowColor, 0.2);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, SOURCE_RADIUS * 2.5 * pulse, 0, Math.PI * 2);
    ctx.stroke();

    // Particle count dots — show how many are left to spawn
    if (waveSpawnCount > 0) {
      for (let i = 0; i < waveSpawnCount; i++) {
        const dotAngle = -Math.PI / 2 + (i - (waveSpawnCount - 1) / 2) * 0.4;
        const dotR = SOURCE_RADIUS * 3.5;
        const dx = cx + Math.cos(dotAngle) * dotR;
        const dy = cy + Math.sin(dotAngle) * dotR;
        ctx.fillStyle = hexToRgba(glowColor, 0.3);
        ctx.beginPath();
        ctx.arc(dx, dy, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Gravity direction from source
    const gdLen = 25 + Math.abs(smoothTiltX) * 15;
    const gdAng = Math.atan2(
      GRAVITY * 0.3 + smoothTiltY * GRAVITY * 1.2,
      smoothTiltX * GRAVITY * 2.0
    );
    ctx.strokeStyle = hexToRgba(glowColor, 0.15);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy + SOURCE_RADIUS * 2);
    ctx.lineTo(
      cx + Math.cos(gdAng) * gdLen,
      cy + SOURCE_RADIUS * 2 + Math.sin(gdAng) * gdLen
    );
    ctx.stroke();
    // Arrowhead
    const ax = cx + Math.cos(gdAng) * gdLen;
    const ay = cy + SOURCE_RADIUS * 2 + Math.sin(gdAng) * gdLen;
    ctx.fillStyle = hexToRgba(glowColor, 0.15);
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax - Math.cos(gdAng - 0.4) * 6, ay - Math.sin(gdAng - 0.4) * 6);
    ctx.lineTo(ax - Math.cos(gdAng + 0.4) * 6, ay - Math.sin(gdAng + 0.4) * 6);
    ctx.closePath();
    ctx.fill();

    // --- Edge warning glow --- when particles are near boundaries
    let edgeDanger = { left: 0, right: 0, top: 0, bottom: 0 };
    for (const p of particles) {
      if (p.nearEdge) {
        const edgeW = 60;
        if (p.x < edgeW) edgeDanger.left = Math.max(edgeDanger.left, 1 - p.x / edgeW);
        if (p.x > W - edgeW) edgeDanger.right = Math.max(edgeDanger.right, 1 - (W - p.x) / edgeW);
        if (p.y < edgeW) edgeDanger.top = Math.max(edgeDanger.top, 1 - p.y / edgeW);
        if (p.y > H - edgeW) edgeDanger.bottom = Math.max(edgeDanger.bottom, 1 - (H - p.y) / edgeW);
      }
    }

    // Draw edge glows
    if (edgeDanger.left > 0.1) {
      const eg = ctx.createLinearGradient(0, 0, 40, 0);
      eg.addColorStop(0, 'rgba(138,58,42,' + edgeDanger.left * 0.15 + ')');
      eg.addColorStop(1, 'rgba(138,58,42,0)');
      ctx.fillStyle = eg;
      ctx.fillRect(0, 0, 40, H);
    }
    if (edgeDanger.right > 0.1) {
      const eg = ctx.createLinearGradient(W, 0, W - 40, 0);
      eg.addColorStop(0, 'rgba(138,58,42,' + edgeDanger.right * 0.15 + ')');
      eg.addColorStop(1, 'rgba(138,58,42,0)');
      ctx.fillStyle = eg;
      ctx.fillRect(W - 40, 0, 40, H);
    }
    if (edgeDanger.top > 0.1) {
      const eg = ctx.createLinearGradient(0, 0, 0, 40);
      eg.addColorStop(0, 'rgba(138,58,42,' + edgeDanger.top * 0.15 + ')');
      eg.addColorStop(1, 'rgba(138,58,42,0)');
      ctx.fillStyle = eg;
      ctx.fillRect(0, 0, W, 40);
    }
    if (edgeDanger.bottom > 0.1) {
      const eg = ctx.createLinearGradient(0, H, 0, H - 40);
      eg.addColorStop(0, 'rgba(138,58,42,' + edgeDanger.bottom * 0.15 + ')');
      eg.addColorStop(1, 'rgba(138,58,42,0)');
      ctx.fillStyle = eg;
      ctx.fillRect(0, H - 40, W, 40);
    }

    // --- Connection lines: faint dashed lines from source to target vessel(s) ---
    const activeColors = isMixedWave ? mixedColors : (currentWaveColor ? [currentWaveColor] : []);
    for (const ck of activeColors) {
      const v = vessels.find(vv => vv.key === ck);
      if (v) {
        ctx.strokeStyle = hexToRgba(v.color, 0.06 + v.glowIntensity * 0.06);
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 8]);
        ctx.beginPath();
        ctx.moveTo(cx, cy + 20);
        ctx.lineTo(v.x, v.y);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // --- Particles ---
    for (const p of particles) {
      const alpha = Math.max(0.2, 1 - p.age / p.life);

      // Trail — thicker and more visible for fast particles
      if (p.trail.length > 2) {
        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        const trailAlpha = Math.min(0.3, speed / 400) * alpha;
        const trailWidth = p.radius * (0.4 + Math.min(0.8, speed / 300));

        ctx.strokeStyle = p.color;
        ctx.lineWidth = trailWidth;
        ctx.lineCap = 'round';
        ctx.globalAlpha = trailAlpha;
        ctx.beginPath();
        ctx.moveTo(p.trail[0].x, p.trail[0].y);
        for (let t = 1; t < p.trail.length; t++) {
          ctx.lineTo(p.trail[t].x, p.trail[t].y);
        }
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      // Glow — brighter for last particle in wave
      const glowMult = p.isLast ? 0.35 : 0.2;
      ctx.globalAlpha = alpha * glowMult;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * (p.isLast ? 4.5 : 3.5), 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;

      // Last particle gets a pulsing ring
      if (p.isLast) {
        const ringPulse = 0.5 + Math.sin(Date.now() * 0.01) * 0.5;
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 1;
        ctx.globalAlpha = alpha * ringPulse * 0.4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * 2.5 + ringPulse * 3, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      // Edge warning — pulsing ring
      if (p.nearEdge) {
        const warnPulse = 0.5 + Math.sin(Date.now() * 0.015) * 0.5;
        ctx.strokeStyle = '#8a3a2a';
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = alpha * warnPulse * 0.6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      // Core — shaped
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      drawShape(ctx, p.colorKey, p.x, p.y, p.radius);
      ctx.globalAlpha = 1;
    }

    // --- Sparkles ---
    for (const s of sparkles) {
      const alpha = 1 - s.age / s.life;
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha * 0.7;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.radius * (1 - s.age / s.life), 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // --- Ripples ---
    for (const r of ripples) {
      const alpha = 1 - r.age / r.life;
      ctx.strokeStyle = r.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = alpha * 0.3;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // --- Vessels ---
    for (const v of vessels) {
      const pulseScale = v.pulseTimer > 0 ? 1 + v.pulseTimer * 0.3 : 1;
      const r = v.radius * pulseScale;

      // Active glow (when this vessel's wave is active)
      if (v.glowIntensity > 0.05) {
        const glow = ctx.createRadialGradient(v.x, v.y, r * 0.3, v.x, v.y, r * 2.5);
        glow.addColorStop(0, hexToRgba(v.color, v.glowIntensity * 0.15));
        glow.addColorStop(1, hexToRgba(v.color, 0));
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(v.x, v.y, r * 2.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Vessel body — U-shaped cup
      const cupWidth = r * 1.1;
      const cupHeight = r * 0.8;
      const lipFlare = r * 0.2;

      ctx.strokeStyle = v.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.35 + v.glowIntensity * 0.35;

      ctx.beginPath();
      // Left lip (flared out)
      ctx.moveTo(v.x - cupWidth - lipFlare, v.y - cupHeight * 0.3);
      // Left side
      ctx.quadraticCurveTo(v.x - cupWidth, v.y + cupHeight * 0.2, v.x - cupWidth * 0.5, v.y + cupHeight);
      // Bottom curve
      ctx.quadraticCurveTo(v.x, v.y + cupHeight * 1.2, v.x + cupWidth * 0.5, v.y + cupHeight);
      // Right side
      ctx.quadraticCurveTo(v.x + cupWidth, v.y + cupHeight * 0.2, v.x + cupWidth + lipFlare, v.y - cupHeight * 0.3);
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Fill level — pool rising from bottom of cup
      const fillPct = v.fill / v.capacity;
      if (fillPct > 0) {
        ctx.fillStyle = v.color;
        ctx.globalAlpha = 0.08 + fillPct * 0.18;
        const fillH = cupHeight * 1.2 * fillPct;
        const fillW = cupWidth * (0.4 + fillPct * 0.6);
        ctx.beginPath();
        ctx.ellipse(v.x, v.y + cupHeight * 1.1 - fillH * 0.5, fillW, fillH * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Shape symbol inside vessel
      ctx.fillStyle = v.color;
      ctx.globalAlpha = 0.2 + v.glowIntensity * 0.25;
      drawShape(ctx, v.key, v.x, v.y + cupHeight * 0.3, 7);
      ctx.globalAlpha = 1;

      // Catch zone indicator — only show when wave is active for this vessel
      if (v.glowIntensity > 0.3) {
        ctx.strokeStyle = v.color;
        ctx.lineWidth = 0.5;
        ctx.globalAlpha = v.glowIntensity * 0.12;
        ctx.setLineDash([3, 6]);
        ctx.beginPath();
        ctx.arc(v.x, v.y, v.radius * 2.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;
      }

      // Count label
      ctx.fillStyle = v.color;
      ctx.globalAlpha = 0.55;
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText(v.fill + '/' + v.capacity, v.x, v.y + r * 1.1 + 18);
      ctx.globalAlpha = 1;
    }

    // --- Floating texts ---
    for (const ft of floatingTexts) {
      ctx.fillStyle = ft.color;
      ctx.globalAlpha = Math.min(1, ft.life);
      ctx.font = 'bold 12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(ft.text, ft.x, ft.y);
      ctx.globalAlpha = 1;
    }

    // --- Tilt indicator (bottom center, subtle crosshair) ---
    const tiltIndicatorY = H - 30;
    const tiltIndicatorX = W / 2;
    const tiltDotX = tiltIndicatorX + smoothTiltX * 25;
    const tiltDotY = tiltIndicatorY + smoothTiltY * 12;

    // Crosshair background
    ctx.strokeStyle = 'rgba(58,68,32,0.06)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(tiltIndicatorX - 30, tiltIndicatorY);
    ctx.lineTo(tiltIndicatorX + 30, tiltIndicatorY);
    ctx.moveTo(tiltIndicatorX, tiltIndicatorY - 15);
    ctx.lineTo(tiltIndicatorX, tiltIndicatorY + 15);
    ctx.stroke();

    // Tilt dot
    ctx.fillStyle = 'rgba(58,68,32,0.2)';
    ctx.beginPath();
    ctx.arc(tiltDotX, tiltDotY, 3, 0, Math.PI * 2);
    ctx.fill();

    // --- Wave pause: "next" preview + breathing ring ---
    if (wavePause > 0 && nextWaveColor) {
      // Breathing ring expanding from source
      const breathProgress = 1 - (wavePause / 1.2);
      const breathR = 15 + breathProgress * 50;
      ctx.strokeStyle = hexToRgba(COLORS[nextWaveColor], 0.15 * (1 - breathProgress));
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, breathR, 0, Math.PI * 2);
      ctx.stroke();

      // Next wave label
      ctx.globalAlpha = 0.35 * Math.min(1, wavePause);
      ctx.fillStyle = COLORS[nextWaveColor];
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('next: ' + VESSEL_NAMES[nextWaveColor], cx, cy + 55);
      ctx.globalAlpha = 1;

      // Preview line from source to next vessel
      const nextVessel = vessels.find(v => v.key === nextWaveColor);
      if (nextVessel) {
        ctx.strokeStyle = hexToRgba(COLORS[nextWaveColor], 0.08 * Math.min(1, wavePause));
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 10]);
        ctx.beginPath();
        ctx.moveTo(cx, cy + 30);
        ctx.lineTo(nextVessel.x, nextVessel.y);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    ctx.restore();
  }

  // --- Helpers ---
  function drawShape(c, key, x, y, r) {
    if (key === 'ember') {
      c.beginPath();
      c.moveTo(x, y - r);
      c.lineTo(x + r, y);
      c.lineTo(x, y + r);
      c.lineTo(x - r, y);
      c.closePath();
      c.fill();
    } else if (key === 'mint') {
      c.beginPath();
      c.moveTo(x, y - r);
      c.lineTo(x + r, y + r * 0.7);
      c.lineTo(x - r, y + r * 0.7);
      c.closePath();
      c.fill();
    } else if (key === 'purple') {
      c.fillRect(x - r * 0.75, y - r * 0.75, r * 1.5, r * 1.5);
    } else {
      c.beginPath();
      c.arc(x, y, r, 0, Math.PI * 2);
      c.fill();
    }
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // --- End game ---
  function endGame() {
    gameOver = true;
    // Remaining particles just fade away — don't count them
    particles = [];
    const total = Object.values(collected).reduce((a, b) => a + b, 0);
    const fullVessels = vessels.filter(v => v.fill >= v.capacity).length;
    const accuracy = (total + lost) > 0 ? Math.round(total / (total + lost) * 100) : 0;

    document.getElementById('final-score').textContent = score;

    let rating;
    if (fullVessels === 4) rating = 'Perfect Harvest';
    else if (fullVessels >= 3) rating = 'Abundant';
    else if (fullVessels >= 2) rating = 'Plentiful';
    else if (accuracy >= 70) rating = 'Steady Flow';
    else if (total >= 10) rating = 'Trickle';
    else rating = 'Drought';

    document.querySelector('#endcard h2').textContent = rating;

    const lines = [
      total + ' caught · ' + lost + ' lost · ' + accuracy + '% accuracy',
      fullVessels + ' of 4 vessels full · ' + perfectWaves + ' perfect waves',
      '',
      COLOR_KEYS.map(k =>
        VESSEL_SYMBOLS[k] + ' ' + VESSEL_NAMES[k] + ': ' + collected[k] + '/' + vessels.find(v => v.key === k).capacity
      ).join('  ')
    ];
    document.getElementById('breakdown').innerHTML = lines.join('<br>');

    setTimeout(() => {
      document.getElementById('endcard').classList.add('show');
    }, 600);
  }

  // --- Start ---
  function startGame() {
    started = true;
    gameOver = false;
    timeLeft = 60;
    score = 0;
    particles = [];
    collected = { ember: 0, cool: 0, mint: 0, purple: 0 };
    lost = 0;
    combo = 0;
    comboTimer = 0;
    floatingTexts = [];
    sparkles = [];
    ripples = [];
    shakeX = 0;
    shakeY = 0;
    waveQueue = [];
    waveSpawnCount = 0;
    waveNumber = 0;
    currentWaveColor = null;
    nextWaveColor = null;
    wavePause = 1.5;
    waveCaught = 0;
    waveLost = 0;
    perfectWaves = 0;
    isMixedWave = false;
    mixedColors = [];

    document.getElementById('endcard').classList.remove('show');
    document.getElementById('intro').classList.add('fade');
    document.getElementById('hint').style.transition = 'opacity 3s';
    setTimeout(() => {
      document.getElementById('hint').style.opacity = '0';
    }, 4000);

    createVessels();
    waveQueue = generateWaveQueue();
    nextWaveColor = waveQueue[0];
  }

  // --- Main loop ---
  function loop(time) {
    if (!lastTime) lastTime = time;
    const dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;

    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  document.getElementById('start-btn').addEventListener('click', () => {
    startGame();
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().catch(() => {});
    }
  });

  document.getElementById('again-btn').addEventListener('click', () => {
    startGame();
  });

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
