<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mineral Rustler — Stake Your Claim Before They're Gone</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --card: #0f3460;
            --accent: #e94560;
            --gold: #f5c518;
            --crystal: #53d8fb;
            --earth: #a67c52;
            --text: #eaeaea;
            --muted: #8888aa;
            --success: #4ecdc4;
            --danger: #ff6b6b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 1.5rem 1rem 1rem;
            background: linear-gradient(135deg, var(--surface), var(--card));
            border-bottom: 2px solid var(--accent);
        }

        header h1 {
            font-size: 2rem;
            letter-spacing: 0.02em;
        }

        header h1 .mineral { color: var(--crystal); }
        header h1 .rustler { color: var(--accent); }

        header p {
            color: var(--muted);
            margin-top: 0.3rem;
            font-size: 0.95rem;
        }

        .hud {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 0.75rem;
            background: var(--surface);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .hud span { display: flex; align-items: center; gap: 0.4rem; }
        .hud .gold-count { color: var(--gold); }
        .hud .crystal-count { color: var(--crystal); }
        .hud .notoriety { color: var(--accent); }
        .hud .timer { color: var(--success); }

        .game-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.75rem;
            padding: 1.5rem;
            max-width: 700px;
            margin: 0 auto;
        }

        .mine-cell {
            aspect-ratio: 1;
            background: var(--earth);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            border: 2px solid transparent;
            user-select: none;
        }

        .mine-cell:hover {
            transform: scale(1.08);
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(245, 197, 24, 0.2);
        }

        .mine-cell.revealed {
            cursor: default;
            transform: scale(1);
        }

        .mine-cell.revealed:hover {
            transform: scale(1);
            border-color: transparent;
            box-shadow: none;
        }

        .mine-cell.empty {
            background: var(--surface);
            opacity: 0.5;
        }

        .mine-cell.crystal-found {
            background: linear-gradient(135deg, #1a3a5c, #0d4f6e);
            border-color: var(--crystal);
            box-shadow: 0 0 15px rgba(83, 216, 251, 0.3);
            animation: sparkle 1.5s ease infinite;
        }

        @keyframes sparkle {
            0%, 100% { box-shadow: 0 0 15px rgba(83, 216, 251, 0.3); }
            50% { box-shadow: 0 0 25px rgba(83, 216, 251, 0.6); }
        }

        .mine-cell.gold-found {
            background: linear-gradient(135deg, #5c4a1a, #6e5f0d);
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(245, 197, 24, 0.3);
        }

        .mine-cell.danger-found {
            background: linear-gradient(135deg, #5c1a1a, #6e0d0d);
            border-color: var(--danger);
            animation: rumble 0.4s ease;
        }

        @keyframes rumble {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .mine-cell.rustled {
            background: var(--accent);
            border-color: var(--danger);
            animation: stolen 0.6s ease;
        }

        @keyframes stolen {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .mine-cell .label {
            position: absolute;
            bottom: 4px;
            font-size: 0.55rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .overlay.active { display: flex; }

        .overlay-box {
            background: var(--surface);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 2.5rem;
            text-align: center;
            max-width: 380px;
            width: 90%;
        }

        .overlay-box h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .overlay-box p { color: var(--muted); margin: 0.5rem 0; }
        .overlay-box .big-num { font-size: 3rem; font-weight: 900; color: var(--gold); }

        .btn {
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, background 0.15s;
        }

        .btn:hover { transform: translateY(-2px); background: #d63851; }

        .event-log {
            max-width: 700px;
            margin: 0 auto;
            padding: 0 1.5rem 2rem;
        }

        .event-log h3 {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .log-entries {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .log-entry {
            font-size: 0.85rem;
            color: var(--muted);
            padding: 0.3rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .log-entry .highlight { color: var(--crystal); }
        .log-entry .warn { color: var(--danger); }
        .log-entry .earn { color: var(--gold); }

        footer {
            text-align: center;
            padding: 1rem;
            color: var(--muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1><span class="mineral">Mineral</span> <span class="rustler">Rustler</span></h1>
    <p>Dig for rare crystals. But watch out — the rustler is after your loot.</p>
</header>

<div class="hud">
    <span class="gold-count">💰 Gold: <b id="goldCount">0</b></span>
    <span class="crystal-count">💎 Crystals: <b id="crystalCount">0</b></span>
    <span class="notoriety">🤠 Rustled: <b id="rustledCount">0</b></span>
    <span class="timer">⏱ <b id="timer">60</b>s</span>
</div>

<div class="game-area" id="grid"></div>

<div class="event-log">
    <h3>Mine Log</h3>
    <div class="log-entries" id="log"></div>
</div>

<div class="overlay" id="overlay">
    <div class="overlay-box">
        <h2 id="endTitle">Time's Up!</h2>
        <p>Final haul:</p>
        <div class="big-num" id="finalScore">0</div>
        <p id="endDesc">gold pieces</p>
        <p id="endSub"></p>
        <button class="btn" onclick="startGame()">Dig Again</button>
    </div>
</div>

<footer>Crosspollinator — "malinowskite" × "rustler"</footer>

<script>
const GRID_SIZE = 25;
const GAME_TIME = 60;
const MINERALS = [
    { emoji: '💎', name: 'Malinowskite', value: 50, rarity: 0.06 },
    { emoji: '🔮', name: 'Amethyst', value: 30, rarity: 0.08 },
    { emoji: '✨', name: 'Quartz Shard', value: 15, rarity: 0.14 },
    { emoji: '🪨', name: 'Iron Ore', value: 5, rarity: 0.18 },
];
const HAZARDS = [
    { emoji: '🦂', name: 'Scorpion', penalty: -10, rarity: 0.08 },
    { emoji: '💀', name: 'Cave-In', penalty: -20, rarity: 0.04 },
];
const EMPTY_RATE = 0.42;

let cells = [];
let gold = 0;
let crystals = 0;
let rustled = 0;
let timer = GAME_TIME;
let interval = null;
let rustlerInterval = null;
let gameActive = false;

function log(html) {
    const el = document.getElementById('log');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = html;
    el.prepend(entry);
    if (el.children.length > 15) el.removeChild(el.lastChild);
}

function generateCell() {
    const roll = Math.random();
    let cumulative = 0;

    for (const m of MINERALS) {
        cumulative += m.rarity;
        if (roll < cumulative) return { type: 'mineral', ...m };
    }

    for (const h of HAZARDS) {
        cumulative += h.rarity;
        if (roll < cumulative) return { type: 'hazard', ...h };
    }

    return { type: 'empty', emoji: '🕳️', name: 'Nothing', value: 0 };
}

function createGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    cells = [];

    for (let i = 0; i < GRID_SIZE; i++) {
        const data = generateCell();
        const el = document.createElement('div');
        el.className = 'mine-cell';
        el.textContent = '⛏️';
        el.onclick = () => dig(i);
        grid.appendChild(el);
        cells.push({ el, data, revealed: false });
    }
}

function dig(index) {
    if (!gameActive) return;
    const cell = cells[index];
    if (cell.revealed) return;

    cell.revealed = true;
    cell.el.classList.add('revealed');
    cell.el.textContent = cell.data.emoji;

    if (cell.data.type === 'mineral') {
        gold += cell.data.value;
        crystals++;
        cell.el.className = `mine-cell revealed ${cell.data.value >= 30 ? 'crystal-found' : 'gold-found'}`;
        log(`<span class="earn">+${cell.data.value}g</span> Found <span class="highlight">${cell.data.name}</span>!`);
    } else if (cell.data.type === 'hazard') {
        gold = Math.max(0, gold + cell.data.penalty);
        cell.el.classList.add('danger-found');
        log(`<span class="warn">${cell.data.penalty}g</span> ${cell.data.name}! Ouch.`);
    } else {
        cell.el.classList.add('empty');
        log(`Dug up nothing but dirt.`);
    }

    updateHUD();
}

function rustlerStrike() {
    if (!gameActive) return;

    const richCells = cells.filter(c => c.revealed && c.data.type === 'mineral' && !c.rustledAway);
    if (richCells.length === 0) return;

    // Rustler targets the most valuable revealed mineral
    richCells.sort((a, b) => b.data.value - a.data.value);
    const target = richCells[0];
    const stolen = Math.min(target.data.value, gold);

    if (stolen <= 0) return;

    target.rustledAway = true;
    target.el.textContent = '🤠';
    target.el.className = 'mine-cell revealed rustled';

    gold = Math.max(0, gold - stolen);
    rustled++;

    log(`<span class="warn">🤠 The Rustler stole your ${target.data.name}! -${stolen}g</span>`);
    updateHUD();

    // After a beat, fade the cell
    setTimeout(() => {
        target.el.style.opacity = '0.4';
    }, 800);
}

function updateHUD() {
    document.getElementById('goldCount').textContent = gold;
    document.getElementById('crystalCount').textContent = crystals;
    document.getElementById('rustledCount').textContent = rustled;
}

function endGame() {
    gameActive = false;
    clearInterval(interval);
    clearInterval(rustlerInterval);

    document.getElementById('finalScore').textContent = gold;
    document.getElementById('endSub').textContent =
        `💎 ${crystals} crystals found · 🤠 ${rustled} rustled away`;

    if (gold >= 200) {
        document.getElementById('endTitle').textContent = '🏆 Legendary Prospector!';
    } else if (gold >= 100) {
        document.getElementById('endTitle').textContent = '⛏️ Solid Haul!';
    } else {
        document.getElementById('endTitle').textContent = '🤠 The Rustler Wins...';
    }

    document.getElementById('overlay').classList.add('active');
}

function startGame() {
    document.getElementById('overlay').classList.remove('active');
    document.getElementById('log').innerHTML = '';

    gold = 0;
    crystals = 0;
    rustled = 0;
    timer = GAME_TIME;
    gameActive = true;

    updateHUD();
    document.getElementById('timer').textContent = timer;
    createGrid();

    log(`New dig site opened! You have ${GAME_TIME} seconds.`);
    log(`⚠️ Watch out — the Mineral Rustler is prowling...`);

    clearInterval(interval);
    clearInterval(rustlerInterval);

    interval = setInterval(() => {
        timer--;
        document.getElementById('timer').textContent = timer;
        if (timer <= 0) endGame();
    }, 1000);

    // Rustler strikes every 8-15 seconds
    function scheduleRustler() {
        const delay = (8 + Math.random() * 7) * 1000;
        rustlerInterval = setTimeout(() => {
            rustlerStrike();
            if (gameActive) scheduleRustler();
        }, delay);
    }
    scheduleRustler();
}

startGame();
</script>

</body>
</html>
