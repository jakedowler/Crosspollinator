<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoo Tea Party</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 100vh;
    max-height: 100dvh;
    overflow: hidden;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffecd2 100%);
    display: flex;
    flex-direction: column;
    user-select: none;
  }
  header {
    text-align: center;
    padding: 8px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(8px);
  }
  header h1 {
    font-size: 1.3rem;
    color: #6b3a2a;
    letter-spacing: 1px;
  }
  header p {
    font-size: 0.75rem;
    color: #a0674b;
  }
  .game-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 10px;
    gap: 10px;
  }
  .score-bar {
    display: flex;
    gap: 24px;
    font-size: 1rem;
    color: #6b3a2a;
    font-weight: 600;
  }
  .zoo-row {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 600px;
  }
  .animal {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .animal:hover { transform: scale(1.15); }
  .animal:active { transform: scale(0.95); }
  .animal.happy {
    animation: wiggle 0.5s ease;
  }
  .animal.sad {
    animation: shake 0.4s ease;
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(0); }
    25% { transform: rotate(-12deg) scale(1.1); }
    75% { transform: rotate(12deg) scale(1.1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .teacup-tray {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 500px;
  }
  .teacup {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    cursor: grab;
    background: rgba(255,255,255,0.7);
    border: 3px solid transparent;
    transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .teacup:hover { transform: scale(1.1); box-shadow: 0 4px 16px rgba(0,0,0,0.13); }
  .teacup.selected {
    border-color: #e76f51;
    transform: scale(1.12);
    box-shadow: 0 4px 20px rgba(231,111,81,0.35);
  }
  .bubble {
    position: absolute;
    top: -12px;
    right: -8px;
    font-size: 1rem;
    background: #fff;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
  .timer-bar {
    width: 80%;
    max-width: 400px;
    height: 10px;
    background: rgba(255,255,255,0.5);
    border-radius: 5px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    background: linear-gradient(90deg, #e76f51, #f4a261, #e9c46a);
    border-radius: 5px;
    transition: width 0.1s linear;
  }
  .message {
    font-size: 1.1rem;
    color: #6b3a2a;
    font-weight: 500;
    min-height: 1.5em;
    text-align: center;
  }
  .start-btn, .restart-btn {
    padding: 12px 32px;
    font-size: 1.1rem;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #e76f51, #f4a261);
    color: white;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(231,111,81,0.4);
    transition: transform 0.15s;
  }
  .start-btn:hover, .restart-btn:hover { transform: scale(1.05); }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .overlay-box {
    background: white;
    border-radius: 24px;
    padding: 32px 40px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }
  .overlay-box h2 { color: #6b3a2a; margin-bottom: 8px; }
  .overlay-box p { color: #a0674b; margin-bottom: 16px; }
  .hidden { display: none !important; }
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 3rem;
    z-index: 20;
    animation: pop 0.6s ease forwards;
    pointer-events: none;
  }
  @keyframes pop {
    0% { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    50% { transform: translate(-50%,-50%) scale(1.3); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
  }
</style>
</head>
<body>
<header>
  <h1>Zoo Tea Party</h1>
  <p>Serve each animal its favourite tea before time runs out!</p>
</header>

<div class="game-area">
  <div class="score-bar">
    <span>Score: <span id="score">0</span></span>
    <span>Round: <span id="round">1</span>/5</span>
  </div>

  <div class="zoo-row" id="animals"></div>

  <div class="message" id="msg">Pick a teacup, then tap an animal!</div>

  <div class="teacup-tray" id="cups"></div>

  <div class="timer-bar"><div class="timer-fill" id="timer"></div></div>

  <div class="overlay" id="startOverlay">
    <div class="overlay-box">
      <h2>Zoo Tea Party</h2>
      <p>Match each animal to its favourite tea.<br>Pick a cup, then tap the animal that wants it!</p>
      <button class="start-btn" onclick="startGame()">Start!</button>
    </div>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <div class="overlay-box">
      <h2 id="endTitle">Time's up!</h2>
      <p id="endMsg"></p>
      <button class="restart-btn" onclick="startGame()">Play Again</button>
    </div>
  </div>
</div>

<script>
const ANIMALS = [
  { emoji: "\u{1F981}", name: "Lion",     bg: "#fde68a" },
  { emoji: "\u{1F418}", name: "Elephant", bg: "#c4b5fd" },
  { emoji: "\u{1F427}", name: "Penguin",  bg: "#a5f3fc" },
  { emoji: "\u{1F435}", name: "Monkey",   bg: "#fca5a5" },
  { emoji: "\u{1F992}", name: "Giraffe",  bg: "#fcd34d" },
  { emoji: "\u{1F43B}", name: "Bear",     bg: "#d9f99d" },
  { emoji: "\u{1F98B}", name: "Butterfly",bg: "#fbcfe8" },
  { emoji: "\u{1F438}", name: "Frog",     bg: "#86efac" }
];

const TEAS = [
  { emoji: "\u{1F375}", label: "Green Tea",   color: "#86efac" },
  { emoji: "\u2615",    label: "Coffee",       color: "#d4a373" },
  { emoji: "\u{1F9C9}", label: "Bubble Tea",   color: "#c4b5fd" },
  { emoji: "\u{1F37A}", label: "Root Beer",    color: "#fcd34d" },
  { emoji: "\u{1F9CA}", label: "Iced Tea",     color: "#a5f3fc" },
  { emoji: "\u{1F379}", label: "Fruit Punch",  color: "#fca5a5" }
];

let score = 0, round = 0, maxRounds = 5;
let selectedCup = null;
let pairings = [];
let timerInterval = null, timeLeft = 0;

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showToast(emoji) {
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = emoji;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 700);
}

function buildRound() {
  const count = Math.min(3 + round, 6);
  const animals = shuffle([...ANIMALS]).slice(0, count);
  const teas = shuffle([...TEAS]).slice(0, count);
  pairings = animals.map((a, i) => ({ animal: a, tea: teas[i], served: false }));

  const animalDiv = document.getElementById("animals");
  animalDiv.innerHTML = "";
  pairings.forEach((p, idx) => {
    const d = document.createElement("div");
    d.className = "animal";
    d.style.background = p.animal.bg;
    d.innerHTML = p.animal.emoji + '<span class="bubble">' + p.tea.emoji + '</span>';
    d.onclick = () => serveAnimal(idx, d);
    animalDiv.appendChild(d);
  });

  const cupDiv = document.getElementById("cups");
  cupDiv.innerHTML = "";
  shuffle([...pairings]).forEach((p) => {
    const c = document.createElement("div");
    c.className = "teacup";
    c.textContent = p.tea.emoji;
    c.dataset.label = p.tea.label;
    c.dataset.emoji = p.tea.emoji;
    c.onclick = () => selectCup(c);
    cupDiv.appendChild(c);
  });

  selectedCup = null;
  document.getElementById("round").textContent = round + 1;
  document.getElementById("msg").textContent = "Pick a teacup, then tap its animal!";
}

function selectCup(el) {
  document.querySelectorAll(".teacup").forEach(c => c.classList.remove("selected"));
  el.classList.add("selected");
  selectedCup = el.dataset.emoji;
}

function serveAnimal(idx, el) {
  if (!selectedCup || pairings[idx].served) return;
  if (pairings[idx].tea.emoji === selectedCup) {
    pairings[idx].served = true;
    score += 10 + Math.floor(timeLeft / 2);
    document.getElementById("score").textContent = score;
    el.classList.add("happy");
    el.querySelector(".bubble").textContent = "\u2764\uFE0F";
    el.style.pointerEvents = "none";
    showToast("\u{1F389}");
    document.querySelectorAll(".teacup").forEach(c => {
      if (c.dataset.emoji === selectedCup && c.classList.contains("selected")) c.classList.add("hidden");
    });
    selectedCup = null;
    document.getElementById("msg").textContent = "Lovely! " + pairings[idx].animal.name + " loves it!";
    if (pairings.every(p => p.served)) {
      setTimeout(nextRound, 600);
    }
  } else {
    el.classList.add("sad");
    setTimeout(() => el.classList.remove("sad"), 500);
    score = Math.max(0, score - 5);
    document.getElementById("score").textContent = score;
    document.getElementById("msg").textContent = "Nope! " + pairings[idx].animal.name + " doesn't want that.";
  }
}

function nextRound() {
  round++;
  if (round >= maxRounds) return endGame(true);
  buildRound();
  timeLeft = 100;
}

function startTimer() {
  timeLeft = 100;
  const bar = document.getElementById("timer");
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft -= 0.5;
    bar.style.width = Math.max(0, timeLeft) + "%";
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame(false);
    }
  }, 150);
}

function endGame(won) {
  clearInterval(timerInterval);
  document.getElementById("endOverlay").classList.remove("hidden");
  document.getElementById("endTitle").textContent = won ? "All served!" : "Time's up!";
  document.getElementById("endMsg").textContent = "Final score: " + score + (won ? " - Perfect tea party!" : " - Try again!");
}

function startGame() {
  score = 0; round = 0;
  document.getElementById("score").textContent = 0;
  document.getElementById("startOverlay").classList.add("hidden");
  document.getElementById("endOverlay").classList.add("hidden");
  buildRound();
  startTimer();
}
</script>
</body>
</html>
