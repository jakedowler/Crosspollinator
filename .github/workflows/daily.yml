name: Daily Crosspollinator

on:
  schedule:
    # Every day at 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crosspollinate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily generation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: scripts
        run: python run_daily.py

      - name: Push changes
        run: |
          git config user.name "Crosspollinator Bot"
          git config user.email "crosspollinator[bot]@users.noreply.github.com"
          git push

  deploy:
    needs: crosspollinate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest (includes today's app)
        run: git pull origin ${{ github.ref_name }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
