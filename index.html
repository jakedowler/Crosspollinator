<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crosspollinator — Daily Random Web Apps</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #58a6ff;
            --accent2: #f78166;
            --green: #3fb950;
            --purple: #bc8cff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 3rem 1rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        header h1 .cross { color: var(--accent); }
        header h1 .pollinator { color: var(--accent2); }

        header p {
            color: var(--muted);
            font-size: 1.1rem;
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--muted);
        }

        .stat b { color: var(--text); font-size: 1.1rem; }

        .grid {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .day-group h2 {
            font-size: 0.85rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.75rem;
            padding-left: 0.25rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.15s ease;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(88, 166, 255, 0.1);
        }

        .card .words {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-shrink: 0;
        }

        .card .word {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.3rem 0.6rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--purple);
        }

        .card .times {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .card .info {
            flex: 1;
            min-width: 0;
        }

        .card .app-name {
            font-weight: 600;
            font-size: 1.05rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card .app-desc {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 0.2rem;
        }

        .card .play-btn {
            flex-shrink: 0;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            font-weight: 600;
            font-size: 0.85rem;
            pointer-events: none;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted);
        }

        .empty-state p { font-size: 1.1rem; margin-top: 0.5rem; }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* Action buttons on cards */
        .card-actions {
            display: flex;
            gap: 0.35rem;
            flex-shrink: 0;
        }
        .card .act-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.35rem 0.6rem;
            font-size: 0.75rem;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.15s;
        }
        .card .act-btn:hover { border-color: var(--accent); color: var(--accent); }
        .card .act-btn.archive-btn:hover { border-color: var(--accent2); color: var(--accent2); }
        .card .act-btn.iterate-btn:hover { border-color: var(--green); color: var(--green); }

        .fb-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .fb-modal.open { display: flex; }

        .fb-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            width: 90%;
            max-width: 480px;
        }
        .fb-box h3 { margin-bottom: 0.75rem; font-size: 1rem; }
        .fb-box textarea {
            width: 100%;
            height: 80px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 0.75rem;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
        }
        .fb-box textarea:focus { outline: none; border-color: var(--accent); }
        .fb-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            justify-content: flex-end;
        }
        .fb-actions button {
            padding: 0.4rem 1rem;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
        }
        .fb-cancel { background: var(--border); color: var(--text); }
        .fb-submit { background: var(--accent); color: var(--bg); }
        .fb-saved {
            font-size: 0.8rem;
            color: var(--green);
            margin-top: 0.5rem;
            display: none;
        }

        .fb-history {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .fb-history h2 {
            font-size: 0.85rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.75rem;
        }
        .fb-entry {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }
        .fb-entry .fb-game { color: var(--purple); font-weight: 600; }
        .fb-entry .fb-text { color: var(--text); margin-top: 0.25rem; }
        .fb-entry .fb-time { color: var(--muted); font-size: 0.75rem; margin-top: 0.25rem; }
        .fb-export {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            padding: 0.35rem 0.8rem;
            font-size: 0.75rem;
            cursor: pointer;
            margin-left: 0.5rem;
        }
        .fb-export:hover { border-color: var(--accent); color: var(--accent); }

        /* Archived section */
        .archived-section {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .archived-toggle {
            font-size: 0.85rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }
        .archived-toggle:hover { color: var(--text); }
        .archived-list { margin-top: 0.75rem; }
        .archived-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            opacity: 0.6;
        }
        .archived-card .info { flex: 1; }
        .archived-card .act-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.3rem 0.5rem;
            font-size: 0.7rem;
            color: var(--muted);
            cursor: pointer;
        }
        .archived-card .act-btn:hover { border-color: var(--green); color: var(--green); }

        /* Iterate modal extras */
        .fb-box .iter-hint {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }
        .fb-box .copy-cmd {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            padding: 0.3rem 0.6rem;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .fb-box .copy-cmd:hover { border-color: var(--accent); color: var(--accent); }

        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .card { flex-wrap: wrap; }
            .card .words { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1><span class="cross">Cross</span><span class="pollinator">pollinator</span></h1>
    <p>Every day, two random dictionary words collide and a new web app is born. No curation, no bias — just pure creative chaos.</p>
    <div class="stats">
        <div class="stat">Apps built: <b id="appCount">0</b></div>
        <div class="stat">Words used: <b id="wordCount">0</b></div>
    </div>
</header>

<div class="grid" id="grid">
    <div class="empty-state" id="emptyState">
        <p>Loading apps...</p>
    </div>
</div>

<div class="archived-section" id="archivedSection" style="display:none">
    <button class="archived-toggle" id="archivedToggle" onclick="toggleArchived()">Archived (0)</button>
    <div class="archived-list" id="archivedList" style="display:none"></div>
</div>

<div class="fb-history" id="fbHistory" style="display:none">
    <h2>Your Feedback <button class="fb-export" onclick="exportFeedback()">Copy All</button></h2>
    <div id="fbList"></div>
</div>

<div class="fb-modal" id="fbModal">
    <div class="fb-box">
        <h3 id="fbTitle">Feedback</h3>
        <div class="iter-hint" id="fbHint" style="display:none"></div>
        <textarea id="fbText" placeholder="What did you think? Fun? Boring? Buggy? Too complex?"></textarea>
        <div class="fb-saved" id="fbSaved">Saved!</div>
        <div class="fb-actions">
            <button class="copy-cmd" id="fbCopyCmd" style="display:none" onclick="copyIterateCommand()">Copy command</button>
            <button class="fb-cancel" onclick="closeFeedback()">Cancel</button>
            <button class="fb-submit" onclick="submitFeedback()">Save</button>
        </div>
    </div>
</div>

<div class="fb-modal" id="archiveModal">
    <div class="fb-box">
        <h3 id="archiveTitle">Archive</h3>
        <textarea id="archiveReason" placeholder="Why are you archiving this? (optional)" style="height:60px"></textarea>
        <div class="fb-actions">
            <button class="fb-cancel" onclick="closeArchive()">Cancel</button>
            <button class="fb-submit" style="background:var(--accent2)" onclick="confirmArchive()">Archive</button>
        </div>
    </div>
</div>

<footer>
    <a href="https://github.com/jakedowler/Crosspollinator">GitHub</a> · Built with Claude
</footer>

<script>
// The build script injects this. Fallback to empty if not yet built.
let APPS = [];
</script>
<script>
// Cache-bust apps.js so new apps show up immediately
document.write('<script src="apps.js?' + Date.now() + '"><\/script>');
</script>
<script>
function render() {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('emptyState');

    if (!APPS || APPS.length === 0) {
        empty.innerHTML = '<p>No apps yet. First run coming soon!</p>';
        return;
    }

    empty.style.display = 'none';
    document.getElementById('appCount').textContent = APPS.length;

    const allWords = new Set();
    APPS.forEach(a => { allWords.add(a.word_a); allWords.add(a.word_b); });
    document.getElementById('wordCount').textContent = allWords.size;

    // Only show the latest version of each game (by word pair)
    const latestVersions = {};
    APPS.forEach(app => {
        const key = app.word_a + '×' + app.word_b;
        if (!latestVersions[key] || (app.version || 1) > (latestVersions[key].version || 1)) {
            latestVersions[key] = app;
        }
    });
    const latestPaths = new Set(Object.values(latestVersions).map(a => a.path));
    const visibleApps = APPS.filter(app => latestPaths.has(app.path));

    const archived = getArchived();
    const activeApps = visibleApps.filter(app => !archived.includes(app.path));
    const archivedApps = visibleApps.filter(app => archived.includes(app.path));

    document.getElementById('appCount').textContent = activeApps.length;

    // Group active apps by date
    const groups2 = {};
    activeApps.forEach(app => {
        if (!groups2[app.date]) groups2[app.date] = [];
        groups2[app.date].push(app);
    });
    const dates2 = Object.keys(groups2).sort().reverse();

    grid.innerHTML = dates2.map(date => `
        <div class="day-group">
            <h2>${new Date(date + 'T12:00:00Z').toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</h2>
            ${groups2[date].map(app => `
                <a class="card" href="${app.path}">
                    <div class="words">
                        <span class="word">${app.word_a}</span>
                        <span class="times">×</span>
                        <span class="word">${app.word_b}</span>
                    </div>
                    <div class="info">
                        <div class="app-name">${app.name || (app.word_a + ' × ' + app.word_b)}${app.version > 1 ? ' <span style="font-size:0.65rem;color:var(--green);font-weight:700;margin-left:0.3rem">v' + app.version + '</span>' : ''}</div>
                        ${app.desc ? `<div class="app-desc">${app.desc}</div>` : ''}
                    </div>
                    <div class="play-btn">Play</div>
                    <div class="card-actions">
                        <button class="act-btn iterate-btn" onclick="event.preventDefault();openIterate('${app.word_a}','${app.word_b}','${app.path}')">Iterate</button>
                        <button class="act-btn" onclick="event.preventDefault();openFeedback('${app.word_a} × ${app.word_b}','${app.path}')">Feedback</button>
                        <button class="act-btn archive-btn" onclick="event.preventDefault();archiveGame('${app.path}')">Archive</button>
                    </div>
                </a>
            `).join('')}
        </div>
    `).join('');

    renderArchivedSection(archivedApps);
    renderFeedbackHistory();
}

const REPO = 'jakedowler/Crosspollinator';

let currentFbGame = '';
let currentFbMode = 'feedback'; // 'feedback' or 'iterate'
let currentFbWordA = '';
let currentFbWordB = '';
let currentFbPath = '';

function ghIssueUrl(title, body, labels) {
    const params = new URLSearchParams({ title, body });
    if (labels) params.set('labels', labels);
    return `https://github.com/${REPO}/issues/new?${params}`;
}

function openFeedback(game, path) {
    currentFbGame = game;
    currentFbMode = 'feedback';
    currentFbPath = path;
    document.getElementById('fbTitle').textContent = 'Feedback: ' + game;
    document.getElementById('fbText').value = '';
    document.getElementById('fbText').placeholder = 'What did you think? Fun? Boring? Buggy? Too complex?';
    document.getElementById('fbHint').style.display = 'none';
    document.getElementById('fbCopyCmd').style.display = 'none';
    document.getElementById('fbSaved').style.display = 'none';
    document.getElementById('fbModal').classList.add('open');
    document.getElementById('fbText').focus();
}

function openIterate(wordA, wordB, path) {
    currentFbGame = wordA + ' \u00d7 ' + wordB;
    currentFbMode = 'iterate';
    currentFbWordA = wordA;
    currentFbWordB = wordB;
    currentFbPath = path;
    document.getElementById('fbTitle').textContent = 'Iterate: ' + currentFbGame;
    document.getElementById('fbText').value = '';
    document.getElementById('fbText').placeholder = 'What should change? e.g. "Make the mechanic more like Wordle" or "Too hard for kids, simplify"';
    document.getElementById('fbHint').textContent = 'Describe what to improve. Saves locally and opens a GitHub Issue automatically.';
    document.getElementById('fbHint').style.display = 'block';
    document.getElementById('fbCopyCmd').style.display = 'none';
    document.getElementById('fbSaved').style.display = 'none';
    document.getElementById('fbModal').classList.add('open');
    document.getElementById('fbText').focus();
}

function closeFeedback() {
    document.getElementById('fbModal').classList.remove('open');
}

function submitFeedback() {
    const text = document.getElementById('fbText').value.trim();
    if (!text) return;

    // Save locally
    const feedback = JSON.parse(localStorage.getItem('cpFeedback') || '[]');
    feedback.push({
        game: currentFbGame,
        text: text,
        type: currentFbMode,
        path: currentFbPath,
        time: new Date().toISOString()
    });
    localStorage.setItem('cpFeedback', JSON.stringify(feedback));

    // Open GitHub Issue automatically
    const label = currentFbMode === 'iterate' ? 'iterate' : 'feedback';
    const title = `[${label}] ${currentFbGame}`;
    const body = `**Game:** ${currentFbGame}\n**Path:** ${currentFbPath}\n**Type:** ${label}\n\n${text}`;
    window.open(ghIssueUrl(title, body, label), '_blank');

    document.getElementById('fbSaved').style.display = 'block';
    setTimeout(closeFeedback, 800);
    renderFeedbackHistory();
}

// Archive functions
function getArchived() {
    return JSON.parse(localStorage.getItem('cpArchived') || '[]');
}

let archivePendingPath = '';

function archiveGame(path) {
    archivePendingPath = path;
    const app = APPS.find(a => a.path === path);
    const game = app ? (app.word_a + ' \u00d7 ' + app.word_b) : path;
    document.getElementById('archiveTitle').textContent = 'Archive: ' + game;
    document.getElementById('archiveReason').value = '';
    document.getElementById('archiveModal').classList.add('open');
    document.getElementById('archiveReason').focus();
}

function closeArchive() {
    document.getElementById('archiveModal').classList.remove('open');
    archivePendingPath = '';
}

function confirmArchive() {
    const reason = document.getElementById('archiveReason').value.trim();
    const path = archivePendingPath;
    const archived = getArchived();
    if (!archived.includes(path)) {
        archived.push(path);
        localStorage.setItem('cpArchived', JSON.stringify(archived));
    }
    const app = APPS.find(a => a.path === path);
    if (app) {
        const game = app.word_a + ' \u00d7 ' + app.word_b;
        const title = `[archive] ${game}`;
        let body = `**Game:** ${game}\n**Path:** ${path}\n**Action:** Archive this game — hide from portal, deprioritize these words.`;
        if (reason) body += `\n\n**Reason:** ${reason}`;
        window.open(ghIssueUrl(title, body, 'archive'), '_blank');
    }
    closeArchive();
    render();
}

function unarchiveGame(path) {
    let archived = getArchived();
    archived = archived.filter(p => p !== path);
    localStorage.setItem('cpArchived', JSON.stringify(archived));
    render();
}

function renderArchivedSection(archivedApps) {
    const section = document.getElementById('archivedSection');
    const list = document.getElementById('archivedList');
    const toggle = document.getElementById('archivedToggle');
    if (archivedApps.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    toggle.textContent = `Archived (${archivedApps.length})`;
    list.innerHTML = archivedApps.map(app => `
        <div class="archived-card">
            <div class="info">
                <span style="color:var(--purple);font-weight:600">${app.word_a} \u00d7 ${app.word_b}</span>
                <span style="color:var(--muted);font-size:0.8rem;margin-left:0.5rem">${app.name || ''}</span>
            </div>
            <button class="act-btn" onclick="unarchiveGame('${app.path}')">Restore</button>
        </div>
    `).join('');
}

function toggleArchived() {
    const list = document.getElementById('archivedList');
    list.style.display = list.style.display === 'none' ? 'block' : 'none';
}

function renderFeedbackHistory() {
    const feedback = JSON.parse(localStorage.getItem('cpFeedback') || '[]');
    const container = document.getElementById('fbHistory');
    const list = document.getElementById('fbList');
    if (feedback.length === 0) { container.style.display = 'none'; return; }
    container.style.display = 'block';
    list.innerHTML = feedback.slice().reverse().map(f => `
        <div class="fb-entry">
            <div class="fb-game">${f.game} ${f.type === 'iterate' ? '<span style="color:var(--green);font-size:0.7rem;margin-left:0.4rem">ITERATE</span>' : ''}</div>
            <div class="fb-text">${f.text}</div>
            <div class="fb-time">${new Date(f.time).toLocaleString()}</div>
        </div>
    `).join('');
}

function exportFeedback() {
    const feedback = JSON.parse(localStorage.getItem('cpFeedback') || '[]');
    const text = feedback.map(f =>
        `**${f.game}** (${new Date(f.time).toLocaleDateString()}): ${f.text}`
    ).join('\n');
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.fb-export');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy All', 1500);
    });
}

document.getElementById('fbModal').addEventListener('click', function(e) {
    if (e.target === this) closeFeedback();
});
document.getElementById('archiveModal').addEventListener('click', function(e) {
    if (e.target === this) closeArchive();
});

render();
</script>

</body>
</html>
